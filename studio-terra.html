ch-type\">Joinery & desks<\/div><\/div>\n              <\/div>\n            <\/div>\n          <\/div>\n\n          <!-- Card 6: Khanna Residence -->\n          <div class=\"project-card\">\n            <img src=\"https://picsum.photos/seed/fashion-c5/640/480\" alt=\"Khanna Residence, Juhu\" />\n            <div class=\"project-card-overlay\"><\/div>\n            <div class=\"project-card-info\">\n              <span class=\"tag-pill\">Residential<\/span>\n              <div class=\"project-name\">Khanna Residence<\/div>\n              <div class=\"project-meta\">Juhu · 2020<\/div>\n            <\/div>\n            <div class=\"material-swatches\">\n              <span class=\"swatch-section-label\">Material Palette<\/span>\n              <p class=\"swatch-project-title\">Khanna Residence, Juhu<\/p>\n              <div class=\"swatch-item\">\n                <div class=\"swatch-block swatch-travertine\"><\/div>\n                <div><div class=\"swatch-label\">Travertine<\/div><div class=\"swatch-type\">Living floors<\/div><\/div>\n              <\/div>\n              <div class=\"swatch-item\">\n                <div class=\"swatch-block swatch-teak\"><\/div>\n                <div><div class=\"swatch-label\">Teak Boiserie<\/div><div class=\"swatch-type\">Wall panelling<\/div><\/div>\n              <\/div>\n              <div class=\"swatch-item\">\n                <div class=\"swatch-block swatch-plaster\"><\/div>\n                <div><div class=\"swatch-label\">Venetian Plaster<\/div><div class=\"swatch-type\">Ceilings<\/div><\/div>\n              <\/div>\n            <\/div>\n          <\/div>\n\n          <!-- Card 7: Terroir Wine Bar -->\n          <div class=\"project-card\">\n            <img src=\"https://picsum.photos/seed/fashion-c6/640/480\" alt=\"Terroir Wine Bar, Colaba\" />\n            <div class=\"project-card-overlay\"><\/div>\n            <div class=\"project-card-info\">\n              <span class=\"tag-pill\">Hospitality<\/span>\n              <div class=\"project-name\">Terroir Wine Bar<\/div>\n              <div class=\"project-meta\">Colaba · 2021<\/div>\n            <\/div>\n            <div class=\"material-swatches\">\n              <span class=\"swatch-section-label\">Material Palette<\/span>\n              <p class=\"swatch-project-title\">Terroir Wine Bar, Colaba<\/p>\n              <div class=\"swatch-item\">\n                <div class=\"swatch-block swatch-brick\"><\/div>\n                <div><div class=\"swatch-label\">Heritage Brick<\/div><div class=\"swatch-type\">Vaulted arches<\/div><\/div>\n              <\/div>\n              <div class=\"swatch-item\">\n                <div class=\"swatch-block swatch-concrete\"><\/div>\n                <div","features":"<section class=\"px-0 py-0 relative overflow-hidden\" style=\"background:var(--bg)\">\n  <!-- 1. Editorial Page Header -->\n  <div class=\"relative w-full\" style=\"height:clamp(340px,52vw,620px)\">\n    <img src=\"https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=1400&h=900&q=80&auto=format&fit=crop\" alt=\"Studio Terra project\" class=\"w-full h-full object-cover\" style=\"object-position:center 40%\">\n    <div class=\"absolute inset-0\" style=\"background:linear-gradient(to right, rgba(18,14,10,0.82) 0%, rgba(18,14,10,0.45) 55%, rgba(18,14,10,0.15) 100%)\"><\/div>\n    <div class=\"absolute inset-0 flex flex-col justify-end px-6 md:px-16 pb-12 md:pb-20\">\n      <span class=\"eyebrow mb-4\" style=\"color:var(--accent);letter-spacing:0.18em;font-size:0.72rem\">Our Practice<\/span>\n      <h1 class=\"font-display text-4xl md:text-6xl lg:text-7xl leading-tight\" style=\"color:#f5ede0;max-width:680px\">\n        The craft of <em>considered<\/em><br>space-making\n      <\/h1>\n      <p class=\"mt-5 text-base md:text-lg\" style=\"color:rgba(245,237,224,0.62);max-width:480px;font-family:var(--font-body);line-height:1.7\">\n        From first sketch to final threshold — a practice built on rigour, restraint, and the poetry of material.\n      <\/p>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- 2. Process Timeline -->\n<section class=\"px-6 md:px-10 py-16 md:py-24\" style=\"background:var(--bg)\">\n  <div class=\"max-w-7xl mx-auto\">\n    <div class=\"mb-12\">\n      <span class=\"eyebrow\" style=\"color:var(--accent);letter-spacing:0.16em;font-size:0.7rem\">How We Work<\/span>\n      <h2 class=\"font-display text-3xl md:text-5xl mt-3\" style=\"color:var(--text)\">The <em>process<\/em> is the work<\/h2>\n    <\/div>\n\n    <div class=\"relative\">\n      <!-- Vertical spine line -->\n      <div class=\"hidden md:block absolute left-[52px] top-0 bottom-0 w-px\" style=\"background:linear-gradient(to bottom, var(--accent), transparent);opacity:0.3\"><\/div>\n\n      <div class=\"space-y-0\">\n\n        <!-- Step 01 -->\n        <div class=\"flex flex-col md:flex-row gap-6 md:gap-10 pb-12 md:pb-16 relative\">\n          <div class=\"flex md:flex-col items-center md:items-start gap-4 md:gap-0 flex-shrink-0\">\n            <div class=\"w-[104px] flex-shrink-0 flex items-center justify-center\">\n              <div class=\"w-10 h-10 rounded-full flex items-center justify-center border\" style=\"border-color:var(--accent);background:var(--bg)\">\n                <span style=\"font-family:var(--font-mono);font-size:0.65rem;color:var(--accent)\">01<\/span>\n              <\/div>\n            <\/div>\n          <\/div>\n          <div class=\"flex flex-col md:flex-row gap-6 md:gap-10 flex-1 items-start\">\n            <div class=\"flex-1\">\n              <h3 class=\"font-display text-xl md:text-2xl mb-3\" style=\"color:var(--text)\">Discovery<\/h3>\n              <p style=\"color:var(--ink-muted);font-family:var(--font-body);line-height:1.75;font-size:0.95rem\">\n                We begin with unhurried listening — site visits, family rituals, light patterns across seasons. Every brief is a portrait of a life. We map how you inhabit time as much as space, building a foundation that no algorithm can shortcut.\n              <\/p>\n            <\/div>\n            <div class=\"w-full md:w-40 flex-shrink-0 rounded-xl overflow-hidden\" style=\"height:120px\">\n              <img src=\"https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=320&h=240&q=80&auto=format&fit=crop\" alt=\"Discovery\" class=\"w-full h-full object-cover\" style=\"filter:brightness(0.88) sepia(0.15)\">\n            <\/div>\n          <\/div>\n        <\/div>\n\n        <!-- Step 02 -->\n        <div class=\"flex flex-col md:flex-row gap-6 md:gap-10 pb-12 md:pb-16 relative\">\n          <div class=\"flex md:flex-col items-center md:items-start gap-4 md:gap-0 flex-shrink-0\">\n            <div class=\"w-[104px] flex-shrink-0 flex items-center justify-center\">\n              <div class=\"w-10 h-10 rounded-full flex items-center justify-center border\" style=\"border-color:var(--accent);background:var(--bg)\">\n                <span style=\"font-family:var(--font-mono);font-size:0.65rem;color:var(--accent)\">02<\/span>\n              <\/div>\n            <\/div>\n          <\/div>\n          <div class=\"flex flex-col md:flex-row gap-6 md:gap-10 flex-1 items-start\">\n            <div class=\"flex-1\">\n              <h3 class=\"font-display text-xl md:text-2xl mb-3\" style=\"color:var(--text)\">Concept<\/h3>\n              <p style=\"color:var(--ink-muted);font-family:var(--font-body);line-height:1.75;font-size:0.95rem\">\n                The concept phase is where intuition meets rigour. Hand sketches, material moodboards, light studies — we develop a single spatial idea that can carry the entire project. This idea becomes the design's conscience, guiding every subsequent decision.\n              <\/p>\n            <\/div>\n            <div class=\"w-full md:w-40 flex-shrink-0 rounded-xl overflow-hidden\" style=\"height:120px\">\n              <img src=\"https://images.unsplash.com/photo-1483985988355-763728e1935b?w=320&h=240&q=80&auto=format&fit=crop\" alt=\"Concept\" class=\"w-full h-full object-cover\" style=\"filter:brightness(0.85) sepia(0.2)\">\n            <\/div>\n          <\/div>\n        <\/div>\n\n        <!-- Step 03 -->\n        <div class=\"flex flex-col md:flex-row gap-6 md:gap-10 pb-12 md:pb-16 relative\">\n          <div class=\"flex md:flex-col items-center md:items-start gap-4 md:gap-0 flex-shrink-0\">\n            <div class=\"w-[104px] flex-shrink-0 flex items-center justify-center\">\n              <div class=\"w-10 h-10 rounded-full flex items-center justify-center border\" style=\"border-color:var(--accent);background:var(--bg)\">\n                <span style=\"font-family:var(--font-mono);font-size:0.65rem;color:var(--accent)\">03<\/span>\n              <\/div>\n            <\/div>\n          <\/div>\n          <div class=\"flex flex-col md:flex-row gap-6 md:gap-10 flex-1 items-start\">\n            <div class=\"flex-1\">\n              <h3 class=\"font-display text-xl md:text-2xl mb-3\" style=\"color:var(--text)\">Design Development<\/h3>\n              <p style=\"color:var(--ink-muted);font-family:var(--font-body);line-height:1.75;font-size:0.95rem\">\n                Concept becomes architecture. Plans, sections, material schedules, and 3D models are refined across multiple client reviews. We work in BIM from this stage — coordinating structure, MEP, and landscape as one integrated system rather than layered afterthoughts.\n              <\/p>\n            <\/div>\n            <div class=\"w-full md:w-40 flex-shrink-0 rounded-xl overflow-hidden\" style=\"height:120px\">\n              <img src=\"https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=320&h=240&q=80&auto=format&fit=crop\" alt=\"Design Development\" class=\"w-full h-full object-cover\" style=\"filter:brightness(0.85) sepia(0.18)\">\n            <\/div>\n          <\/div>\n        <\/div>\n\n        <!-- Step 04 -->\n        <div class=\"flex flex-col md:flex-row gap-6 md:gap-10 pb-12 md:pb-16 relative\">\n          <div class=\"flex md:flex-col items-center md:items-start gap-4 md:gap-0 flex-shrink-0\">\n            <div class=\"w-[104px] flex-shrink-0 flex items-center justify-center\">\n              <div class=\"w-10 h-10 rounded-full flex items-center justify-center border\" style=\"border-color:var(--accent);background:var(--bg)\">\n                <span style=\"font-family:var(--font-mono);font-size:0.65rem;color:var(--accent)\">04<\/span>\n              <\/div>\n            <\/div>\n          <\/div>\n          <div class=\"flex flex-col md:flex-row gap-6 md:gap-10 flex-1 items-start\">\n            <div class=\"flex-1\">\n              <h3 class=\"font-display text-xl md:text-2xl mb-3\" style=\"color:var(--text)\">Documentation<\/h3>\n              <p style=\"color:var(--ink-muted);font-family:var(--font-body);line-height:1.75;font-size:0.95rem\">\n                Precision at this stage protects the project on site. We produce complete construction drawing sets, RERA-compliant submissions, specification books, and tender packages. Our documentation is a craftsman's manual — unambiguous, annotated, and beautiful in its own right.\n              <\/p>\n            <\/div>\n            <div class=\"w-full md:w-40 flex-shrink-0 rounded-xl overflow-hidden\" style=\"height:120px\">\n              <img src=\"https://picsum.photos/seed/fashion-c4/320/240\" alt=\"Documentation\" class=\"w-full h-full object-cover\" style=\"filter:brightness(0.82) sepia(0.22)\">\n            <\/div>\n          <\/div>\n        <\/div>\n\n        <!-- Step 05 -->\n        <div class=\"flex flex-col md:flex-row gap-6 md:gap-10 pb-2 relative\">\n          <div class=\"flex md:flex-col items-center md:items-start gap-4 md:gap-0 flex-shrink-0\">\n            <div class=\"w-[104px] flex-shrink-0 flex items-center justify-center\">\n              <div class=\"w-10 h-10 rounded-full flex items-center justify-center border\" style=\"border-color:var(--accent);background:var(--bg)\">\n                <span style=\"font-family:var(--font-mono);font-size:0.65rem;color:var(--accent)\">05<\/span>\n              <\/div>\n            <\/div>\n          <\/div>\n          <div class=\"flex flex-col md:flex-row gap-6 md:gap-10 flex-1 items-start\">\n            <div class=\"flex-1\">\n              <h3 class=\"font-display text-xl md:text-2xl mb-3\" style=\"color:var(--text)\">Site Execution<\/h3>\n              <p style=\"color:var(--ink-muted);font-family:var(--font-body);line-height:1.75;font-size:0.95rem\">\n                We remain on site. Weekly reviews, contractor coordination, material approvals, and mock-up sign-offs are non-negotiable. The difference between a good drawing and a great building is the quality of presence — ours is unwavering until the last threshold is set.\n              <\/p>\n            <\/div>\n            <div class=\"w-full md:w-40 flex-shrink-0 rounded-xl overflow-hidden\" style=\"height:120px\">\n              <img src=\"https://picsum.photos/seed/fashion-c5/320/240\" alt=\"Site Execution\" class=\"w-full h-full object-cover\" style=\"filter:brightness(0.82) sepia(0.2)\">\n            <\/div>\n          <\/div>\n        <\/div>\n\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- 3. Services Deep-Dive Grid -->\n<section class=\"px-6 md:px-10 py-16 md:py-24\" style=\"background:var(--bg-elev)\">\n  <div class=\"max-w-7xl mx-auto\">\n    <div class=\"mb-12\">\n      <span class=\"eyebrow\" style=\"color:var(--accent);letter-spacing:0.16em;font-size:0.7rem\">What We Offer<\/span>\n      <h2 class=\"font-display text-3xl md:text-5xl mt-3\" style=\"color:var(--text)\">Six ways we <em>shape<\/em> space<\/h2>\n    <\/div>\n\n    <div class=\"grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 stagger\">\n\n      <!-- Architecture -->\n      <div class=\"card p-7 rounded-2xl flex flex-col gap-5 group hover:-translate-y-1 transition-transform duration-300\" style=\"background:var(--card);border:1px solid var(--line)\">\n        <div class=\"flex items-center gap-3\">\n          <div class=\"w-8 h-8 rounded-lg flex items-center justify-center\" style=\"background:rgba(200,146,74,0.12)\">\n            <i data-lucide=\"home\" style=\"width:16px;height:16px;color:var(--accent)\"><\/i>\n          <\/div>\n          <h3 class=\"font-display text-lg\" style=\"color:var(--text)\">Architecture<\/h3>\n        <\/div>\n        <p style=\"color:var(--ink-muted);font-family:var(--font-body);font-size:0.9rem;line-height:1.75\">\n          Full-service architectural design from feasibility through occupation. We work across residential, hospitality, and commercial typologies, always beginning from site, light, and the specific logic of inhabitation rather than style.\n        <\/p>\n        <!-- Material Swatch Stack -->\n        <div class=\"flex flex-col gap-1.5 mt-auto pt-4\" style=\"border-top:1px solid var(--line)\">\n          <span class=\"eyebrow\" style=\"font-size:0.6rem;color:var(--ink-dim);letter-spacing:0.14em\">Material Palette<\/span>\n          <div class=\"flex gap-2 mt-1\">\n            <div class=\"flex flex-col items-center gap-1\">\n              <div class=\"w-8 h-8 rounded\" style=\"background:linear-gradient(135deg,#c8a882,#a07850);box-shadow:0 1px 4px rgba(0,0,0,0.18)\"><\/div>\n              <span style=\"font-family:var(--font-mono);font-size:0.52rem;color:var(--ink-dim)\">Travertine<\/span>\n            <\/div>\n            <div class=\"flex flex-col items-center gap-1\">\n              <div class=\"w-8 h-8 rounded\" style=\"background:linear-gradient(135deg,#7a5c3a,#5a3e22);box-shadow:0 1px 4px rgba(0,0,0,0.18)\"><\/div>\n              <span style=\"font-family:var(--font-mono);font-size:0.52rem;color:var(--ink-dim)\">Teak<\/span>\n            <\/div>\n            <div class=\"flex flex-col items-center gap-1\">\n              <div class=\"w-8 h-8 rounded\" style=\"background:linear-gradient(135deg,#b5a090,#8c7060);box-shadow:0 1px 4px rgba(0,0,0,0.18)\"><\/div>\n              <span style=\"font-family:var(--font-mono);font-size:0.52rem;color:var(--ink-dim)\">Laterite<\/span>\n            <\/div>\n            <div class=\"flex flex-col items-center gap-1\">\n              <div class=\"w-8 h-8 rounded\" style=\"background:linear-gradient(135deg,#9e9e8e,#6e6e5e);box-shadow:0 1px 4px rgba(0,0,0,0.18)\"><\/div>\n              <span style=\"font-family:var(--font-mono);font-size:0.52rem;color:var(--ink-dim)\">Concrete<\/span>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n\n      <!-- Interior Design -->\n      <div class=\"card p-7 rounded-2xl flex flex-col gap-5 group hover:-translate-y-1 transition-transform duration-300\" style=\"background:var(--card);border:1px solid var(--line)\">\n        <div class=\"flex items-center gap-3\">\n          <div class=\"w-8 h-8 rounded-lg flex items-center justify-center\" style=\"background:rgba(200,146,74,0.12)\">\n            <i data-lucide=\"layers\" style=\"width:16px;height:16px;color:var(--accent)\"><\/i>\n          <\/div>\n          <h3 class=\"font-display text-lg\" style=\"color:var(--text)\">Interior Design<\/h3>\n        <\/div>\n        <p style=\"color:var(--ink-muted);font-family:var(--font-body);font-size:0.9rem;line-height:1.75\">\n          Interior environments conceived as complete sensory experiences. Furniture selection, custom joinery design, textile curation, and lighting choreography — each layer considered in relation to the whole, never assembled from a catalogue of trends.\n        <\/p>\n        <div class=\"flex flex-col gap-1.5 mt-auto pt-4\" style=\"border-top:1px solid var(--line)\">\n          <span class=\"eyebrow\" style=\"font-size:0.6rem;color:var(--ink-dim);letter-spacing:0.14em\">Material Palette<\/span>\n          <div class=\"flex gap-2 mt-1\">\n            <div class=\"flex flex-col items-center gap-1\">\n              <div class=\"w-8 h-8 rounded\" style=\"background:linear-gradient(135deg,#e8d8c0,#c8b090);box-shadow:0 1px 4px rgba(0,0,0,0.18)\"><\/div>\n              <span style=\"font-family:var(--font-mono);font-size:0.52rem;color:var(--ink-dim)\">Linen<\/span>\n            <\/div>\n            <div class=\"flex flex-col items-center gap-1\">\n              <div class=\"w-8 h-8 rounded\" style=\"background:linear-gradient(135deg,#d4c4a0,#b4a478);box-shadow:0 1px 4px rgba(0,0,0,0.18)\"><\/div>\n              <span style=\"font-family:var(--font-mono);font-size:0.52rem;color:var(--ink-dim)\">Plaster<\/span>\n            <\/div>\n            <div class=\"flex flex-col items-center gap-1\">\n              <div class=\"w-8 h-8 rounded\" style=\"background:linear-gradient(135deg,#8a7060,#6a5040);box-shadow:0 1px 4px rgba(0,0,0,0.18)\"><\/div>\n              <span style=\"font-family:var(--font-mono);font-size:0.52rem;color:var(--ink-dim)\">Walnut<\/span>\n            <\/div>\n            <div class=\"flex flex-col items-center gap-1\">\n              <div class=\"w-8 h-8 rounded\" style=\"background:linear-gradient(135deg,#b0a898,#908878);box-shadow:0 1px 4px rgba(0,0,0,0.18)\"><\/div>\n              <span style=\"font-family:var(--font-mono);font-size:0.52rem;color:var(--ink-dim)\">Stone<\/span>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n\n      <!-- Landscape Integration -->\n      <div class=\"card p-7 rounded-2xl flex flex-col gap-5 group hover:-translate-y-1 transition-transform duration-300\" style=\"background:var(--card);border:1px solid var(--line)\">\n        <div class=\"flex items-center gap-3\">\n          <div class=\"w-8 h-8 rounded-lg flex items-center justify-center\" style=\"background:rgba(200,146,74,0.12)\">\n            <i data-lucide=\"leaf\" style=\"width:16px;height:16px;color:var(--accent)\"><\/i>\n          <\/div>\n          <h3 class=\"font-display text-lg\" style=\"color:var(--text)\">Landscape Integration<\/h3>\n        <\/div>\n        <p style=\"color:var(--ink-muted);font-family:var(--font-body);font-size:0.9rem;line-height:1.75\">\n          The ground plane is never an afterthought. We design the transition between built and living, specifying planting, water, and hardscape with the same rigour applied inside. Our Alibaug and Goa projects demonstrate landscape as architecture's most poetic continuation.\n        <\/p>\n        <div class=\"flex flex-col gap-1.5 mt-auto pt-4\" style=\"border-top:1px solid var(--line)\">\n          <span class=\"eyebrow\" style=\"font-size:0.6rem;color:var(--ink-dim);letter-spacing:0.14em\">Material Palette<\/span>\n          <div class=\"flex gap-2 mt-1\">\n            <div class=\"flex flex-col items-center gap-1\">\n              <div class=\"w-8 h-8 rounded\" style=\"background:linear-gradient(135deg,#6a7a5a,#4a5a3a);box-shadow:0 1px 4px rgba(0,0,0,0.18)\"><\/div>\n              <span style=\"font-family:var(--font-mono);font-size:0.52rem;color:var(--ink-dim)\">Basalt<\/span>\n            <\/div>\n            <div class=\"flex flex-col items-center gap-1\">\n              <div class=\"w-8 h-8 rounded\" style=\"background:linear-gradient(135deg,#c0b090,#a09070);box-shadow:0 1px 4px rgba(0,0,0,0.18)\"><\/div>\n              <span style=\"font-family:var(--font-mono);font-size:0.52rem;color:var(--ink-dim)\">Sandstone<\/span>\n            <\/div>\n            <div class=\"flex flex-col items-center gap-1\">\n              <div class=\"w-8 h-8 rounded\" style=\"background:linear-gradient(135deg,#5a8060,#3a6040);box-shadow:0 1px 4px rgba(0,0,0,0.18)\"><\/div>\n              <span style=\"font-family:var(--font-mono);font-size:0.52rem;color:var(--ink-dim)\">Bamboo<\/span>\n            <\/div>\n            <div class=\"flex flex-col items-center gap-1\">\n              <div class=\"w-8 h-8 rounded\" style=\"background:linear-gradient(135deg,#7890a0,#587080);box-shadow:0 1px 4px rgba(0,0,0,0.18)\"><\/div>\n              <span style=\"font-family:var(--font-mono);font-size:0.52rem;color:var(--ink-dim)\">Water<\/span>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n\n      <!-- Material Curation -->\n      <div class=\"card p-7 rounded-2xl flex flex-col gap-5 group hover:-translate-y-1 transition-transform duration-300\" style=\"background:var(--card);border:1px solid var(--line)\">\n        <div class=\"flex items-center gap-3\">\n          <div class=\"w-8 h-8 rounded-lg flex items-center justify-center\" style=\"background:rgba(200,146,74,0.12)\">\n            <i data-lucide=\"grid-3x3\" style=\"width:16px;height:16px;color:var(--accent)\"><\/i>\n          <\/div>\n          <h3 class=\"font-display text-lg\" style=\"color:var(--text)\">Material Curation<\/h3>\n        <\/div>\n        <p style=\"color:var(--ink-muted);font-family:var(--font-body);font-size:0.9rem;line-height:1.75\">\n          We source materials with the eye of a collector: Kota stone from Rajasthan quarries, reclaimed teak from Kerala demolitions, hand-trowelled Venetian plaster from Mumbai craftsmen with forty years of practice. Provenance is part of the specification.\n        <\/p>\n        <div class=\"flex flex-col gap-1.5 mt-auto pt-4\" style=\"border-top:1px solid var(--line)\">\n          <span class=\"eyebrow\" style=\"font-size:0.6rem;color:var(--ink-dim);letter-spacing:0.14em\">Material Palette<\/span>\n          <div class=\"flex gap-2 mt-1\">\n            <div class=\"flex flex-col items-center gap-1\">\n              <div class=\"w-8 h-8 rounded\" style=\"background:linear-gradient(135deg,#b8a878,#988858);box-shadow:0 1px 4px rgba(0,0,0,0.18)\"><\/div>\n              <span style=\"font-family:var(--font-mono);font-size:0.52rem;color:var(--ink-dim)\">Kota<\/span>\n            <\/div>\n            <div class=\"flex flex-col items-center gap-1\">\n              <div class=\"w-8 h-8 rounded\" style=\"background:linear-gradient(135deg,#c0a060,#a08040);box-shadow:0 1px 4px rgba(0,0,0,0.18)\"><\/div>\n              <span style=\"font-family:var(--font-mono);font-size:0.52rem;color:var(--ink-dim)\">R.Teak<\/span>\n            <\/div>\n            <div class=\"flex flex-col items-center gap-1\">\n              <div class=\"w-8 h-8 rounded\" style=\"background:linear-gradient(135deg,#e0d0b8,#c0b098);box-shadow:0 1px 4px rgba(0,0,0,0.18)\"><\/div>\n              <span style=\"font-family:var(--font-mono);font-size:0.52rem;color:var(--ink-dim)\">V.Plaster<\/span>\n            <\/div>\n            <div class=\"flex flex-col items-center gap-1\">\n              <div class=\"w-8 h-8 rounded\" style=\"background:linear-gradient(135deg,#a09888,#807868);box-shadow:0 1px 4px rgba(0,0,0,0.18)\"><\/div>\n              <span style=\"font-family:var(--font-mono);font-size:0.52rem;color:var(--ink-dim)\">R.Earth<\/span>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n\n      <!-- Art Procurement -->\n      <div class=\"card p-7 rounded-2xl flex flex-col gap-5 group hover:-translate-y-1 transition-transform duration-300\" style=\"background:var(--card);border:1px solid var(--line)\">\n        <div class=\"flex items-center gap-3\">\n          <div class=\"w-8 h-8 rounded-lg flex items-center justify-center\" style=\"background:rgba(200,146,74,0.12)\">\n            <i data-lucide=\"frame\" style=\"width:16px;height:16px;color:var(--accent)\"><\/i>\n          <\/div>\n          <h3 class=\"font-display text-lg\" style=\"color:var(--text)\">Art Procurement<\/h3>\n        <\/div>\n        <p style=\"color:var(--ink-muted);font-family:var(--font-body);font-size:0.9rem;line-height:1.75\">\n          We work with a curated circle of Indian contemporary artists, sculptors, and ceramicists to place work that belongs — not decorates. Our Mehta Penthouse project integrated twelve original works into the architecture from concept stage, treating art as structure, not furniture.\n        <\/p>\n        <div class=\"flex flex-col gap-1.5 mt-auto pt-4\" style=\"border-top:1px solid var(--line)\">\n          <span class=\"eyebrow\" style=\"font-size:0.6rem;color:var(--ink-dim);letter-spacing:0.14em\">Medium Range<\/span>\n          <div class=\"flex gap-2 mt-1\">\n            <div class=\"flex flex-col items-center gap-1\">\n              <div class=\"w-8 h-8 rounded\" style=\"background:linear-gradient(135deg,#d4a060,#b48040);box-shadow:0 1px 4px rgba(0,0,0,0.18)\"><\/div>\n              <span style=\"font-family:var(--font-mono);font-size:0.52rem;color:var(--ink-dim)\">Bronze<\/span>\n            <\/div>\n            <div class=\"flex flex-col items-center gap-1\">\n              <div class=\"w-8 h-8 rounded\" style=\"background:linear-gradient(135deg,#e8e0d0,#c8c0b0);box-shadow:0 1px 4px rgba(0,0,0,0.18)\"><\/div>\n              <span style=\"font-family:var(--font-mono);font-size:0.52rem;color:var(--ink-dim)\">Canvas<\/span>\n            <\/div>\n            <div class=\"flex flex-col items-center gap-1\">\n              <div class=\"w-8 h-8 rounded\" style=\"background:linear-gradient(135deg,#b0a8c0,#908098);box-shadow:0 1px 4px rgba(0,0,0,0.18)\"><\/div>\n              <span style=\"font-family:var(--font-mono);font-size:0.52rem;color:var(--ink-dim)\">Ceramic<\/span>\n            <\/div>\n            <div class=\"flex flex-col items-center gap-1\">\n              <div class=\"w-8 h-8 rounded\" style=\"background:linear-gradient(135deg,#a8b0b8,#888890);box-shadow:0 1px 4px rgba(0,0,0,0.18)\"><\/div>\n              <span style=\"font-family:var(--font-mono);font-size:0.52rem;color:var(--ink-dim)\">Steel<\/span>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n\n      <!-- Post-Occupancy Review -->\n      <div class=\"card p-7 rounded-2xl flex flex-col gap-5 group hover:-translate-y-1 transition-transform duration-300\" style=\"background:var(--card);border:1px solid var(--line)\">\n        <div class=\"flex items-center gap-3\">\n          <div class=\"w-8 h-8 rounded-lg flex items-center justify-center\" style=\"background:rgba(200,146,74,0.12)\">\n            <i data-lucide=\"clipboard-check\" style=\"width:16px;height:16px;color:var(--accent)\"><\/i>\n          <\/div>\n          <h3 class=\"font-display text-lg\" style=\"color:var(--text)\">Post-Occupancy Review<\/h3>\n        <\/div>\n        <p style=\"color:var(--ink-muted);font-family:var(--font-body);font-size:0.9rem;line-height:1.75\">\n          Six months after handover, we return. We walk the space with you, document what has settled beautifully and what warrants refinement. This review has no additional fee — it is simply how we close a project with integrity, and how we continue to learn from every building we make.\n        <\/p>\n        <div class=\"flex flex-col gap-1.5 mt-auto pt-4\" style=\"border-top:1px solid var(--line)\">\n          <span class=\"eyebrow\" style=\"font-size:0.6rem;color:var(--ink-dim);letter-spacing:0.14em\">Commitment<\/span>\n          <div class=\"flex gap-2 mt-1 items-center\">\n            <span class=\"badge badge-green\" style=\"font-size:0.65rem\">Included in all mandates<\/span>\n            <span class=\"badge badge-amber\" style=\"font-size:0.65rem\">6-month return<\/span>\n          <\/div>\n        <\/div>\n      <\/div>\n\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- 4. Capabilities Call-Out -->\n<section class=\"px-6 md:px-10 py-16 md:py-24\" style=\"background:var(--bg)\">\n  <div class=\"max-w-7xl mx-auto\">\n    <div class=\"grid grid-cols-1 md:grid-cols-2 gap-10 md:gap-16 items-center\">\n\n      <!-- Left: Technical Capabilities -->\n      <div>\n        <span class=\"eyebrow\" style=\"color:var(--accent);letter-spacing:0.16em;font-size:0.7rem\">Technical Depth<\/span>\n        <h2 class=\"font-display text-3xl md:text-5xl mt-3 mb-8\" style=\"color:var(--text)\">Built on <em>rigour<\/em>, delivered with care<\/h2>\n\n        <div class=\"space-y-5\">\n          <div class=\"flex items-start gap-4 p-5 rounded-xl\" style=\"background:var(--bg-elev);border:","pricing":"<section class=\"px-6 md:px-10 py-14 md:py-20\" style=\"background:var(--bg)\">\n  <div class=\"max-w-7xl mx-auto\">\n    <div class=\"flex flex-col gap-4 max-w-2xl\">\n      <span class=\"eyebrow\" style=\"color:var(--ink-muted);letter-spacing:0.18em\">Investment<\/span>\n      <h1 class=\"text-4xl md:text-6xl font-display leading-tight\" style=\"font-family:var(--font-display)\">\n        Designed around your <em>project's scale<\/em>\n      <\/h1>\n      <p class=\"text-lg md:text-xl\" style=\"color:var(--ink-muted);font-family:var(--font-body);max-width:52ch;line-height:1.7\">\n        Every Studio Terra engagement is structured to reflect the complexity, ambition, and craft your project demands. There are no fixed packages — only frameworks that we shape together at the start of each brief.\n      <\/p>\n      <div class=\"mt-2 h-px w-16\" style=\"background:var(--primary);opacity:0.6\"><\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- Section 2: Engagement Model Cards -->\n<section class=\"px-6 md:px-10 pb-14 md:pb-20\" style=\"background:var(--bg)\">\n  <div class=\"max-w-7xl mx-auto\">\n    <div class=\"grid grid-cols-1 md:grid-cols-3 gap-6 stagger\">\n\n      <!-- Card 1 -->\n      <div class=\"card rounded-2xl flex flex-col gap-6 p-8 md:p-10 relative overflow-hidden\" style=\"background:var(--card);border:1px solid var(--line)\">\n        <div class=\"absolute top-0 right-0 w-32 h-32 rounded-bl-full opacity-10\" style=\"background:var(--primary)\"><\/div>\n        <div>\n          <span class=\"eyebrow\" style=\"color:var(--primary);font-size:0.65rem;letter-spacing:0.2em\">Advisory<\/span>\n          <h2 class=\"mt-2 text-2xl md:text-3xl font-display\" style=\"font-family:var(--font-display)\">Interior <em>Consultation<\/em><\/h2>\n          <div class=\"mt-4 flex items-baseline gap-2\">\n            <span class=\"text-4xl font-mono\" style=\"font-family:var(--font-mono);color:var(--primary)\">₹1.5 L<\/span>\n            <span class=\"text-sm\" style=\"color:var(--ink-muted)\">flat fee<\/span>\n          <\/div>\n          <p class=\"mt-2 text-sm\" style=\"color:var(--ink-dim)\">A scoped, single-engagement advisory — ideal for clients who want expert direction before committing to a full project.<\/p>\n        <\/div>\n        <div class=\"divider\" style=\"margin:0\"><\/div>\n        <ul class=\"flex flex-col gap-3\">\n          <li class=\"flex items-start gap-3 text-sm\" style=\"color:var(--text)\">\n            <i data-lucide=\"check\" class=\"w-4 h-4 mt-0.5 shrink-0\" style=\"color:var(--primary)\"><\/i>\n            <span>Two-session deep-dive (3 hrs each) at your site or studio<\/span>\n          <\/li>\n          <li class=\"flex items-start gap-3 text-sm\" style=\"color:var(--text)\">\n            <i data-lucide=\"check\" class=\"w-4 h-4 mt-0.5 shrink-0\" style=\"color:var(--primary)\"><\/i>\n            <span>Spatial concept brief and material direction document<\/span>\n          <\/li>\n          <li class=\"flex items-start gap-3 text-sm\" style=\"color:var(--text)\">\n            <i data-lucide=\"check\" class=\"w-4 h-4 mt-0.5 shrink-0\" style=\"color:var(--primary)\"><\/i>\n            <span>Mood board and reference set curated to your brief<\/span>\n          <\/li>\n          <li class=\"flex items-start gap-3 text-sm\" style=\"color:var(--text)\">\n            <i data-lucide=\"check\" class=\"w-4 h-4 mt-0.5 shrink-0\" style=\"color:var(--primary)\"><\/i>\n            <span>Vendor and contractor shortlist with indicative budgets<\/span>\n          <\/li>\n          <li class=\"flex items-start gap-3 text-sm\" style=\"color:var(--text)\">\n            <i data-lucide=\"check\" class=\"w-4 h-4 mt-0.5 shrink-0\" style=\"color:var(--primary)\"><\/i>\n            <span>One revision round on the direction document<\/span>\n          <\/li>\n        <\/ul>\n        <button class=\"btn btn-ghost mt-auto w-full\" style=\"border:1px solid var(--primary);color:var(--primary)\">Begin a Brief<\/button>\n      <\/div>\n\n      <!-- Card 2 — featured -->\n      <div class=\"card rounded-2xl flex flex-col gap-6 p-8 md:p-10 relative overflow-hidden\" style=\"background:var(--primary);color:#1a120a;border:1px solid var(--primary)\">\n        <div class=\"absolute -bottom-8 -right-8 w-40 h-40 rounded-full opacity-20\" style=\"background:#fff\"><\/div>\n        <div>\n          <span class=\"eyebrow\" style=\"color:#1a120a;opacity:0.7;font-size:0.65rem;letter-spacing:0.2em\">End-to-end<\/span>\n          <h2 class=\"mt-2 text-2xl md:text-3xl font-display\" style=\"font-family:var(--font-display);color:#1a120a\">Full Interior <em>Design<\/em><\/h2>\n          <div class=\"mt-4 flex items-baseline gap-2\">\n            <span class=\"text-4xl font-mono\" style=\"font-family:var(--font-mono);color:#1a120a\">8–12%<\/span>\n            <span class=\"text-sm\" style=\"color:#1a120a;opacity:0.7\">of project cost<\/span>\n          <\/div>\n          <p class=\"mt-2 text-sm\" style=\"color:#1a120a;opacity:0.75\">Our most comprehensive interior offering — from first concept to final snagging. A true creative partnership over the full arc of your project.<\/p>\n        <\/div>\n        <div class=\"h-px w-full\" style=\"background:#1a120a;opacity:0.2\"><\/div>\n        <ul class=\"flex flex-col gap-3\">\n          <li class=\"flex items-start gap-3 text-sm\" style=\"color:#1a120a\">\n            <i data-lucide=\"check\" class=\"w-4 h-4 mt-0.5 shrink-0\" style=\"color:#1a120a\"><\/i>\n            <span>Full space planning, concept, and schematic design<\/span>\n          <\/li>\n          <li class=\"flex items-start gap-3 text-sm\" style=\"color:#1a120a\">\n            <i data-lucide=\"check\" class=\"w-4 h-4 mt-0.5 shrink-0\" style=\"color:#1a120a\"><\/i>\n            <span>Material, finish, and fixture specification with samples<\/span>\n          <\/li>\n          <li class=\"flex items-start gap-3 text-sm\" style=\"color:#1a120a\">\n            <i data-lucide=\"check\" class=\"w-4 h-4 mt-0.5 shrink-0\" style=\"color:#1a120a\"><\/i>\n            <span>Detailed working drawings and BOQ for contractors<\/span>\n          <\/li>\n          <li class=\"flex items-start gap-3 text-sm\" style=\"color:#1a120a\">\n            <i data-lucide=\"check\" class=\"w-4 h-4 mt-0.5 shrink-0\" style=\"color:#1a120a\"><\/i>\n            <span>Procurement coordination (cost-plus model)<\/span>\n          <\/li>\n          <li class=\"flex items-start gap-3 text-sm\" style=\"color:#1a120a\">\n            <i data-lucide=\"check\" class=\"w-4 h-4 mt-0.5 shrink-0\" style=\"color:#1a120a\"><\/i>\n            <span>Site supervision and contractor liaison throughout<\/span>\n          <\/li>\n          <li class=\"flex items-start gap-3 text-sm\" style=\"color:#1a120a\">\n            <i data-lucide=\"check\" class=\"w-4 h-4 mt-0.5 shrink-0\" style=\"color:#1a120a\"><\/i>\n            <span>Styling and art placement at handover<\/span>\n          <\/li>\n        <\/ul>\n        <button class=\"btn mt-auto w-full\" style=\"background:#1a120a;color:var(--primary);border:none;font-weight:600\">Begin a Brief<\/button>\n      <\/div>\n\n      <!-- Card 3 -->\n      <div class=\"card rounded-2xl flex flex-col gap-6 p-8 md:p-10 relative overflow-hidden\" style=\"background:var(--card);border:1px solid var(--line)\">\n        <div class=\"absolute top-0 left-0 w-24 h-24 rounded-br-full opacity-10\" style=\"background:var(--primary)\"><\/div>\n        <div>\n          <span class=\"eyebrow\" style=\"color:var(--primary);font-size:0.65rem;letter-spacing:0.2em\">Integrated<\/span>\n          <h2 class=\"mt-2 text-2xl md:text-3xl font-display\" style=\"font-family:var(--font-display)\">Architecture <em>+ Interior<\/em><\/h2>\n          <div class=\"mt-4 flex items-baseline gap-2\">\n            <span class=\"text-4xl font-mono\" style=\"font-family:var(--font-mono);color:var(--primary)\">Bespoke<\/span>\n          <\/div>\n          <p class=\"mt-2 text-sm\" style=\"color:var(--ink-dim)\">Architecture and interiors conceived as a single, seamless act of making — fee structured after an initial discovery meeting.<\/p>\n        <\/div>\n        <div class=\"divider\" style=\"margin:0\"><\/div>\n        <ul class=\"flex flex-col gap-3\">\n          <li class=\"flex items-start gap-3 text-sm\" style=\"color:var(--text)\">\n            <i data-lucide=\"check\" class=\"w-4 h-4 mt-0.5 shrink-0\" style=\"color:var(--primary)\"><\/i>\n            <span>Site analysis, feasibility, and regulatory approvals<\/span>\n          <\/li>\n          <li class=\"flex items-start gap-3 text-sm\" style=\"color:var(--text)\">\n            <i data-lucide=\"check\" class=\"w-4 h-4 mt-0.5 shrink-0\" style=\"color:var(--primary)\"><\/i>\n            <span>Full architectural drawings and structural coordination<\/span>\n          <\/li>\n          <li class=\"flex items-start gap-3 text-sm\" style=\"color:var(--text)\">\n            <i data-lucide=\"check\" class=\"w-4 h-4 mt-0.5 shrink-0\" style=\"color:var(--primary)\"><\/i>\n            <span>Integrated interior design across all spaces<\/span>\n          <\/li>\n          <li class=\"flex items-start gap-3 text-sm\" style=\"color:var(--text)\">\n            <i data-lucide=\"check\" class=\"w-4 h-4 mt-0.5 shrink-0\" style=\"color:var(--primary)\"><\/i>\n            <span>MEP and landscape design coordination<\/span>\n          <\/li>\n          <li class=\"flex items-start gap-3 text-sm\" style=\"color:var(--text)\">\n            <i data-lucide=\"check\" class=\"w-4 h-4 mt-0.5 shrink-0\" style=\"color:var(--primary)\"><\/i>\n            <span>Full construction administration and quality control<\/span>\n          <\/li>\n          <li class=\"flex items-start gap-3 text-sm\" style=\"color:var(--text)\">\n            <i data-lucide=\"check\" class=\"w-4 h-4 mt-0.5 shrink-0\" style=\"color:var(--primary)\"><\/i>\n            <span>Post-occupancy review at 6 months<\/span>\n          <\/li>\n        <\/ul>\n        <button class=\"btn btn-ghost mt-auto w-full\" style=\"border:1px solid var(--primary);color:var(--primary)\">Request a Quote<\/button>\n      <\/div>\n\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- Section 3: Fee Transparency Note -->\n<section class=\"px-6 md:px-10 py-14 md:py-20\" style=\"background:var(--bg-elev);border-top:1px solid var(--line);border-bottom:1px solid var(--line)\">\n  <div class=\"max-w-7xl mx-auto\">\n    <div class=\"grid grid-cols-1 md:grid-cols-2 gap-12 md:gap-20 items-center\">\n      <div>\n        <span class=\"eyebrow\" style=\"color:var(--ink-muted);letter-spacing:0.18em\">How We Work<\/span>\n        <h2 class=\"mt-3 text-3xl md:text-5xl font-display leading-tight\" style=\"font-family:var(--font-display)\">\n          A <em>transparent<\/em> framework for every rupee spent\n        <\/h2>\n        <div class=\"mt-8 flex flex-col gap-5 text-base leading-relaxed\" style=\"font-family:var(--font-body);color:var(--ink-muted)\">\n          <p>\n            Studio Terra operates on a <span style=\"color:var(--primary);font-weight:600\">cost-plus procurement model<\/span> — all materials, furniture, and finishes sourced on your behalf are passed through at actual supplier cost, with a transparent <span style=\"color:var(--primary);font-weight:600\">12% procurement margin<\/span> applied. You see every invoice. There are no hidden markups.\n          <\/p>\n          <p>\n            Design fees are structured across <span style=\"color:var(--primary);font-weight:600\">four billing milestones<\/span>: 25% on signing, 25% at concept approval, 25% at working drawing issue, and the final 25% at project handover. This aligns our incentives entirely with yours.\n          <\/p>\n          <p>\n            All fees are quoted <span style=\"color:var(--primary);font-weight:600\">exclusive of GST<\/span>. Applicable GST at 18% is charged on design and consultancy services as per prevailing Indian tax regulations. Procurement invoices attract GST as per the relevant goods category.\n          <\/p>\n          <p>\n            We do not retain commissions from contractors, vendors, or artisans. Our only income is the agreed design fee and the stated procurement margin — a model we believe creates the conditions for truly <span style=\"color:var(--primary);font-weight:600\">uncompromised material choices<\/span>.\n          <\/p>\n        <\/div>\n      <\/div>\n      <div class=\"relative rounded-2xl overflow-hidden\" style=\"aspect-ratio:4/5;min-height:360px\">\n        <img src=\"https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=900&h=700&q=80&auto=format&fit=crop\" alt=\"Studio Terra material craft\" class=\"w-full h-full object-cover\">\n        <div class=\"absolute inset-0\" style=\"background:linear-gradient(to top, rgba(20,12,4,0.7) 0%, transparent 60%)\"><\/div>\n        <div class=\"absolute bottom-6 left-6 right-6\">\n          <p class=\"text-xs font-mono\" style=\"font-family:var(--font-mono);color:var(--primary);letter-spacing:0.15em\">NOOR OFFICE, BKC<\/p>\n          <p class=\"mt-1 text-sm\" style=\"color:rgba(255,255,255,0.8)\">Rammed-earth partition walls — every material sourced and verified<\/p>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- Section 4: Typical Project Investment Band -->\n<section class=\"px-6 md:px-10 py-14 md:py-20\" style=\"background:var(--bg)\">\n  <div class=\"max-w-7xl mx-auto\">\n    <div class=\"mb-10\">\n      <span class=\"eyebrow\" style=\"color:var(--ink-muted);letter-spacing:0.18em\">Indicative Investment<\/span>\n      <h2 class=\"mt-3 text-3xl md:text-5xl font-display leading-tight\" style=\"font-family:var(--font-display)\">\n        What projects typically <em>cost to realise<\/em>\n      <\/h2>\n      <p class=\"mt-3 text-base\" style=\"color:var(--ink-muted);font-family:var(--font-body);max-width:60ch\">\n        The figures below reflect total project investment — construction, materials, FF&amp;E, and design fees combined — drawn from our completed work. Actual costs vary with specification level, site conditions, and programme.\n      <\/p>\n    <\/div>\n\n    <div class=\"overflow-x-auto rounded-2xl\" style=\"border:1px solid var(--line)\">\n      <table class=\"w-full text-sm\" style=\"border-collapse:collapse;font-family:var(--font-body)\">\n        <thead>\n          <tr style=\"background:var(--bg-elev);border-bottom:1px solid var(--line)\">\n            <th class=\"text-left px-6 py-4 font-mono text-xs tracking-widest uppercase\" style=\"font-family:var(--font-mono);color:var(--ink-muted)\">Project Type<\/th>\n            <th class=\"text-left px-6 py-4 font-mono text-xs tracking-widest uppercase\" style=\"font-family:var(--font-mono);color:var(--ink-muted)\">Typical Scale<\/th>\n            <th class=\"text-left px-6 py-4 font-mono text-xs tracking-widest uppercase\" style=\"font-family:var(--font-mono);color:var(--ink-muted)\">Investment Range<\/th>\n            <th class=\"text-left px-6 py-4 font-mono text-xs tracking-widest uppercase\" style=\"font-family:var(--font-mono);color:var(--ink-muted)\">Engagement Model<\/th>\n            <th class=\"text-left px-6 py-4 font-mono text-xs tracking-widest uppercase\" style=\"font-family:var(--font-mono);color:var(--ink-muted)\">Timeline<\/th>\n          <\/tr>\n        <\/thead>\n        <tbody>\n          <tr style=\"border-bottom:1px solid var(--line)\">\n            <td class=\"px-6 py-5\">\n              <div class=\"font-display text-base\" style=\"font-family:var(--font-display)\">Apartment Interior<\/div>\n              <div class=\"text-xs mt-1\" style=\"color:var(--ink-dim)\">2–4 BHK residential fit-out<\/div>\n            <\/td>\n            <td class=\"px-6 py-5 font-mono text-sm\" style=\"font-family:var(--font-mono);color:var(--ink-muted)\">1,200–3,500 sq ft<\/td>\n            <td class=\"px-6 py-5\">\n              <span class=\"text-xl font-mono font-semibold\" style=\"font-family:var(--font-mono);color:var(--primary)\">₹40 – 90 L<\/span>\n            <\/td>\n            <td class=\"px-6 py-5\"><span class=\"badge badge-green text-xs\">Full Interior Design<\/span><\/td>\n            <td class=\"px-6 py-5 font-mono text-xs\" style=\"font-family:var(--font-mono);color:var(--ink-muted)\">5–9 months<\/td>\n          <\/tr>\n          <tr style=\"border-bottom:1px solid var(--line);background:var(--bg-elev)\">\n            <td class=\"px-6 py-5\">\n              <div class=\"font-display text-base\" style=\"font-family:var(--font-display)\">Villa Architecture<\/div>\n              <div class=\"text-xs mt-1\" style=\"color:var(--ink-dim)\">Ground-up or major restoration<\/div>\n            <\/td>\n            <td class=\"px-6 py-5 font-mono text-sm\" style=\"font-family:var(--font-mono);color:var(--ink-muted)\">4,000–12,000 sq ft<\/td>\n            <td class=\"px-6 py-5\">\n              <span class=\"text-xl font-mono font-semibold\" style=\"font-family:var(--font-mono);color:var(--primary)\">₹1.5 – 5 Cr<\/span>\n            <\/td>\n            <td class=\"px-6 py-5\"><span class=\"badge badge-amber text-xs\">Architecture + Interior<\/span><\/td>\n            <td class=\"px-6 py-5 font-mono text-xs\" style=\"font-family:var(--font-mono);color:var(--ink-muted)\">18–36 months<\/td>\n          <\/tr>\n          <tr style=\"border-bottom:1px solid var(--line)\">\n            <td class=\"px-6 py-5\">\n              <div class=\"font-display text-base\" style=\"font-family:var(--font-display)\">Hospitality Project<\/div>\n              <div class=\"text-xs mt-1\" style=\"color:var(--ink-dim)\">Café, restaurant, or boutique hotel<\/div>\n            <\/td>\n            <td class=\"px-6 py-5 font-mono text-sm\" style=\"font-family:var(--font-mono);color:var(--ink-muted)\">2,000 – 25,000 sq ft<\/td>\n            <td class=\"px-6 py-5\">\n              <span class=\"text-xl font-mono font-semibold\" style=\"font-family:var(--font-mono);color:var(--primary)\">₹80 L – 12 Cr<\/span>\n            <\/td>\n            <td class=\"px-6 py-5\"><span class=\"badge badge-amber text-xs\">Architecture + Interior<\/span><\/td>\n            <td class=\"px-6 py-5 font-mono text-xs\" style=\"font-family:var(--font-mono);color:var(--ink-muted)\">12–30 months<\/td>\n          <\/tr>\n          <tr style=\"background:var(--bg-elev)\">\n            <td class=\"px-6 py-5\">\n              <div class=\"font-display text-base\" style=\"font-family:var(--font-display)\">Commercial Office<\/div>\n              <div class=\"text-xs mt-1\" style=\"color:var(--ink-dim)\">Workplace interior fit-out<\/div>\n            <\/td>\n            <td class=\"px-6 py-5 font-mono text-sm\" style=\"font-family:var(--font-mono);color:var(--ink-muted)\">1,500–8,000 sq ft<\/td>\n            <td class=\"px-6 py-5\">\n              <span class=\"text-xl font-mono font-semibold\" style=\"font-family:var(--font-mono);color:var(--primary)\">₹60 L – 2.5 Cr<\/span>\n            <\/td>\n            <td class=\"px-6 py-5\"><span class=\"badge badge-green text-xs\">Full Interior Design<\/span><\/td>\n            <td class=\"px-6 py-5 font-mono text-xs\" style=\"font-family:var(--font-mono);color:var(--ink-muted)\">6–14 months<\/td>\n          <\/tr>\n        <\/tbody>\n      <\/table>\n    <\/div>\n\n    <p class=\"mt-4 text-xs\" style=\"color:var(--ink-dim);font-family:var(--font-mono)\">* All figures are indicative and exclusive of GST. Ranges reflect completed Studio Terra projects from 2016–2024. Actuals depend on specification, site, and programme.<\/p>\n\n    <!-- Mini stat band -->\n    <div class=\"mt-12 grid grid-cols-2 md:grid-cols-4 gap-4\">\n      <div class=\"rounded-2xl p-6\" style=\"background:var(--card);border:1px solid var(--line)\">\n        <div class=\"text-3xl font-mono font-bold\" style=\"font-family:var(--font-mono);color:var(--primary)\">47<\/div>\n        <div class=\"mt-1 text-xs\" style=\"color:var(--ink-muted);font-family:var(--font-mono);letter-spacing:0.1em\">Projects completed<\/div>\n      <\/div>\n      <div class=\"rounded-2xl p-6\" style=\"background:var(--card);border:1px solid var(--line)\">\n        <div class=\"text-3xl font-mono font-bold\" style=\"font-family:var(--font-mono);color:var(--primary)\">₹340 Cr<\/div>\n        <div class=\"mt-1 text-xs\" style=\"color:var(--ink-muted);font-family:var(--font-mono);letter-spacing:0.1em\">Built value delivered<\/div>\n      <\/div>\n      <div class=\"rounded-2xl p-6\" style=\"background:var(--card);border:1px solid var(--line)\">\n        <div class=\"text-3xl font-mono font-bold\" style=\"font-family:var(--font-mono);color:var(--primary)\">12<\/div>\n        <div class=\"mt-1 text-xs\" style=\"color:var(--ink-muted);font-family:var(--font-mono);letter-spacing:0.1em\">Design awards won<\/div>\n      <\/div>\n      <div class=\"rounded-2xl p-6\" style=\"background:var(--card);border:1px solid var(--line)\">\n        <div class=\"text-3xl font-mono font-bold\" style=\"font-family:var(--font-mono);color:var(--primary)\">9<\/div>\n        <div class=\"mt-1 text-xs\" style=\"color:var(--ink-muted);font-family:var(--font-mono);letter-spacing:0.1em\">Years of practice<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- Section 5: Process-to-Cost FAQ -->\n<section class=\"px-6 md:px-10 py-14 md:py-20\" style=\"background:var(--bg-elev);border-top:1px solid var(--line)\">\n  <div class=\"max-w-7xl mx-auto\">\n    <div class=\"grid grid-cols-1 md:grid-cols-2 gap-12 md:gap-20\">\n      <div>\n        <span class=\"eyebrow\" style=\"color:var(--ink-muted);letter-spacing:0.18em\">Common Questions<\/span>\n        <h2 class=\"mt-3 text-3xl md:text-5xl font-display leading-tight\" style=\"font-family:var(--font-display)\">\n          Process, cost, and <em>clarity<\/em>\n        <\/h2>\n        <p class=\"mt-4 text-base\" style=\"color:var(--ink-muted);font-family:var(--font-body);max-width:44ch;line-height:1.7\">\n          We believe that a well-informed client makes for a better project. These are the questions we hear most often at the start of an engagement.\n        <\/p>\n        <div class=\"mt-8 rounded-2xl overflow-hidden\" style=\"aspect-ratio:4/3\">\n          <img src=\"https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=640&h=480&q=80&auto=format&fit=crop\" alt=\"Studio Terra workspace\" class=\"w-full h-full object-cover\">\n        <\/div>\n      <\/div>\n\n      <div class=\"flex flex-col gap-0\">\n\n        <!-- FAQ Item 1 -->\n        <details class=\"group\" style=\"border-bottom:1px solid var(--line)\">\n          <summary class=\"flex items-center justify-between gap-4 py-6 cursor-pointer list-none\" style=\"font-family:var(--font-body)\">\n            <span class=\"text-base font-semibold\" style=\"color:var(--text)\">What is included in the design fee?<\/span>\n            <i data-lucide=\"plus\" class=\"w-5 h-5 shrink-0 transition-transform group-open:rotate-45\" style=\"color:var(--primary)\"><\/i>\n          <\/summary>\n          <div class=\"pb-6 text-sm leading-relaxed\" style=\"color:var(--ink-muted);font-family:var(--font-body)\">\n            The design fee covers all creative and technical work produced by Studio Terra: concept development, material and finish specification, space planning, detailed working drawings, BOQ preparation, contractor briefing documents, and site supervision visits. It does not include contractor costs, material costs, structural engineering, or regulatory approvals — these are managed separately and transparently under the cost-plus model.\n          <\/div>\n        <\/details>\n\n        <!-- FAQ Item 2 -->\n        <details class=\"group\" style=\"border-bottom:1px solid var(--line)\">\n          <summary class=\"flex items-center justify-between gap-4 py-6 cursor-pointer list-none\" style=\"font-family:var(--font-body)\">\n            <span class=\"text-base font-semibold\" style=\"color:var(--text)\">How are contractor costs managed?<\/span>\n            <i data-lucide=\"plus\" class=\"w-5 h-5 shrink-0 transition-transform group-open:rotate-45\" style=\"color:var(--primary)\"><\/i>\n          <\/summary>\n          <div class=\"pb-6 text-sm leading-relaxed\" style=\"color:var(--ink-muted);font-family:var(--font-body)\">\n            Contractor costs are entirely separate from our design fee. We prepare a detailed BOQ and invite tenders from our vetted network of contractors. You evaluate and appoint directly — we have no financial relationship with the contractors we recommend. Our role is to prepare clear specifications, review tenders, and supervise execution quality. This model ensures you receive independent, unbiased supervision throughout the build.\n          <\/div>\n        <\/details>\n\n        <!-- FAQ Item 3 -->\n        <details class=\"group\" style=\"border-bottom:1px solid var(--line)\">\n          <summary class=\"flex items-center justify-between gap-4 py-6 cursor-pointer list-none\" style=\"font-family:var(--font-body)\">\n            <span class=\"text-base font-semibold\" style=\"color:var(--text)\">Do you work outside Mumbai?<\/span>\n            <i data-lucide=\"plus\" class=\"w-5 h-5 shrink-0 transition-transform group-open:rotate-45\" style=\"color:var(--primary)\"><\/i>\n          <\/summary>\n          <div class=\"pb-6 text-sm leading-relaxed\" style=\"color:var(--ink-muted);font-family:var(--font-body)\">\n            Yes. We have completed projects in Alibaug, Goa, and Pune, and are open to commissions across India for projects of sufficient scale and ambition. For projects outside Mumbai, we include a travel and accommodation provision in the fee proposal, agreed upfront. Our current portfolio includes the Sāra Boutique Hotel in Goa (₹9.1 Cr) and the Wari House in Alibaug (₹4.2 Cr) — both executed with the same rigour as our city projects.\n          <\/div>\n        <\/details>\n\n        <!-- FAQ Item 4 -->\n        <details class=\"group\" style=\"border-bottom:1px solid var(--line)\">\n          <summary class=\"flex items-center justify-between gap-4 py-6 cursor-pointer list-none\" style=\"font-family:var(--font-body)\">\n            <span class=\"text-base font-semibold\" style=\"color:var(--text)\">Can I set a hard budget cap for the project?<\/span>\n            <i data-lucide=\"plus\" class=\"w-5 h-5 shrink-0 transition-transform group-open:rotate-45\" style=\"color:var(--primary)\"><\/i>\n          <\/summary>\n          <div class=\"pb-6 text-sm leading-relaxed\" style=\"color:var(--ink-muted);font-family:var(--font-body)\">\n            Absolutely — and we encourage it. A clear budget is one of the most useful design constraints we work with. At the brief stage, we align the scope, material specification, and programme to your stated investment ceiling. If design decisions begin to push toward the boundary, we flag it early and present alternatives. We have never delivered a project that materially exceeded its agreed budget without prior client approval.\n          <\/div>\n        <\/details>\n\n        <!-- FAQ Item 5 -->\n        <details class=\"group\">\n          <summary class=\"flex items-center justify-between gap-4 py-6 cursor-pointer list-none\" style=\"font-family:var(--font-body)\">\n            <span class=\"text-base font-semibold\" style=\"color:var(--text)\">How long does a typical project take?<\/span>\n            <i data-lucide=\"plus\" class=\"w-5 h-5 shrink-0 transition-transform group-open:rotate-45\" style=\"color:var(--primary)\"><\/i>\n          <\/summary>\n          <div class=\"pb-6 text-sm leading-relaxed\" style=\"color:var(--ink-muted);font-family:var(--font-body)\">\n            Timelines vary considerably by project type. An apartment interior typically runs 5–9 months from brief to handover. A villa or hospitality project with architecture is usually 18–36 months. We produce a detailed programme at the start of every engagement and update it monthly. Delays most commonly arise from regulatory approvals and client decision cycles — both of which we help manage proactively through structured review milestones.\n          <\/div>\n        <\/details>\n\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- Section 6: Enquiry CTA -->\n<section class=\"px-6 md:px-10 py-16 md:py-24 relative overflow-hidden\" style=\"background:var(--primary)\">\n  <div class=\"absolute inset-0 opacity-15\" style=\"background-image:url('https://images.unsplash.com/photo-1483985988355-763728e1935b?","about":"<section class=\"relative w-full min-h-[92vh] flex items-end overflow-hidden\" style=\"background:#0a0806;\">\n  <img src=\"https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=1400&h=900&q=80&auto=format&fit=crop\" alt=\"Studio Terra workspace\" class=\"absolute inset-0 w-full h-full object-cover\" style=\"opacity:0.45;\">\n  <!-- grain overlay -->\n  <div class=\"absolute inset-0\" style=\"background-image:url('data:image/svg+xml,%3Csvg viewBox=%220 0 256 256%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noise%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%224%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noise)%22 opacity=%220.08%22/%3E%3C/svg%3E');opacity:0.6;pointer-events:none;\"><\/div>\n  <!-- amber glow -->\n  <div class=\"absolute bottom-0 left-0 w-full h-1/2\" style=\"background:linear-gradient(to top, rgba(180,110,30,0.22) 0%, transparent 100%);pointer-events:none;\"><\/div>\n  <div class=\"absolute inset-0\" style=\"background:linear-gradient(to top, rgba(10,8,6,0.92) 0%, rgba(10,8,6,0.35) 60%, transparent 100%);pointer-events:none;\"><\/div>\n  <!-- amber side glow -->\n  <div class=\"absolute left-0 top-1/3 w-64 h-64 rounded-full pointer-events-none\" style=\"background:radial-gradient(circle, rgba(200,146,74,0.28) 0%, transparent 70%);filter:blur(40px);\"><\/div>\n  <div class=\"relative z-10 w-full px-6 md:px-16 pb-16 md:pb-24 max-w-7xl mx-auto\">\n    <p class=\"eyebrow mb-6\" style=\"color:var(--primary,#C8924A);letter-spacing:0.2em;\">Studio Terra — Est. 2016<\/p>\n    <h1 style=\"font-family:var(--font-display,'Cormorant Garamond',serif);font-size:clamp(2.8rem,7vw,6.5rem);font-weight:600;line-height:1.05;color:#f5ede0;font-style:italic;max-width:820px;\">\n      Built from <em style=\"color:#C8924A;font-style:italic;\">curiosity<\/em>,<br>shaped by <em style=\"color:#C8924A;font-style:italic;\">place<\/em>\n    <\/h1>\n    <p class=\"mt-6 text-lg md:text-xl max-w-xl\" style=\"color:rgba(245,237,224,0.65);font-family:var(--font-body);line-height:1.7;\">\n      Studio Terra crafts bespoke homes, studios, and hospitality spaces across Mumbai and beyond — where every surface holds the memory of the earth it came from.\n    <\/p>\n    <div class=\"flex flex-wrap gap-8 mt-12\">\n      <div class=\"stat\">\n        <span class=\"text-3xl md:text-4xl font-bold\" style=\"font-family:var(--font-mono);color:#C8924A;\">47<\/span>\n        <span class=\"text-sm mt-1 block\" style=\"color:rgba(245,237,224,0.5);font-family:var(--font-mono);letter-spacing:0.1em;\">Projects completed<\/span>\n      <\/div>\n      <div class=\"stat\">\n        <span class=\"text-3xl md:text-4xl font-bold\" style=\"font-family:var(--font-mono);color:#C8924A;\">₹340Cr<\/span>\n        <span class=\"text-sm mt-1 block\" style=\"color:rgba(245,237,224,0.5);font-family:var(--font-mono);letter-spacing:0.1em;\">Built value delivered<\/span>\n      <\/div>\n      <div class=\"stat\">\n        <span class=\"text-3xl md:text-4xl font-bold\" style=\"font-family:var(--font-mono);color:#C8924A;\">12<\/span>\n        <span class=\"text-sm mt-1 block\" style=\"color:rgba(245,237,224,0.5);font-family:var(--font-mono);letter-spacing:0.1em;\">Design awards won<\/span>\n      <\/div>\n      <div class=\"stat\">\n        <span class=\"text-3xl md:text-4xl font-bold\" style=\"font-family:var(--font-mono);color:#C8924A;\">9<\/span>\n        <span class=\"text-sm mt-1 block\" style=\"color:rgba(245,237,224,0.5);font-family:var(--font-mono);letter-spacing:0.1em;\">Years of practice<\/span>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- FOUNDING STORY -->\n<section class=\"px-6 md:px-10 py-16 md:py-24\" style=\"background:var(--bg,#0f0d0a);\">\n  <div class=\"max-w-7xl mx-auto\">\n    <p class=\"eyebrow mb-10\" style=\"color:#C8924A;letter-spacing:0.18em;\">Our Origin<\/p>\n    <div class=\"grid grid-cols-1 md:grid-cols-2 gap-12 md:gap-20 items-start\">\n      <!-- Left: narrative -->\n      <div>\n        <h2 style=\"font-family:var(--font-display,'Cormorant Garamond',serif);font-size:clamp(2rem,4vw,3.4rem);font-weight:600;line-height:1.1;color:#f5ede0;margin-bottom:2rem;\">\n          A practice built on <em style=\"color:#C8924A;font-style:italic;\">refusal<\/em>\n        <\/h2>\n        <div style=\"border-left:2px solid rgba(200,146,74,0.3);padding-left:1.5rem;display:flex;flex-direction:column;gap:1.5rem;\">\n          <p style=\"font-family:var(--font-body);font-size:1.05rem;line-height:1.8;color:rgba(245,237,224,0.72);\">\n            In 2016, Ananya Rao and Kabir Desai walked away from a large Mumbai practice where they had spent the better part of a decade producing technically accomplished but ultimately anonymous work. The scale was impressive; the intimacy, absent. They had been designing for square-footage metrics and client approval cycles — never for the particular quality of afternoon light in a specific room, or the way a material ages when it is touched daily by human hands.\n          <\/p>\n          <p style=\"font-family:var(--font-body);font-size:1.05rem;line-height:1.8;color:rgba(245,237,224,0.72);\">\n            Studio Terra began in a rented Bandra workshop with two drafting tables, a collection of material samples sourced from quarries in Rajasthan and sawmills in Kerala, and a shared conviction: that architecture should feel like it was always there, as if the land itself had arranged the walls. Their first commission — a laterite-walled retreat in Alibaug for a family who wanted a house that smelled of rain — became the template for everything that followed.\n          <\/p>\n          <p style=\"font-family:var(--font-body);font-size:1.05rem;line-height:1.8;color:rgba(245,237,224,0.72);\">\n            Nine years on, Studio Terra has completed 47 projects across residential, hospitality, and commercial typologies, earning a reputation not for a signature style but for a signature discipline — the patient accumulation of the right materials, the right light, and the right silence. Ananya continues to lead spatial strategy and material research; Kabir oversees project delivery and the studio's growing hospitality practice. Together, they have built a team of twelve who share the same unhurried commitment to craft.\n          <\/p>\n        <\/div>\n      <\/div>\n      <!-- Right: portrait -->\n      <div class=\"flex flex-col gap-6\">\n        <div class=\"relative overflow-hidden rounded-2xl\" style=\"aspect-ratio:4/5;background:#1a1510;\">\n          <img src=\"https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=900&h=700&q=80&auto=format&fit=crop\" alt=\"Ananya Rao and Kabir Desai, founders\" class=\"w-full h-full object-cover\" style=\"filter:grayscale(100%) contrast(1.08);\">\n          <div class=\"absolute inset-0\" style=\"background:linear-gradient(to top, rgba(10,8,6,0.7) 0%, transparent 55%);\"><\/div>\n          <div class=\"absolute bottom-0 left-0 p-6\">\n            <p style=\"font-family:var(--font-mono);font-size:0.78rem;letter-spacing:0.15em;color:rgba(245,237,224,0.55);text-transform:uppercase;\">Ananya Rao &amp; Kabir Desai<\/p>\n            <p style=\"font-family:var(--font-mono);font-size:0.72rem;letter-spacing:0.1em;color:rgba(200,146,74,0.7);margin-top:0.25rem;\">Co-founders, Studio Terra — Bandra, 2016<\/p>\n          <\/div>\n        <\/div>\n        <div class=\"glass rounded-xl px-6 py-5\" style=\"border:1px solid rgba(200,146,74,0.18);\">\n          <p style=\"font-family:var(--font-display,'Cormorant Garamond',serif);font-size:1.35rem;font-style:italic;color:#f5ede0;line-height:1.55;\">\"We left to pursue the smaller, more considered work — the kind that takes a year to get right and lasts a generation.\"<\/p>\n          <p class=\"mt-3\" style=\"font-family:var(--font-mono);font-size:0.72rem;letter-spacing:0.12em;color:rgba(200,146,74,0.75);\">— Ananya Rao, Co-founder<\/p>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- PHILOSOPHY PILLARS -->\n<section class=\"py-0\" style=\"background:var(--bg-elev,#13100c);\">\n  <div class=\"max-w-7xl mx-auto px-6 md:px-10 pt-16 pb-4\">\n    <p class=\"eyebrow mb-2\" style=\"color:#C8924A;letter-spacing:0.18em;\">Design Philosophy<\/p>\n    <h2 style=\"font-family:var(--font-display,'Cormorant Garamond',serif);font-size:clamp(2rem,3.5vw,3rem);font-weight:600;color:#f5ede0;\">Three principles, <em style=\"color:#C8924A;font-style:italic;\">held without compromise<\/em><\/h2>\n  <\/div>\n\n  <!-- Pillar 1: Materiality — image right -->\n  <div class=\"mt-10 grid grid-cols-1 md:grid-cols-2 items-stretch\" style=\"border-top:1px solid rgba(200,146,74,0.12);\">\n    <div class=\"flex flex-col justify-center px-8 md:px-16 py-14 md:py-20\" style=\"background:var(--bg-elev,#13100c);\">\n      <span style=\"font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.25em;color:#C8924A;text-transform:uppercase;\">01<\/span>\n      <h3 style=\"font-family:var(--font-display,'Cormorant Garamond',serif);font-size:clamp(2.5rem,5vw,4.5rem);font-weight:700;color:#f5ede0;margin-top:0.4rem;line-height:1;\">Materiality<\/h3>\n      <div class=\"mt-6\" style=\"width:40px;height:2px;background:#C8924A;opacity:0.5;\"><\/div>\n      <p class=\"mt-6\" style=\"font-family:var(--font-body);font-size:1rem;line-height:1.8;color:rgba(245,237,224,0.65);max-width:420px;\">\n        Every project begins not with a sketch but with a material conversation. Travertine from Rajasthan, teak from Kerala's reclaim yards, rammed earth from the site itself — we believe the substance of a space is its most honest language. We source slowly, specify precisely, and never use a material we have not held in our hands and watched age over time.\n      <\/p>\n      <div class=\"flex gap-2 mt-8 flex-wrap\">\n        <span class=\"pill\" style=\"background:rgba(200,146,74,0.12);color:#C8924A;border:1px solid rgba(200,146,74,0.25);font-size:0.7rem;letter-spacing:0.1em;\">Travertine<\/span>\n        <span class=\"pill\" style=\"background:rgba(200,146,74,0.12);color:#C8924A;border:1px solid rgba(200,146,74,0.25);font-size:0.7rem;letter-spacing:0.1em;\">Rammed Earth<\/span>\n        <span class=\"pill\" style=\"background:rgba(200,146,74,0.12);color:#C8924A;border:1px solid rgba(200,146,74,0.25);font-size:0.7rem;letter-spacing:0.1em;\">Reclaimed Teak<\/span>\n        <span class=\"pill\" style=\"background:rgba(200,146,74,0.12);color:#C8924A;border:1px solid rgba(200,146,74,0.25);font-size:0.7rem;letter-spacing:0.1em;\">Laterite<\/span>\n      <\/div>\n    <\/div>\n    <div class=\"relative overflow-hidden\" style=\"min-height:360px;\">\n      <img src=\"https://images.unsplash.com/photo-1483985988355-763728e1935b?w=1600&h=700&q=80&auto=format&fit=crop\" alt=\"Material samples and textures\" class=\"w-full h-full object-cover\" style=\"min-height:360px;\">\n      <div class=\"absolute inset-0\" style=\"background:linear-gradient(to right, rgba(19,16,12,0.4) 0%, transparent 60%);\"><\/div>\n    <\/div>\n  <\/div>\n\n  <!-- Pillar 2: Context — image left -->\n  <div class=\"grid grid-cols-1 md:grid-cols-2 items-stretch\" style=\"border-top:1px solid rgba(200,146,74,0.12);\">\n    <div class=\"relative overflow-hidden order-2 md:order-1\" style=\"min-height:360px;\">\n      <img src=\"https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=1400&h=900&q=80&auto=format&fit=crop\" alt=\"Contextual design in landscape\" class=\"w-full h-full object-cover\" style=\"min-height:360px;\">\n      <div class=\"absolute inset-0\" style=\"background:linear-gradient(to left, rgba(19,16,12,0.4) 0%, transparent 60%);\"><\/div>\n    <\/div>\n    <div class=\"flex flex-col justify-center px-8 md:px-16 py-14 md:py-20 order-1 md:order-2\" style=\"background:var(--bg-elev,#13100c);\">\n      <span style=\"font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.25em;color:#C8924A;text-transform:uppercase;\">02<\/span>\n      <h3 style=\"font-family:var(--font-display,'Cormorant Garamond',serif);font-size:clamp(2.5rem,5vw,4.5rem);font-weight:700;color:#f5ede0;margin-top:0.4rem;line-height:1;\">Context<\/h3>\n      <div class=\"mt-6\" style=\"width:40px;height:2px;background:#C8924A;opacity:0.5;\"><\/div>\n      <p class=\"mt-6\" style=\"font-family:var(--font-body);font-size:1rem;line-height:1.8;color:rgba(245,237,224,0.65);max-width:420px;\">\n        A house in Alibaug must breathe differently from a penthouse in Lower Parel. Context is not a design constraint — it is the brief itself. We study the quality of light at different hours, the prevailing wind direction, the neighbourhood's material vocabulary, the client's relationship to memory and space. Architecture that ignores its setting is merely decoration; architecture that listens to it becomes place.\n      <\/p>\n    <\/div>\n  <\/div>\n\n  <!-- Pillar 3: Restraint — image right -->\n  <div class=\"grid grid-cols-1 md:grid-cols-2 items-stretch\" style=\"border-top:1px solid rgba(200,146,74,0.12);border-bottom:1px solid rgba(200,146,74,0.12);\">\n    <div class=\"flex flex-col justify-center px-8 md:px-16 py-14 md:py-20\" style=\"background:var(--bg-elev,#13100c);\">\n      <span style=\"font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.25em;color:#C8924A;text-transform:uppercase;\">03<\/span>\n      <h3 style=\"font-family:var(--font-display,'Cormorant Garamond',serif);font-size:clamp(2.5rem,5vw,4.5rem);font-weight:700;color:#f5ede0;margin-top:0.4rem;line-height:1;\">Restraint<\/h3>\n      <div class=\"mt-6\" style=\"width:40px;height:2px;background:#C8924A;opacity:0.5;\"><\/div>\n      <p class=\"mt-6\" style=\"font-family:var(--font-body);font-size:1rem;line-height:1.8;color:rgba(245,237,224,0.65);max-width:420px;\">\n        We remove more than we add. The discipline of knowing what to leave out — which wall to keep bare, which junction to leave unfinished, which view to frame and which to occlude — is the hardest and most important skill in spatial design. A room that is too full cannot hold silence; a space that holds silence can hold anything.\n      <\/p>\n    <\/div>\n    <div class=\"relative overflow-hidden\" style=\"min-height:360px;\">\n      <img src=\"https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=900&h=700&q=80&auto=format&fit=crop\" alt=\"Restrained, considered interior\" class=\"w-full h-full object-cover\" style=\"min-height:360px;\">\n      <div class=\"absolute inset-0\" style=\"background:linear-gradient(to right, rgba(19,16,12,0.4) 0%, transparent 60%);\"><\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- TEAM GRID -->\n<section class=\"px-6 md:px-10 py-16 md:py-24\" style=\"background:var(--bg,#0f0d0a);\">\n  <div class=\"max-w-7xl mx-auto\">\n    <div class=\"flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-12\">\n      <div>\n        <p class=\"eyebrow mb-3\" style=\"color:#C8924A;letter-spacing:0.18em;\">The People<\/p>\n        <h2 style=\"font-family:var(--font-display,'Cormorant Garamond',serif);font-size:clamp(2rem,4vw,3.2rem);font-weight:600;color:#f5ede0;line-height:1.1;\">Twelve hands, <em style=\"color:#C8924A;font-style:italic;\">one discipline<\/em><\/h2>\n      <\/div>\n      <p style=\"font-family:var(--font-body);font-size:0.95rem;color:rgba(245,237,224,0.5);max-width:320px;line-height:1.65;\">A small, deeply committed team — each member chosen for their relationship to material and their patience with process.<\/p>\n    <\/div>\n    <div class=\"stagger grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6\">\n\n      <!-- Card 1 -->\n      <div class=\"card group relative overflow-hidden rounded-2xl p-0\" style=\"background:var(--card,#1a1510);border:1px solid rgba(200,146,74,0.08);transition:transform 0.3s ease,border-color 0.3s ease;cursor:default;\" onmouseover=\"this.style.transform='translateY(-5px)';this.style.borderColor='rgba(200,146,74,0.45)';\" onmouseout=\"this.style.transform='translateY(0)';this.style.borderColor='rgba(200,146,74,0.08)';\">\n        <div class=\"relative overflow-hidden\" style=\"aspect-ratio:1/1;background:#201a12;\">\n          <img src=\"https://ui-avatars.com/api/?name=Ananya%20Rao&background=C8924A&color=fff&size=200&bold=true&format=png\" alt=\"Ananya Rao\" class=\"w-full h-full object-cover\" style=\"object-position:center top;\">\n          <div class=\"absolute inset-0\" style=\"background:linear-gradient(to top, rgba(10,8,6,0.6) 0%, transparent 50%);\"><\/div>\n        <\/div>\n        <div class=\"px-6 py-5\">\n          <h4 style=\"font-family:var(--font-display,'Cormorant Garamond',serif);font-size:1.3rem;font-weight:600;color:#f5ede0;\">Ananya Rao<\/h4>\n          <p style=\"font-family:var(--font-mono);font-size:0.72rem;letter-spacing:0.12em;color:#C8924A;text-transform:uppercase;margin-top:0.2rem;\">Co-founder &amp; Design Director<\/p>\n          <p class=\"mt-3\" style=\"font-family:var(--font-body);font-size:0.88rem;line-height:1.65;color:rgba(245,237,224,0.55);\">Spatial strategy and material research lead; trained at KRVIA, seven years at Serie Architects London.<\/p>\n        <\/div>\n      <\/div>\n\n      <!-- Card 2 -->\n      <div class=\"card group relative overflow-hidden rounded-2xl p-0\" style=\"background:var(--card,#1a1510);border:1px solid rgba(200,146,74,0.08);transition:transform 0.3s ease,border-color 0.3s ease;cursor:default;\" onmouseover=\"this.style.transform='translateY(-5px)';this.style.borderColor='rgba(200,146,74,0.45)';\" onmouseout=\"this.style.transform='translateY(0)';this.style.borderColor='rgba(200,146,74,0.08)';\">\n        <div class=\"relative overflow-hidden\" style=\"aspect-ratio:1/1;background:#201a12;\">\n          <img src=\"https://ui-avatars.com/api/?name=Kabir%20Desai&background=C8924A&color=fff&size=200&bold=true&format=png\" alt=\"Kabir Desai\" class=\"w-full h-full object-cover\">\n          <div class=\"absolute inset-0\" style=\"background:linear-gradient(to top, rgba(10,8,6,0.6) 0%, transparent 50%);\"><\/div>\n        <\/div>\n        <div class=\"px-6 py-5\">\n          <h4 style=\"font-family:var(--font-display,'Cormorant Garamond',serif);font-size:1.3rem;font-weight:600;color:#f5ede0;\">Kabir Desai<\/h4>\n          <p style=\"font-family:var(--font-mono);font-size:0.72rem;letter-spacing:0.12em;color:#C8924A;text-transform:uppercase;margin-top:0.2rem;\">Co-founder &amp; Principal Architect<\/p>\n          <p class=\"mt-3\" style=\"font-family:var(--font-body);font-size:0.88rem;line-height:1.65;color:rgba(245,237,224,0.55);\">Project delivery and hospitality practice lead; B.Arch SPA Delhi, post-graduate Berlage Institute Amsterdam.<\/p>\n        <\/div>\n      <\/div>\n\n      <!-- Card 3 -->\n      <div class=\"card group relative overflow-hidden rounded-2xl p-0\" style=\"background:var(--card,#1a1510);border:1px solid rgba(200,146,74,0.08);transition:transform 0.3s ease,border-color 0.3s ease;cursor:default;\" onmouseover=\"this.style.transform='translateY(-5px)';this.style.borderColor='rgba(200,146,74,0.45)';\" onmouseout=\"this.style.transform='translateY(0)';this.style.borderColor='rgba(200,146,74,0.08)';\">\n        <div class=\"relative overflow-hidden\" style=\"aspect-ratio:1/1;background:#201a12;\">\n          <img src=\"https://ui-avatars.com/api/?name=Meera%20Pillai&background=C8924A&color=fff&size=200&bold=true&format=png\" alt=\"Meera Pillai\" class=\"w-full h-full object-cover\">\n          <div class=\"absolute inset-0\" style=\"background:linear-gradient(to top, rgba(10,8,6,0.6) 0%, transparent 50%);\"><\/div>\n        <\/div>\n        <div class=\"px-6 py-5\">\n          <h4 style=\"font-family:var(--font-display,'Cormorant Garamond',serif);font-size:1.3rem;font-weight:600;color:#f5ede0;\">Meera Pillai<\/h4>\n          <p style=\"font-family:var(--font-mono);font-size:0.72rem;letter-spacing:0.12em;color:#C8924A;text-transform:uppercase;margin-top:0.2rem;\">Senior Architect<\/p>\n          <p class=\"mt-3\" style=\"font-family:var(--font-body);font-size:0.88rem;line-height:1.65;color:rgba(245,237,224,0.55);\">Residential specialist; five years at Studio Mumbai before joining Terra in 2019.<\/p>\n        <\/div>\n      <\/div>\n\n      <!-- Card 4 -->\n      <div class=\"card group relative overflow-hidden rounded-2xl p-0\" style=\"background:var(--card,#1a1510);border:1px solid rgba(200,146,74,0.08);transition:transform 0.3s ease,border-color 0.3s ease;cursor:default;\" onmouseover=\"this.style.transform='translateY(-5px)';this.style.borderColor='rgba(200,146,74,0.45)';\" onmouseout=\"this.style.transform='translateY(0)';this.style.borderColor='rgba(200,146,74,0.08)';\">\n        <div class=\"relative overflow-hidden\" style=\"aspect-ratio:1/1;background:#201a12;\">\n          <img src=\"https://ui-avatars.com/api/?name=Rohan%20Nair&background=C8924A&color=fff&size=200&bold=true&format=png\" alt=\"Rohan Nair\" class=\"w-full h-full object-cover\">\n          <div class=\"absolute inset-0\" style=\"background:linear-gradient(to top, rgba(10,8,6,0.6) 0%, transparent 50%);\"><\/div>\n        <\/div>\n        <div class=\"px-6 py-5\">\n          <h4 style=\"font-family:var(--font-display,'Cormorant Garamond',serif);font-size:1.3rem;font-weight:600;color:#f5ede0;\">Rohan Nair<\/h4>\n          <p style=\"font-family:var(--font-mono);font-size:0.72rem;letter-spacing:0.12em;color:#C8924A;text-transform:uppercase;margin-top:0.2rem;\">Interior Design Lead<\/p>\n          <p class=\"mt-3\" style=\"font-family:var(--font-body);font-size:0.88rem;line-height:1.65;color:rgba(245,237,224,0.55);\">Hospitality interiors and FF&amp <script>
  function _icons(){ try{ if(window.lucide) lucide.createIcons(); }catch(e){} }
  function loadPage(name){
    var html = (window.__PAGES__ && window.__PAGES__[name]) || '';
    var el = document.getElementById('page-content');
    if(!el) return;
    if(!html){ name = "home"; html = (window.__PAGES__||{})[name] || ''; }
    el.classList.add('exiting');
    setTimeout(function(){
      el.innerHTML = html;
      el.classList.remove('exiting');
      el.style.opacity='0'; el.style.transform='translateY(12px)';
      requestAnimationFrame(function(){
        el.style.transition='opacity .35s ease, transform .35s ease';
        el.style.opacity='1'; el.style.transform='translateY(0)';
      });
      _icons();
      window.scrollTo(0,0);
    }, 180);
    document.querySelectorAll('.nav-item,.bn-item').forEach(function(i){i.classList.remove('active');});
    document.querySelectorAll('[data-page="'+name+'"]').forEach(function(a){a.classList.add('active');});
    try{ history.replaceState(null,'','#'+name); }catch(e){}
  }
  window.addEventListener('message', function(e){ if(e.data && e.data.page) loadPage(e.data.page); });
  window.addEventListener('hashchange', function(){ var h=location.hash.replace('#',''); if(h && window.__PAGES__[h]) loadPage(h); });
  document.addEventListener('DOMContentLoaded', function(){
    _icons();
    var h = location.hash.replace('#','');
    loadPage(h && window.__PAGES__[h] ? h : "home");
  });
</script>
