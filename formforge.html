<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FormForge</title>
<meta name="description" content="Train smarter. Track harder. Transform.">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Clash%20Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script>
tailwind.config = {
  theme: { extend: {
    colors: { brand: '#E8FF3B', accent: '#FF4D1C', ink: '#0A0A0A', card: '#141414' },
    fontFamily: { display: ['Clash Display','serif'], body: ['Inter','sans-serif'] }
  } }
};
</script>
<style>
  :root{
    --primary:#E8FF3B; --primary-rgb:232, 255, 59;
    --accent:#FF4D1C; --accent-rgb:255, 77, 28;
    --bg:#0A0A0A; --card:#141414; --text:#F5F5F5; --muted:#6B6B6B;
    --font-display:'Clash Display',serif; --font-body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;overflow-x:hidden;max-width:100%;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased;line-height:1.6;}
  h1,h2,h3,h4,.font-display{font-family:var(--font-display);letter-spacing:-0.01em;line-height:1.1;}
  a{color:inherit;text-decoration:none;}
  ::selection{background:rgba(var(--primary-rgb),0.35);}
  img{display:block;max-width:100%;}
  /* layout */
  .app{display:flex;min-height:100vh;}
  .sidebar{width:248px;flex-shrink:0;background:linear-gradient(180deg, color-mix(in srgb,var(--card) 92%, #000) 0%, var(--bg) 100%);
    border-right:1px solid rgba(var(--primary-rgb),0.10);padding:22px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:6px;}
  .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px;}
  .brand .logo{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-weight:800;color:#fff;
    background:linear-gradient(135deg,var(--primary),var(--accent));box-shadow:0 6px 20px rgba(var(--primary-rgb),0.4);font-family:var(--font-display);}
  .brand .bname{font-weight:700;font-size:15px;}
  .brand .btag{font-size:11px;color:var(--muted);}
  .nav-item{display:flex;align-items:center;gap:12px;width:100%;padding:11px 13px;border:none;background:transparent;color:var(--muted);
    border-radius:11px;cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-body);transition:all .18s ease;text-align:left;}
  .nav-item:hover{background:rgba(var(--primary-rgb),0.08);color:var(--text);}
  .nav-item.active{background:rgba(var(--primary-rgb),0.14);color:#fff;box-shadow:inset 0 0 0 1px rgba(var(--primary-rgb),0.25);}
  .nav-item i,.bn-item i{width:18px;height:18px;}
  .nav-foot{margin-top:auto;padding:12px 8px 0;border-top:1px solid rgba(var(--primary-rgb),0.08);font-size:12px;color:var(--muted);}
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 30px;position:sticky;top:0;z-index:20;
    background:color-mix(in srgb,var(--bg) 82%, transparent);backdrop-filter:blur(14px);border-bottom:1px solid rgba(var(--primary-rgb),0.08);}
  .topbar .tt{font-size:13px;color:var(--muted);}
  .topbar .actions{display:flex;align-items:center;gap:12px;}
  #page-content{padding:0 0 80px;animation:fadeUp .5s ease both;overflow-x:auto;max-width:100%;}
  #page-content img{max-width:100%;}
  #page-content > *{max-width:100%;}
  #page-content.exiting{opacity:0;transform:translateY(10px);transition:all .2s ease;}
  /* component vocabulary the LLM is told to use */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:12px;font-weight:600;font-size:14px;cursor:pointer;border:none;transition:all .2s ease;}
  .btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 8px 24px rgba(var(--primary-rgb),0.35);}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(var(--primary-rgb),0.5);}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid rgba(var(--primary-rgb),0.3);}
  .btn-ghost:hover{background:rgba(var(--primary-rgb),0.08);}
  .pill{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:600;letter-spacing:.04em;
    background:rgba(var(--primary-rgb),0.12);color:var(--accent);border:1px solid rgba(var(--primary-rgb),0.22);text-transform:uppercase;}
  .card{background:linear-gradient(160deg, color-mix(in srgb,var(--card) 96%, #fff) 0%, var(--card) 100%);
    border:1px solid rgba(var(--primary-rgb),0.10);border-radius:18px;padding:24px;transition:all .25s ease;}
  .card:hover{transform:translateY(-4px);border-color:rgba(var(--primary-rgb),0.28);box-shadow:0 18px 40px rgba(0,0,0,0.35);}
  .stat{font-family:var(--font-display);font-size:30px;font-weight:700;color:#fff;}
  .muted{color:var(--muted);}
  .accent{color:var(--accent);}
  .glass{background:rgba(255,255,255,0.04);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:18px;}
  .gradient-text{background:linear-gradient(120deg,var(--text),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(var(--primary-rgb),0.4),transparent);}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:12px 14px;border-bottom:1px solid rgba(var(--primary-rgb),0.12);}
  td{padding:14px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:14px;}
  tr:hover td{background:rgba(var(--primary-rgb),0.04);}
  .badge{display:inline-block;padding:3px 11px;border-radius:999px;font-size:12px;font-weight:600;}
  .badge-green{background:rgba(34,197,94,0.15);color:#4ade80;}
  .badge-amber{background:rgba(245,158,11,0.15);color:#fbbf24;}
  .badge-red{background:rgba(239,68,68,0.15);color:#f87171;}
  .stagger>*{opacity:0;animation:fadeUp .6s ease forwards;}
  .stagger>*:nth-child(1){animation-delay:.05s}.stagger>*:nth-child(2){animation-delay:.12s}
  .stagger>*:nth-child(3){animation-delay:.19s}.stagger>*:nth-child(4){animation-delay:.26s}
  .stagger>*:nth-child(5){animation-delay:.33s}.stagger>*:nth-child(6){animation-delay:.40s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .bottom-nav{display:none;}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(var(--primary-rgb),0.3);border-radius:9px}
  /* mobile */
  @media(max-width:860px){
    .sidebar{display:none!important;}
    .topbar{padding:14px 18px;}
    #page-content{padding-bottom:96px;}
    .bottom-nav{display:flex!important;position:fixed;bottom:0;left:0;right:0;z-index:50;justify-content:space-around;
      padding:9px 6px env(safe-area-inset-bottom);background:color-mix(in srgb,var(--card) 96%, #000);border-top:1px solid rgba(var(--primary-rgb),0.18);backdrop-filter:blur(16px);}
    .bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;flex:1;}
    .bn-item.active{color:var(--accent);}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">

    </div>
    <button class="nav-item active" data-page="home" onclick="loadPage('home')">

      <button class="nav-item" data-page="dashboard" onclick="loadPage('dashboard')">

      <button class="nav-item" data-page="features" onclick="loadPage('features')">

    </button>
      <button class="nav-item" data-page="billing" onclick="loadPage('billing')">

        <span class="pill"><i data-lucide="circle-dot" style="width:13px;height:13px"></i> Live</span>

</div>

      <button class="bn-item" data-page="dashboard" onclick="loadPage('dashboard')">

/div><\/section>","docs":"<section class=\"px-6 md:px-10 py-14 md:py-20 relative overflow-hidden\" style=\"background: linear-gradient(135deg, #0a0a0a 0%, #111 60%, #1a1a0a 100%);\">\n  <div class=\"max-w-7xl mx-auto\">\n    <div class=\"grid lg:grid-cols-3 gap-10 items-start\">\n      <div class=\"lg:col-span-2\">\n        <div class=\"pill mb-4 inline-flex items-center gap-2\" style=\"background: rgba(232,255,59,0.12); color: var(--accent); border: 1px solid rgba(232,255,59,0.25);\">\n          <i data-lucide=\"book-open\" class=\"w-4 h-4\"><\/i> FormForge Documentation\n        <\/div>\n        <h1 class=\"text-4xl md:text-6xl font-bold mb-4 leading-tight\">\n          <span class=\"gradient-text\">Your strongest self<\/span><br>starts here, not tomorrow\n        <\/h1>\n        <p class=\"text-lg mb-8\" style=\"color: var(--muted);\">Personalised workout plans, real-time progress tracking, and India's best certified trainers — one platform. Find everything you need below.<\/p>\n        <div class=\"relative mb-8\">\n          <div class=\"flex items-center gap-3 rounded-2xl px-5 py-4\" style=\"background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);\">\n            <i data-lucide=\"search\" class=\"w-5 h-5 flex-shrink-0\" style=\"color: var(--muted);\"><\/i>\n            <input type=\"text\" placeholder=\"Search docs… e.g. 'how to swap exercises', 'API auth', 'deload week'\" class=\"bg-transparent border-none outline-none w-full text-base\" style=\"color: var(--text);\" />\n            <span class=\"hidden md:inline-flex items-center gap-1 text-xs px-2 py-1 rounded-lg\" style=\"background: rgba(255,255,255,0.08); color: var(--muted);\">⌘K<\/span>\n          <\/div>\n        <\/div>\n        <div class=\"flex flex-wrap gap-3\">\n          <button class=\"pill flex items-center gap-2 cursor-pointer hover:scale-105 transition-transform\" style=\"background: rgba(232,255,59,0.15); color: var(--accent); border: 1px solid rgba(232,255,59,0.3); padding: 8px 16px; border-radius: 999px; font-size: 0.875rem; font-weight: 600;\">\n            <i data-lucide=\"rocket\" class=\"w-4 h-4\"><\/i> Getting Started\n          <\/button>\n          <button class=\"pill flex items-center gap-2 cursor-pointer hover:scale-105 transition-transform\" style=\"background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 999px; font-size: 0.875rem; font-weight: 600;\">\n            <i data-lucide=\"dumbbell\" class=\"w-4 h-4\"><\/i> Workout Plans\n          <\/button>\n          <button class=\"pill flex items-center gap-2 cursor-pointer hover:scale-105 transition-transform\" style=\"background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 999px; font-size: 0.875rem; font-weight: 600;\">\n            <i data-lucide=\"trending-up\" class=\"w-4 h-4\"><\/i> Progress Tracking\n          <\/button>\n          <button class=\"pill flex items-center gap-2 cursor-pointer hover:scale-105 transition-transform\" style=\"background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 999px; font-size: 0.875rem; font-weight: 600;\">\n            <i data-lucide=\"users\" class=\"w-4 h-4\"><\/i> Trainer Tools\n          <\/button>\n          <button class=\"pill flex items-center gap-2 cursor-pointer hover:scale-105 transition-transform\" style=\"background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 999px; font-size: 0.875rem; font-weight: 600;\">\n            <i data-lucide=\"code-2\" class=\"w-4 h-4\"><\/i> API Reference\n          <\/button>\n          <button class=\"pill flex items-center gap-2 cursor-pointer hover:scale-105 transition-transform\" style=\"background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 999px; font-size: 0.875rem; font-weight: 600;\">\n            <i data-lucide=\"credit-card\" class=\"w-4 h-4\"><\/i> Billing\n          <\/button>\n        <\/div>\n      <\/div>\n      <div class=\"glass rounded-2xl p-6\" style=\"border: 1px solid rgba(232,255,59,0.15);\">\n        <div class=\"flex items-center gap-2 mb-5\">\n          <i data-lucide=\"flame\" class=\"w-5 h-5\" style=\"color: var(--accent);\"><\/i>\n          <span class=\"font-bold text-sm uppercase tracking-wider\" style=\"color: var(--accent);\">Most Viewed Today<\/span>\n        <\/div>\n        <div class=\"space-y-4\">\n          <div class=\"flex items-start gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5 transition-colors\">\n            <span class=\"text-2xl font-black\" style=\"color: rgba(232,255,59,0.4); line-height:1;\">#1<\/span>\n            <div>\n              <p class=\"font-semibold text-sm mb-1\">How to Connect Your Fitness Wearable<\/p>\n              <p class=\"text-xs\" style=\"color: var(--muted);\">Garmin, Apple Watch, Mi Band setup guide<\/p>\n              <div class=\"flex items-center gap-1 mt-1\">\n                <i data-lucide=\"eye\" class=\"w-3 h-3\" style=\"color: var(--muted);\"><\/i>\n                <span class=\"text-xs\" style=\"color: var(--muted);\">3,241 views<\/span>\n              <\/div>\n            <\/div>\n          <\/div>\n          <div class=\"divider\" style=\"margin: 0;\"><\/div>\n          <div class=\"flex items-start gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5 transition-colors\">\n            <span class=\"text-2xl font-black\" style=\"color: rgba(232,255,59,0.3); line-height:1;\">#2<\/span>\n            <div>\n              <p class=\"font-semibold text-sm mb-1\">Understanding Deload Weeks<\/p>\n              <p class=\"text-xs\" style=\"color: var(--muted);\">Why rest is part of your training protocol<\/p>\n              <div class=\"flex items-center gap-1 mt-1\">\n                <i data-lucide=\"eye\" class=\"w-3 h-3\" style=\"color: var(--muted);\"><\/i>\n                <span class=\"text-xs\" style=\"color: var(--muted);\">2,108 views<\/span>\n              <\/div>\n            <\/div>\n          <\/div>\n          <div class=\"divider\" style=\"margin: 0;\"><\/div>\n          <div class=\"flex items-start gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5 transition-colors\">\n            <span class=\"text-2xl font-black\" style=\"color: rgba(232,255,59,0.2); line-height:1;\">#3<\/span>\n            <div>\n              <p class=\"font-semibold text-sm mb-1\">POST /sessions API Endpoint<\/p>\n              <p class=\"text-xs\" style=\"color: var(--muted);\">Logging sessions via API for enterprise apps<\/p>\n              <div class=\"flex items-center gap-1 mt-1\">\n                <i data-lucide=\"eye\" class=\"w-3 h-3\" style=\"color: var(--muted);\"><\/i>\n                <span class=\"text-xs\" style=\"color: var(--muted);\">1,876 views<\/span>\n              <\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section class=\"px-6 md:px-10 py-14 md:py-20\" style=\"background: #0d0d0d;\">\n  <div class=\"max-w-7xl mx-auto\">\n    <div class=\"grid lg:grid-cols-5 gap-12 items-start\">\n      <div class=\"lg:col-span-3\">\n        <div class=\"mb-3\">\n          <span class=\"badge badge-green text-xs font-bold uppercase tracking-widest\">Getting Started<\/span>\n        <\/div>\n        <h2 class=\"text-3xl md:text-4xl font-bold mb-3\">Up and running in <span class=\"gradient-text\">under 10 minutes<\/span><\/h2>\n        <p class=\"mb-10\" style=\"color: var(--muted);\">Follow these five steps to go from zero to your first FormForge training session. Each step takes just 1–3 minutes.<\/p>\n        <div class=\"space-y-6\">\n          <div class=\"flex gap-5 items-start p-5 rounded-2xl hover:scale-[1.01] transition-transform\" style=\"background: rgba(232,255,59,0.06); border: 1px solid rgba(232,255,59,0.15);\">\n            <div class=\"flex-shrink-0 w-12 h-12 rounded-xl flex items-center justify-center font-black text-lg\" style=\"background: var(--accent); color: #000;\">1<\/div>\n            <div class=\"flex-1\">\n              <div class=\"flex items-center gap-2 mb-1\">\n                <i data-lucide=\"user-plus\" class=\"w-5 h-5\" style=\"color: var(--accent);\"><\/i>\n                <h3 class=\"font-bold text-lg\">Create Your Account<\/h3>\n              <\/div>\n              <p class=\"text-sm\" style=\"color: var(--muted);\">Sign up with your email or Google account. Verify your phone number for Indian users to unlock UPI billing and local trainer matching. Takes under 60 seconds.<\/p>\n            <\/div>\n          <\/div>\n          <div class=\"flex gap-5 items-start p-5 rounded-2xl hover:scale-[1.01] transition-transform\" style=\"background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);\">\n            <div class=\"flex-shrink-0 w-12 h-12 rounded-xl flex items-center justify-center font-black text-lg\" style=\"background: rgba(255,255,255,0.1); color: var(--text);\">2<\/div>\n            <div class=\"flex-1\">\n              <div class=\"flex items-center gap-2 mb-1\">\n                <i data-lucide=\"clipboard-list\" class=\"w-5 h-5\" style=\"color: var(--accent);\"><\/i>\n                <h3 class=\"font-bold text-lg\">Complete Your Fitness Assessment<\/h3>\n              <\/div>\n              <p class=\"text-sm\" style=\"color: var(--muted);\">Answer 12 questions about your current fitness level, goals, available equipment, and any injuries. Our algorithm uses this data to build your initial recommendation set.<\/p>\n            <\/div>\n          <\/div>\n          <div class=\"flex gap-5 items-start p-5 rounded-2xl hover:scale-[1.01] transition-transform\" style=\"background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);\">\n            <div class=\"flex-shrink-0 w-12 h-12 rounded-xl flex items-center justify-center font-black text-lg\" style=\"background: rgba(255,255,255,0.1); color: var(--text);\">3<\/div>\n            <div class=\"flex-1\">\n              <div class=\"flex items-center gap-2 mb-1\">\n                <i data-lucide=\"layout-grid\" class=\"w-5 h-5\" style=\"color: var(--accent);\"><\/i>\n                <h3 class=\"font-bold text-lg\">Choose a Plan<\/h3>\n              <\/div>\n              <p class=\"text-sm\" style=\"color: var(--muted);\">Browse plans like Power Hypertrophy (₹2,499) or Beginner Foundation Pack (₹799). Filter by goal, duration, equipment, and price. One-click purchase via UPI, card, or EMI.<\/p>\n            <\/div>\n          <\/div>\n          <div class=\"flex gap-5 items-start p-5 rounded-2xl hover:scale-[1.01] transition-transform\" style=\"background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);\">\n            <div class=\"flex-shrink-0 w-12 h-12 rounded-xl flex items-center justify-center font-black text-lg\" style=\"background: rgba(255,255,255,0.1); color: var(--text);\">4<\/div>\n            <div class=\"flex-1\">\n              <div class=\"flex items-center gap-2 mb-1\">\n                <i data-lucide=\"watch\" class=\"w-5 h-5\" style=\"color: var(--accent);\"><\/i>\n                <h3 class=\"font-bold text-lg\">Connect Your Wearable<\/h3>\n              <\/div>\n              <p class=\"text-sm\" style=\"color: var(--muted);\">Sync Garmin, Apple Watch, Fitbit, or Mi Band via Settings → Devices. FormForge auto-imports heart rate, steps, and sleep data to calibrate your intensity targets in real time.<\/p>\n            <\/div>\n          <\/div>\n          <div class=\"flex gap-5 items-start p-5 rounded-2xl hover:scale-[1.01] transition-transform\" style=\"background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);\">\n            <div class=\"flex-shrink-0 w-12 h-12 rounded-xl flex items-center justify-center font-black text-lg\" style=\"background: rgba(255,255,255,0.1); color: var(--text);\">5<\/div>\n            <div class=\"flex-1\">\n              <div class=\"flex items-center gap-2 mb-1\">\n                <i data-lucide=\"calendar-check\" class=\"w-5 h-5\" style=\"color: var(--accent);\"><\/i>\n                <h3 class=\"font-bold text-lg\">Book Your First Session<\/h3>\n              <\/div>\n              <p class=\"text-sm\" style=\"color: var(--muted);\">Head to Browse Trainers, filter by city or online, and book a 60-min Elite 1-on-1 session (₹1,499). You'll get a confirmation SMS and calendar invite instantly.<\/p>\n            <\/div>\n          <\/div>\n        <\/div>\n        <div class=\"mt-8 flex items-center gap-4 p-5 rounded-2xl\" style=\"background: linear-gradient(135deg, rgba(232,255,59,0.12), rgba(232,255,59,0.04)); border: 1px solid rgba(232,255,59,0.3);\">\n          <i data-lucide=\"zap\" class=\"w-8 h-8 flex-shrink-0\" style=\"color: var(--accent);\"><\/i>\n          <div class=\"flex-1\">\n            <p class=\"font-bold mb-1\">Not sure which plan is right for you?<\/p>\n            <p class=\"text-sm\" style=\"color: var(--muted);\">Our 2-minute quiz analyses your goals and recommends the perfect starting plan from our catalog of 8 programs.<\/p>\n          <\/div>\n          <button class=\"btn btn-primary flex-shrink-0 flex items-center gap-2\">\n            Take the Quiz <i data-lucide=\"arrow-right\" class=\"w-4 h-4\"><\/i>\n          <\/button>\n        <\/div>\n      <\/div>\n      <div class=\"lg:col-span-2\">\n        <div class=\"rounded-2xl overflow-hidden mb-6\" style=\"height: 320px;\">\n          <img src=\"https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=900&h=700&q=80&auto=format&fit=crop\" alt=\"Getting started with FormForge\" class=\"w-full h-full object-cover\" />\n        <\/div>\n        <div class=\"glass rounded-2xl p-6\" style=\"border: 1px solid rgba(255,255,255,0.1);\">\n          <h4 class=\"font-bold mb-4 flex items-center gap-2\">\n            <i data-lucide=\"info\" class=\"w-4 h-4\" style=\"color: var(--accent);\"><\/i> Quick Stats\n          <\/h4>\n          <div class=\"grid grid-cols-2 gap-4\">\n            <div class=\"text-center p-3 rounded-xl\" style=\"background: rgba(255,255,255,0.04);\">\n              <div class=\"text-2xl font-black gradient-text\">40,200+<\/div>\n              <div class=\"text-xs mt-1\" style=\"color: var(--muted);\">Active Members<\/div>\n            <\/div>\n            <div class=\"text-center p-3 rounded-xl\" style=\"background: rgba(255,255,255,0.04);\">\n              <div class=\"text-2xl font-black gradient-text\">1,800+<\/div>\n              <div class=\"text-xs mt-1\" style=\"color: var(--muted);\">Certified Trainers<\/div>\n            <\/div>\n            <div class=\"text-center p-3 rounded-xl\" style=\"background: rgba(255,255,255,0.04);\">\n              <div class=\"text-2xl font-black gradient-text\">98.2%<\/div>\n              <div class=\"text-xs mt-1\" style=\"color: var(--muted);\">Goal Completion<\/div>\n            <\/div>\n            <div class=\"text-center p-3 rounded-xl\" style=\"background: rgba(255,255,255,0.04);\">\n              <div class=\"text-2xl font-black gradient-text\">₹2.4Cr<\/div>\n              <div class=\"text-xs mt-1\" style=\"color: var(--muted);\">Trainer Earnings<\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section class=\"px-6 md:px-10 py-14 md:py-20\" style=\"background: #111;\">\n  <div class=\"max-w-7xl mx-auto\">\n    <div class=\"mb-3\">\n      <span class=\"badge text-xs font-bold uppercase tracking-widest\" style=\"background: rgba(99,102,241,0.15); color: #818cf8;\">Workout Plans<\/span>\n    <\/div>\n    <h2 class=\"text-3xl md:text-4xl font-bold mb-2\">Workout Plan <span class=\"gradient-text\">Documentation<\/span><\/h2>\n    <p class=\"mb-10 max-w-2xl\" style=\"color: var(--muted);\">Everything you need to understand how FormForge plans are built, customised, and optimised for your body and goals.<\/p>\n    <div id=\"workout-tabs\" class=\"mb-8\">\n      <div class=\"flex flex-wrap gap-2 mb-8 p-1 rounded-xl inline-flex\" style=\"background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);\">\n        <button onclick=\"showTab('tab-built')\" id=\"btn-tab-built\" class=\"px-4 py-2 rounded-lg text-sm font-semibold transition-all\" style=\"background: var(--accent); color: #000;\">How Plans Are Built<\/button>\n        <button onclick=\"showTab('tab-schedule')\" id=\"btn-tab-schedule\" class=\"px-4 py-2 rounded-lg text-sm font-semibold transition-all\" style=\"color: var(--muted);\">Customising Schedule<\/button>\n        <button onclick=\"showTab('tab-swap')\" id=\"btn-tab-swap\" class=\"px-4 py-2 rounded-lg text-sm font-semibold transition-all\" style=\"color: var(--muted);\">Swapping Exercises<\/button>\n        <button onclick=\"showTab('tab-deload')\" id=\"btn-tab-deload\" class=\"px-4 py-2 rounded-lg text-sm font-semibold transition-all\" style=\"color: var(--muted);\">Deload Weeks<\/button>\n      <\/div>\n      <div id=\"tab-built\" class=\"grid lg:grid-cols-2 gap-10 items-center\">\n        <div>\n          <h3 class=\"text-2xl font-bold mb-4\">How Plans Are Built<\/h3>\n          <p class=\"mb-4\" style=\"color: var(--muted);\">Every FormForge plan is constructed using a three-layer framework: <strong style=\"color: var(--text);\">Periodisation Model<\/strong>, <strong style=\"color: var(--text);\">Volume Landmarks<\/strong>, and <strong style=\"color: var(--text);\">Adaptive Overload.<\/strong><\/p>\n          <p class=\"mb-4\" style=\"color: var(--muted);\">Our sports scientists define the weekly structure (e.g., upper/lower split for Power Hypertrophy), then the algorithm assigns starting weights and rep ranges based on your fitness assessment. Each week, volume increases by 5–10% until a deload is triggered.<\/p>\n          <p class=\"mb-4\" style=\"color: var(--muted);\">Plans like the <strong style=\"color: var(--text);\">HIIT Fat Torch 8-Week<\/strong> use EPOC-optimised circuits — work-to-rest ratios calibrated to keep heart rate between 75–90% max for maximum fat oxidation.<\/p>\n          <ul class=\"space-y-2\">\n            <li class=\"flex items-center gap-2 text-sm\" style=\"color: var(--muted);\"><i data-lucide=\"check\" class=\"w-4 h-4\" style=\"color: var(--accent);\"><\/i> Evidence-based periodisation (linear, DUP, block)<\/li>\n            <li class=\"flex items-center gap-2 text-sm\" style=\"color: var(--muted);\"><i data-lucide=\"check\" class=\"w-4 h-4\" style=\"color: var(--accent);\"><\/i> MEV → MRV volume progression per muscle group<\/li>\n            <li class=\"flex items-center gap-2 text-sm\" style=\"color: var(--muted);\"><i data-lucide=\"check\" class=\"w-4 h-4\" style=\"color: var(--accent);\"><\/i> Auto-regulated intensity based on RPE logging<\/li>\n            <li class=\"flex items-center gap-2 text-sm\" style=\"color: var(--muted);\"><i data-lucide=\"check\" class=\"w-4 h-4\" style=\"color: var(--accent);\"><\/i> Wearable data integrated into load recommendations<\/li>\n          <\/ul>\n        <\/div>\n        <div class=\"rounded-2xl overflow-hidden relative\" style=\"height: 380px;\">\n          <img src=\"https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=640&h=480&q=80&auto=format&fit=crop\" alt=\"Plan structure diagram\" class=\"w-full h-full object-cover\" />\n          <div class=\"absolute inset-0 rounded-2xl\" style=\"background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);\"><\/div>\n          <div class=\"absolute bottom-5 left-5 right-5\">\n            <div class=\"flex items-center justify-between\">\n              <div class=\"text-center\">\n                <div class=\"text-xs font-bold mb-1\" style=\"color: var(--accent);\">WEEK 1–4<\/div>\n                <div class=\"text-xs\" style=\"color: rgba(255,255,255,0.8);\">Accumulation<\/div>\n              <\/div>\n              <i data-lucide=\"arrow-right\" class=\"w-4 h-4\" style=\"color: rgba(255,255,255,0.4);\"><\/i>\n              <div class=\"text-center\">\n                <div class=\"text-xs font-bold mb-1\" style=\"color: var(--accent);\">WEEK 5–8<\/div>\n                <div class=\"text-xs\" style=\"color: rgba(255,255,255,0.8);\">Intensification<\/div>\n              <\/div>\n              <i data-lucide=\"arrow-right\" class=\"w-4 h-4\" style=\"color: rgba(255,255,255,0.4);\"><\/i>\n              <div class=\"text-center\">\n                <div class=\"text-xs font-bold mb-1\" style=\"color: var(--accent);\">WEEK 9–12<\/div>\n                <div class=\"text-xs\" style=\"color: rgba(255,255,255,0.8);\">Realisation<\/div>\n              <\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n      <div id=\"tab-schedule\" class=\"grid lg:grid-cols-2 gap-10 items-center\" style=\"display:none;\">\n        <div>\n          <h3 class=\"text-2xl font-bold mb-4\">Customising Your Schedule<\/h3>\n          <p class=\"mb-4\" style=\"color: var(--muted);\">FormForge plans come with a default weekly layout, but you have full control to move training days without disrupting the periodisation logic. The system automatically preserves rest-day spacing.<\/p>\n          <p class=\"mb-4\" style=\"color: var(--muted);\">Navigate to <strong style=\"color: var(--text);\">My Plan → Schedule → Drag to Rearrange<\/strong>. You can shift any session to a different day of the week. The algorithm enforces a minimum 48-hour gap between sessions targeting the same muscle groups.<\/p>\n          <div class=\"space-y-3 mt-6\">\n            <div class=\"flex items-start gap-3 p-3 rounded-xl\" style=\"background: rgba(255,255,255,0.04);\">\n              <i data-lucide=\"calendar\" class=\"w-5 h-5 mt-0.5 flex-shrink-0\" style=\"color: var(--accent);\"><\/i>\n              <div>\n                <p class=\"font-semibold text-sm\">Drag-and-Drop Calendar<\/p>\n                <p class=\"text-xs mt-1\" style=\"color: var(--muted);\">Visually rearrange sessions on a weekly grid. Conflicts are highlighted in amber.<\/p>\n              <\/div>\n            <\/div>\n            <div class=\"flex items-start gap-3 p-3 rounded-xl\" style=\"background: rgba(255,255,255,0.04);\">\n              <i data-lucide=\"sliders\" class=\"w-5 h-5 mt-0.5 flex-shrink-0\" style=\"color: var(--accent);\"><\/i>\n              <div>\n                <p class=\"font-semibold text-sm\">Session Duration Control<\/p>\n                <p class=\"text-xs mt-1\" style=\"color: var(--muted);\">Compress a 75-min session to 45 min — the system trims accessory work, not primary lifts.<\/p>\n              <\/div>\n            <\/div>\n            <div class=\"flex items-start gap-3 p-3 rounded-xl\" style=\"background: rgba(255,255,255,0.04);\">\n              <i data-lucide=\"bell\" class=\"w-5 h-5 mt-0.5 flex-shrink-0\" style=\"color: var(--accent);\"><\/i>\n              <div>\n                <p class=\"font-semibold text-sm\">Smart Reminders<\/p>\n                <p class=\"text-xs mt-1\" style=\"color: var(--muted);\">Set push + WhatsApp reminders 30 min before each session. Supports IST timezone natively.<\/p>\n              <\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n        <div class=\"rounded-2xl p-6\" style=\"background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);\">\n          <p class=\"text-xs font-bold uppercase tracking-widest mb-4\" style=\"color: var(--muted);\">Weekly Schedule — Power Hypertrophy<\/p>\n          <div class=\"space-y-2\">\n            <div class=\"flex items-center gap-3 p-3 rounded-xl\" style=\"background: rgba(232,255,59,0.1); border: 1px solid rgba(232,255,59,0.2);\">\n              <span class=\"text-xs font-bold w-8\" style=\"color: var(--accent);\">MON<\/span>\n              <span class=\"text-sm font-semibold\">Upper Body — Push Focus<\/span>\n              <span class=\"ml-auto text-xs\" style=\"color: var(--muted);\">75 min<\/span>\n            <\/div>\n            <div class=\"flex items-center gap-3 p-3 rounded-xl\" style=\"background: rgba(232,255,59,0.1); border: 1px solid rgba(232,255,59,0.2);\">\n              <span class=\"text-xs font-bold w-8\" style=\"color: var(--accent);\">TUE<\/span>\n              <span class=\"text-sm font-semibold\">Lower Body — Quad Dominant<\/span>\n              <span class=\"ml-auto text-xs\" style=\"color: var(--muted);\">80 min<\/span>\n            <\/div>\n            <div class=\"flex items-center gap-3 p-3 rounded-xl\" style=\"background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);\">\n              <span class=\"text-xs font-bold w-8\" style=\"color: var(--muted);\">WED<\/span>\n              <span class=\"text-sm\" style=\"color: var(--muted);\">Active Recovery<\/span>\n              <span class=\"ml-auto text-xs\" style=\"color: var(--muted);\">30 min<\/span>\n            <\/div>\n            <div class=\"flex items-center gap-3 p-3 rounded-xl\" style=\"background: rgba(232,255,59,0.1); border: 1px solid rgba(232,255,59,0.2);\">\n              <span class=\"text-xs font-bold w-8\" style=\"color: var(--accent);\">THU<\/span>\n              <span class=\"text-sm font-semibold\">Upper Body — Pull Focus<\/span>\n              <span class=\"ml-auto text-xs\" style=\"color: var(--muted);\">70 min<\/span>\n            <\/div>\n            <div class=\"flex items-center gap-3 p-3 rounded-xl\" style=\"background: rgba(232,255,59,0.1); border: 1px solid rgba(232,255,59,0.2);\">\n              <span class=\"text-xs font-bold w-8\" style=\"color: var(--accent);\">FRI<\/span>\n              <span class=\"text-sm font-semibold\">Lower Body — Hip Dominant<\/span>\n              <span class=\"ml-auto text-xs\" style=\"color: var(--muted);\">80 min<\/span>\n            <\/div>\n            <div class=\"flex items-center gap-3 p-3 rounded-xl\" style=\"background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);\">\n              <span class=\"text-xs font-bold w-8\" style=\"color: var(--muted);\">SAT<\/span>\n              <span class=\"text-sm\" style=\"color: var(--muted);\">Rest Day<\/span>\n              <span class=\"ml-auto text-xs\" style=\"color: var(--muted);\">—<\/span>\n            <\/div>\n            <div class=\"flex items-center gap-3 p-3 rounded-xl\" style=\"background: rgba(232,255,59,0.1); border: 1px solid rgba(232,255,59,0.2);\">\n              <span class=\"text-xs font-bold w-8\" style=\"color: var(--accent);\">SUN<\/span>\n              <span class=\"text-sm font-semibold\">Arms + Core Finisher<\/span>\n              <span class=\"ml-auto text-xs\" style=\"color: var(--muted);\">45 min<\/span>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n      <div id=\"tab-swap\" class=\"grid lg:grid-cols-2 gap-10 items-center\" style=\"display:none;\">\n        <div>\n          <h3 class=\"text-2xl font-bold mb-4\">Swapping Exercises<\/h3>\n          <p class=\"mb-4\" style=\"color: var(--muted);\">Don't have a barbell? Injured your shoulder? FormForge's swap engine lets you replace any exercise with an approved substitute that targets the same muscle groups and matches the movement pattern.<\/p>\n          <p class=\"mb-4\" style=\"color: var(--muted);\">Tap any exercise in your plan → hit <strong style=\"color: var(--text);\">Swap Exercise<\/strong> → choose from 3–6 AI-ranked alternatives. Each suggestion shows equipment needed, difficulty delta, and estimated muscle activation overlap (%).<\/p>\n          <div class=\"p-4 rounded-xl mt-4\" style=\"background: rgba(255,200,50,0.08); border: 1px solid rgba(255,200,50,0.2);\">\n            <div class=\"flex items-start gap-2\">\n              <i data-lucide=\"alert-triangle\" class=\"w-4 h-4 mt-0.5 flex-shrink-0\" style=\"color: #fbbf24;\"><\/i>\n              <p class=\"text-sm\" style=\"color: var(--muted);\"><strong style=\"color: #fbbf24;\">Note:<\/strong<section class=\"px-6 md:px-10 py-12\"><div class=\"max-w-7xl mx-auto\"><div class=\"grid grid-cols-1 md:grid-cols-3 gap-5 stagger\"><div class=\"card\" style=\"padding:0;overflow:hidden\"><img src=\"https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1400&h=900&q=80&auto=format&fit=crop\" alt=\"FormForge 1\" loading=\"lazy\" style=\"width:100%;height:230px;object-fit:cover;display:block\"><\/div><div class=\"card\" style=\"padding:0;overflow:hidden\"><img src=\"https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=900&h=700&q=80&auto=format&fit=crop\" alt=\"FormForge 2\" loading=\"lazy\" style=\"width:100%;height:230px;object-fit:cover;display:block\"><\/div><div class=\"card\" style=\"padding:0;overflow:hidden\"><img src=\"https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=640&h=480&q=80&auto=format&fit=crop\" alt=\"FormForge 3\" loading=\"lazy\" style=\"width:100%;height:230px;object-fit:cover;display:block\"><\/div><\/div><\/div><\/section>"};</script>
<script>
  function _icons(){ try{ if(window.lucide) lucide.createIcons(); }catch(e){} }
  function loadPage(name){
    var html = (window.__PAGES__ && window.__PAGES__[name]) || '';
    var el = document.getElementById('page-content');
    if(!el) return;
    if(!html){ name = "home"; html = (window.__PAGES__||{})[name] || ''; }
    el.classList.add('exiting');
    setTimeout(function(){
      el.innerHTML = html;
      el.classList.remove('exiting');
      el.style.opacity='0'; el.style.transform='translateY(12px)';
      requestAnimationFrame(function(){
        el.style.transition='opacity .35s ease, transform .35s ease';
        el.style.opacity='1'; el.style.transform='translateY(0)';
      });
      _icons();
      window.scrollTo(0,0);
    }, 180);
    document.querySelectorAll('.nav-item,.bn-item').forEach(function(i){i.classList.remove('active');});
    document.querySelectorAll('[data-page="'+name+'"]').forEach(function(a){a.classList.add('active');});
    try{ history.replaceState(null,'','#'+name); }catch(e){}
  }
  window.addEventListener('message', function(e){ if(e.data && e.data.page) loadPage(e.data.page); });
  window.addEventListener('hashchange', function(){ var h=location.hash.replace('#',''); if(h && window.__PAGES__[h]) loadPage(h); });
  document.addEventListener('DOMContentLoaded', function(){
    _icons();
    var h = location.hash.replace('#','');
    loadPage(h && window.__PAGES__[h] ? h : "home");
  });
</script>
