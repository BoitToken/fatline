<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaapi Collective</title>
<meta name="description" content="Single-origin. Slow-brewed. Deeply South.">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant%20Garamond:wght@300;400;500;600;700&family=DM%20Sans:wght@400;500;600&family=IBM%20Plex%20Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script>
tailwind.config = {
  theme: { extend: {
    colors: { brand: '#C8813A', accent: '#E8B86D', ink: '#111009', card: '#211E16',
      'bg-elev': '#1A1710', line: '#2E2A1F', 'ink-muted': '#B8AD9A', 'ink-dim': '#6E6557',
      ok: '#6A9E6F', warn: '#D4A843', risk: '#C25B3F' },
    fontFamily: { display: ['Cormorant Garamond','serif'], body: ['DM Sans','sans-serif'], mono: ['IBM Plex Mono','monospace'] }
  } }
};
</script>
<style>
  :root{
    --primary:#C8813A; --primary-rgb:200, 129, 58;
    --accent:#E8B86D; --accent-rgb:232, 184, 109;
    --bg:#111009; --bg-elev:#1A1710; --card:#211E16; --line:#2E2A1F;
    --text:#F2EDE4; --contrast:#F2EDE4;
    --muted:#B8AD9A; --ink-muted:#B8AD9A; --ink-dim:#6E6557;
    --ok:#6A9E6F; --warn:#D4A843; --risk:#C25B3F;
    --font-display:'Cormorant Garamond',serif; --font-body:'DM Sans',sans-serif; --font-mono:'IBM Plex Mono',ui-monospace,monospace;
    --display-size:clamp(40px,8vw,92px);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;overflow-x:hidden;max-width:100%;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased;line-height:1.6;}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.04;mix-blend-mode:overlay;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
  h1,h2,h3,h4,.font-display{font-family:var(--font-display);letter-spacing:-0.022em;line-height:1.06;}
  h1 em,h2 em,h3 em,.font-display em{font-style:italic;color:var(--accent);font-weight:inherit;}
  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);display:inline-flex;align-items:center;gap:10px;}
  .eyebrow::before{content:"";width:22px;height:1px;background:currentColor;opacity:.7;}
  a{color:inherit;text-decoration:none;}
  ::selection{background:rgba(var(--primary-rgb),0.35);}
  img{display:block;max-width:100%;}
  /* layout */
  .app{display:flex;min-height:100vh;}
  .sidebar{width:248px;flex-shrink:0;background:linear-gradient(180deg, color-mix(in srgb,var(--card) 92%, #000) 0%, var(--bg) 100%);
    border-right:1px solid rgba(var(--primary-rgb),0.10);padding:22px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:6px;}
  .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px;}
  .brand .logo{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-weight:800;color:#fff;
    background:linear-gradient(135deg,var(--primary),var(--accent));box-shadow:0 6px 20px rgba(var(--primary-rgb),0.4);font-family:var(--font-display);}
  .brand .bname{font-weight:700;font-size:15px;}
  .brand .btag{font-size:11px;color:var(--muted);}
  .nav-item{display:flex;align-items:center;gap:12px;width:100%;padding:11px 13px;border:none;background:transparent;color:var(--muted);
    border-radius:11px;cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-body);transition:all .18s ease;text-align:left;}
  .nav-item:hover{background:rgba(var(--primary-rgb),0.08);color:var(--text);}
  .nav-item.active{background:rgba(var(--primary-rgb),0.14);color:#fff;box-shadow:inset 0 0 0 1px rgba(var(--primary-rgb),0.25);}
  .nav-item i,.bn-item i{width:18px;height:18px;}
  .nav-foot{margin-top:auto;padding:12px 8px 0;border-top:1px solid rgba(var(--primary-rgb),0.08);font-size:12px;color:var(--muted);}
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 30px;position:sticky;top:0;z-index:20;
    background:color-mix(in srgb,var(--bg) 82%, transparent);backdrop-filter:blur(14px);border-bottom:1px solid rgba(var(--primary-rgb),0.08);}
  .topbar .tt{font-size:13px;color:var(--muted);}
  .topbar .actions{display:flex;align-items:center;gap:12px;}
  #page-content{padding:0 0 80px;animation:fadeUp .5s ease both;overflow-x:auto;max-width:100%;}
  #page-content img{max-width:100%;}
  #page-content > *{max-width:100%;}
  #page-content.exiting{opacity:0;transform:translateY(10px);transition:all .2s ease;}
  /* component vocabulary the LLM is told to use */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:12px;font-weight:600;font-size:14px;cursor:pointer;border:none;transition:all .2s ease;}
  .btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 8px 24px rgba(var(--primary-rgb),0.35);}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(var(--primary-rgb),0.5);}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid rgba(var(--primary-rgb),0.3);}
  .btn-ghost:hover{background:rgba(var(--primary-rgb),0.08);}
  .pill{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:600;letter-spacing:.04em;
    background:rgba(var(--primary-rgb),0.12);color:var(--accent);border:1px solid rgba(var(--primary-rgb),0.22);text-transform:uppercase;}
  .card{background:linear-gradient(160deg, color-mix(in srgb,var(--card) 96%, #fff) 0%, var(--card) 100%);
    border:1px solid rgba(var(--primary-rgb),0.10);border-radius:18px;padding:24px;transition:all .25s ease;}
  .card:hover{transform:translateY(-4px);border-color:rgba(var(--primary-rgb),0.28);box-shadow:0 18px 40px rgba(0,0,0,0.35);}
  .stat{font-family:var(--font-display);font-size:30px;font-weight:700;color:#fff;}
  .muted{color:var(--muted);}
  .accent{color:var(--accent);}
  .glass{background:rgba(255,255,255,0.04);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:18px;}
  .gradient-text{background:linear-gradient(120deg,var(--text),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(var(--primary-rgb),0.4),transparent);}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:12px 14px;border-bottom:1px solid rgba(var(--primary-rgb),0.12);}
  td{padding:14px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:14px;}
  tr:hover td{background:rgba(var(--primary-rgb),0.04);}
  .badge{display:inline-block;padding:3px 11px;border-radius:999px;font-size:12px;font-weight:600;}
  .badge-green{background:rgba(34,197,94,0.15);color:#4ade80;}
  .badge-amber{background:rgba(245,158,11,0.15);color:#fbbf24;}
  .badge-red{background:rgba(239,68,68,0.15);color:#f87171;}
  .stagger>*{opacity:0;animation:fadeUp .6s ease forwards;}
  .stagger>*:nth-child(1){animation-delay:.05s}.stagger>*:nth-child(2){animation-delay:.12s}
  .stagger>*:nth-child(3){animation-delay:.19s}.stagger>*:nth-child(4){animation-delay:.26s}
  .stagger>*:nth-child(5){animation-delay:.33s}.stagger>*:nth-child(6){animation-delay:.40s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .bottom-nav{display:none;}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(var(--primary-rgb),0.3);border-radius:9px}
  /* mobile */
  @media(max-width:860px){
    .sidebar{display:none!important;}
    .topbar{padding:14px 18px;}
    #page-content{padding-bottom:96px;}
    .bottom-nav{display:flex!important;position:fixed;bottom:0;left:0;right:0;z-index:50;justify-content:space-around;
      padding:9px 6px env(safe-area-inset-bottom);background:color-mix(in srgb,var(--card) 96%, #000);border-top:1px solid rgba(var(--primary-rgb),0.18);backdrop-filter:blur(16px);}
    .bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;flex:1;}
    .bn-item.active{color:var(--accent);}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">KC</div>
      <div><div class="bname">Kaapi Collective</div><div class="btag">Filter Coffee</div></div>
    </div>
    <button class="nav-item active" data-page="home" onclick="loadPage('home')">
      <i data-lucide="home"></i><span>Home</span>
    </button>
      <button class="nav-item" data-page="shop" onclick="loadPage('shop')">
      <i data-lucide="shopping-bag"></i><span>Shop</span>
    </button>
      <button class="nav-item" data-page="product" onclick="loadPage('product')">
      <i data-lucide="package"></i><span>Product</span>
    </button>
      <button class="nav-item" data-page="cart" onclick="loadPage('cart')">
      <i data-lucide="shopping-cart"></i><span>Cart</span>
    </button>
      <button class="nav-item" data-page="account" onclick="loadPage('account')">
      <i data-lucide="user"></i><span>Account</span>
    </button>
    <div class="nav-foot">Powered by Fatline</div>
  </aside>
  <div class="main">
    <header class="topbar">
      <div class="tt">Single-origin. Slow-brewed. Deeply South.</div>
      <div class="actions">
        <span class="pill"><i data-lucide="circle-dot" style="width:13px;height:13px"></i> Live</span>
        <button class="btn btn-primary" style="padding:9px 18px" onclick="window.ProdusaAuth&&window.ProdusaAuth.signIn?window.ProdusaAuth.signIn():null">Shop Coffees</button>
      </div>
    </header>
    <main id="page-content"></main>
  </div>
</div>
<nav class="bottom-nav">
  <button class="bn-item active" data-page="home" onclick="loadPage('home')">
      <i data-lucide="home"></i><span>Home</span>
    </button>
      <button class="bn-item" data-page="shop" onclick="loadPage('shop')">
      <i data-lucide="shopping-bag"></i><span>Shop</span>
    </button>
      <button class="bn-item" data-page="product" onclick="loadPage('product')">
      <i data-lucide="package"></i><span>Product</span>
    </button>
      <button class="bn-item" data-page="cart" onclick="loadPage('cart')">
      <i data-lucide="shopping-cart"></i><span>Cart</span>
    </button>
      <button class="bn-item" data-page="account" onclick="loadPage('account')">
      <i data-lucide="user"></i><span>Account</span>
    </button>
</nav>
<script>window.__PAGES__ = {"home":"<style>\n  /* ── Kaapi Collective — Home Page ── */\n  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap');\n\n  :root {\n    --kc-amber: #C8813A;\n    --kc-amber-light: #E8A55A;\n    --kc-earth: #2A1A0E;\n    --kc-roast: #1A0F06;\n    --kc-cream: #F5EDD8;\n    --kc-sepia: #7A5C3A;\n  }\n\n  .kc-display { font-family: 'Cormorant Garamond', Georgia, serif; }\n\n  /* Grain texture overlay */\n  .grain::after {\n    content: '';\n    position: absolute;\n    inset: 0;\n    background-image: url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E\");\n    pointer-events: none;\n    z-index: 2;\n    border-radius: inherit;\n  }\n\n  /* Origin depth cards */\n  .origin-strip {\n    display: flex;\n    gap: 1.5rem;\n    overflow-x: auto;\n    padding-bottom: 1.5rem;\n    scroll-snap-type: x mandatory;\n    -webkit-overflow-scrolling: touch;\n  }\n  .origin-strip::-webkit-scrollbar { height: 4px; }\n  .origin-strip::-webkit-scrollbar-track { background: var(--line, #2a2a2a); border-radius: 2px; }\n  .origin-strip::-webkit-scrollbar-thumb { background: var(--kc-amber); border-radius: 2px; }\n\n  .origin-card {\n    flex: 0 0 380px;\n    scroll-snap-align: start;\n    background: var(--card, #1e1a14);\n    border: 1px solid rgba(200,129,58,0.2);\n    border-radius: 1.25rem;\n    overflow: hidden;\n    transition: transform 0.3s ease, box-shadow 0.3s ease;\n    position: relative;\n  }\n  .origin-card:hover {\n    transform: translateY(-4px);\n    box-shadow: 0 20px 60px rgba(200,129,58,0.25);\n  }\n\n  /* Topo map SVG area */\n  .topo-area {\n    height: 140px;\n    background: linear-gradient(135deg, #1a0f06 0%, #2d1a0a 50%, #1a0f06 100%);\n    position: relative;\n    overflow: hidden;\n  }\n\n  /* Radial petal chart */\n  .petal-chart { transform-origin: center; }\n\n  /* Product card grain */\n  .product-card {\n    background: var(--card, #1e1a14);\n    border: 1px solid rgba(200,129,58,0.15);\n    border-radius: 1.25rem;\n    overflow: hidden;\n    transition: transform 0.35s ease, box-shadow 0.35s ease;\n    position: relative;\n  }\n  .product-card:hover {\n    transform: translateY(-6px);\n    box-shadow: 0 24px 64px rgba(200,129,58,0.3);\n  }\n  .product-card::before {\n    content: '';\n    position: absolute;\n    inset: 0;\n    background-image: url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E\");\n    pointer-events: none;\n    z-index: 1;\n  }\n\n  .roast-pill-light { background: rgba(200,129,58,0.15); color: #E8A55A; border: 1px solid rgba(200,129,58,0.3); }\n  .roast-pill-medium { background: rgba(160,90,30,0.2); color: #C8813A; border: 1px solid rgba(200,129,58,0.4); }\n  .roast-pill-dark { background: rgba(80,40,10,0.4); color: #A0652A; border: 1px solid rgba(150,80,20,0.4); }\n\n  .btn-amber {\n    background: var(--kc-amber);\n    color: #fff;\n    border: none;\n    padding: 0.6rem 1.4rem;\n    border-radius: 0.5rem;\n    font-family: var(--font-mono, 'IBM Plex Mono', monospace);\n    font-size: 0.75rem;\n    letter-spacing: 0.08em;\n    cursor: pointer;\n    transition: background 0.2s, transform 0.2s;\n    text-transform: uppercase;\n  }\n  .btn-amber:hover { background: var(--kc-amber-light); transform: scale(1.02); }\n\n  .btn-ghost-amber {\n    background: transparent;\n    color: var(--kc-amber);\n    border: 1px solid var(--kc-amber);\n    padding: 0.75rem 2rem;\n    border-radius: 0.5rem;\n    font-family: var(--font-mono, 'IBM Plex Mono', monospace);\n    font-size: 0.8rem;\n    letter-spacing: 0.1em;\n    cursor: pointer;\n    transition: all 0.25s;\n    text-transform: uppercase;\n  }\n  .btn-ghost-amber:hover { background: rgba(200,129,58,0.1); }\n\n  .stat-card-kc {\n    padding: 2.5rem 2rem;\n    border-right: 1px solid var(--line, rgba(255,255,255,0.08));\n    text-align: center;\n  }\n  .stat-card-kc:last-child { border-right: none; }\n\n  .testimonial-card-kc {\n    background: var(--card, #1e1a14);\n    border: 1px solid rgba(200,129,58,0.15);\n    border-radius: 1.25rem;\n    padding: 2rem;\n    transition: transform 0.3s, box-shadow 0.3s;\n  }\n  .testimonial-card-kc:hover {\n    transform: translateY(-4px);\n    box-shadow: 0 16px 48px rgba(200,129,58,0.2);\n  }\n\n  /* Stagger animation */\n  @keyframes fadeUp {\n    from { opacity: 0; transform: translateY(24px); }\n    to { opacity: 1; transform: translateY(0); }\n  }\n  .stagger > * { animation: fadeUp 0.6s ease both; }\n  .stagger > *:nth-child(1) { animation-delay: 0.05s; }\n  .stagger > *:nth-child(2) { animation-delay: 0.15s; }\n  .stagger > *:nth-child(3) { animation-delay: 0.25s; }\n  .stagger > *:nth-child(4) { animation-delay: 0.35s; }\n\n  em { font-style: italic; color: var(--kc-amber); }\n<\/style>\n\n<!-- ══════════════════════════════════════════════\n     SECTION 1 — FULL-BLEED EDITORIAL HERO\n══════════════════════════════════════════════ -->\n<section class=\"relative overflow-hidden grain\" style=\"min-height:100vh; background:#0E0905;\">\n  <!-- Background image -->\n  <div class=\"absolute inset-0 z-0\">\n    <img\n      src=\"https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1400&h=900&q=80&auto=format&fit=crop\"\n      alt=\"Brass tumbler on plantation leaf\"\n      class=\"w-full h-full object-cover\"\n      style=\"opacity:0.35; object-position: center 40%;\"\n    />\n    <div class=\"absolute inset-0\" style=\"background: linear-gradient(135deg, rgba(14,9,5,0.92) 0%, rgba(30,18,6,0.75) 50%, rgba(14,9,5,0.88) 100%);\"><\/div>\n    <!-- Amber bleed from bottom-right -->\n    <div class=\"absolute bottom-0 right-0 w-1/2 h-2/3\" style=\"background: radial-gradient(ellipse at 80% 100%, rgba(200,129,58,0.18) 0%, transparent 70%);\"><\/div>\n  <\/div>\n\n  <!-- Roast-to-order badge -->\n  <div class=\"absolute top-6 left-6 z-10\" style=\"z-index:10;\">\n    <span class=\"eyebrow flex items-center gap-2 px-3 py-1.5 rounded-full text-xs\" style=\"background:rgba(200,129,58,0.15); border:1px solid rgba(200,129,58,0.4); color: var(--kc-amber); font-family: var(--font-mono, monospace); letter-spacing:0.1em;\">\n      <i data-lucide=\"zap\" style=\"width:12px;height:12px;\"><\/i>\n      ROASTED TO ORDER — 72 HRS TO DISPATCH\n    <\/span>\n  <\/div>\n\n  <!-- Hero content -->\n  <div class=\"relative z-10 flex flex-col justify-center px-6 md:px-16 lg:px-24\" style=\"min-height:100vh; padding-top:6rem; padding-bottom:4rem;\">\n    <div class=\"max-w-4xl\">\n      <!-- Eyebrow -->\n      <p class=\"eyebrow mb-6\" style=\"color:var(--kc-amber); font-family: var(--font-mono, monospace); letter-spacing:0.18em; font-size:0.7rem;\">\n        KAAPI COLLECTIVE · SINGLE-ORIGIN · SOUTH INDIA\n      <\/p>\n\n      <!-- Display headline -->\n      <h1 class=\"kc-display leading-none mb-6\" style=\"font-size: clamp(3rem, 8vw, 6.5rem); font-weight:600; color:#F5EDD8; line-height:1.05;\">\n        Coffee that<br>\n        <em>remembers<\/em> the<br>\n        hill it came from\n      <\/h1>\n\n      <!-- Sub-headline -->\n      <p class=\"mb-10 max-w-xl\" style=\"font-size:1.1rem; color:rgba(245,237,216,0.65); line-height:1.75; font-family: var(--font-body, 'DM Sans', sans-serif);\">\n        Single-estate South Indian filter coffee, roasted to order and delivered to your door. Each bag carries the altitude, the season, and the soil it grew in.\n      <\/p>\n\n      <!-- CTAs -->\n      <div class=\"flex flex-wrap gap-4 item ;font-weight:700;\">2,100 m<\/p>\n            <\/div>\n            <div>\n              <p class=\"eyebrow mb-1\" style=\"color:rgba(200,129,58,0.6);font-size:0.58rem;\">VARIETAL<\/p>\n              <p style=\"font-family:var(--font-mono);color:#fff;font-size:1rem;\">S.795 Arabica<\/p>\n            <\/div>\n            <div>\n              <p class=\"eyebrow mb-1\" style=\"color:rgba(200,129,58,0.6);font-size:0.58rem;\">HARVEST<\/p>\n              <p style=\"font-family:var(--font-mono);color:#fff;font-size:1rem;\">Nov–Jan 2024<\/p>\n            <\/div>\n            <div>\n              <p class=\"eyebrow mb-1\" style=\"color:rgba(200,129,58,0.6);font-size:0.58rem;\">PROCESSING<\/p>\n              <p style=\"font-family:var(--font-mono);color:#fff;font-size:1rem;\">Natural Dry<\/p>\n            <\/div>\n            <div>\n              <p class=\"eyebrow mb-1\" style=\"color:rgba(200,129,58,0.6);font-size:0.58rem;\">FARMER<\/p>\n              <p style=\"font-family:var(--font-mono);color:#fff;font-size:0.9rem;\">T. Rajan &amp; Sons Estate<\/p>\n            <\/div>\n            <div>\n              <p class=\"eyebrow mb-1\" style=\"color:rgba(200,129,58,0.6);font-size:0.58rem;\">SOIL TYPE<\/p>\n              <p style=\"font-family:var(--font-mono);color:#fff;font-size:0.9rem;\">Red Laterite<\/p>\n            <\/div>\n          <\/div>\n\n          <!-- Roast profile curve -->\n          <div>\n            <p class=\"eyebrow mb-3\" style=\"color:rgba(200,129,58,0.6);font-size:0.58rem;\">ROAST PROFILE CURVE<\/p>\n            <svg viewBox=\"0 0 260 80\" width=\"100%\" style=\"max-width:260px;\">\n              <defs>\n                <linearGradient id=\"roastGrad\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">\n                  <stop offset=\"0%\" stop-color=\"#a0522d\"/>\n                  <stop offset=\"100%\" stop-color=\"#c8813a\"/>\n                <\/linearGradient>\n              <\/defs>\n              <!-- Grid lines -->\n              <line x1=\"0\" y1=\"60\" x2=\"260\" y2=\"60\" stroke=\"rgba(255,255,255,0.08)\" stroke-width=\"1\"/>\n              <line x1=\"0\" y1=\"40\" x2=\"260\" y2=\"40\" stroke=\"rgba(255,255,255,0.08)\" stroke-width=\"1\"/>\n              <line x1=\"0\" y1=\"20\" x2=\"260\" y2=\"20\" stroke=\"rgba(255,255,255,0.08)\" stroke-width=\"1\"/>\n              <!-- Curve -->\n              <path d=\"M10,68 C40,65 60,55 90,40 C120,25 140,18 170,15 C195,13 220,14 250,16\" fill=\"none\" stroke=\"url(#roastGrad)\" stroke-width=\"2.5\" stroke-linecap=\"round\"/>\n              <!-- First crack marker -->\n              <circle cx=\"140\" cy=\"18\" r=\"3\" fill=\"var(--accent)\"/>\n              <text x=\"143\" y=\"13\" fill=\"rgba(200,129,58,0.8)\" font-size=\"7\" font-family=\"monospace\">1st crack<\/text>\n              <!-- Labels -->\n              <text x=\"0\" y=\"77\" fill=\"rgba(255,255,255,0.3)\" font-size=\"7\" font-family=\"monospace\">0 min<\/text>\n              <text x=\"220\" y=\"77\" fill=\"rgba(255,255,255,0.3)\" font-size=\"7\" font-family=\"monospace\">14 min<\/text>\n              <text x=\"0\" y=\"63\" fill=\"rgba(255,255,255,0.3)\" font-size=\"6\" font-family=\"monospace\">160°<\/text>\n              <text x=\"0\" y=\"23\" fill=\"rgba(255,255,255,0.3)\" font-size=\"6\" font-family=\"monospace\">220°<\/text>\n            <\/svg>\n          <\/div>\n        <\/div>\n\n        <!-- Right: Tasting notes radial petals -->\n        <div class=\"p-7 flex flex-col items-center justify-center gap-4\">\n          <p class=\"eyebrow\" style=\"color:rgba(200,129,58,0.6);font-size:0.58rem;align-self:flex-start;\">FLAVOUR PETALS<\/p>\n          <svg viewBox=\"0 0 220 220\" width=\"200\" height=\"200\">\n            <defs>\n              <radialGradient id=\"petalGrad\" cx=\"50%\" cy=\"50%\" r=\"50%\">\n                <stop offset=\"0%\" stop-color=\"rgba(200,129,58,0.6)\"/>\n                <stop offset=\"100%\" stop-color=\"rgba(200,129,58,0.05)\"/>\n              <\/radialGradient>\n            <\/defs>\n            <!-- Spider web -->\n            <g stroke=\"rgba(255,255,255,0.07)\" stroke-width=\"1\" fill=\"none\">\n              <polygon points=\"110,40 165,72 165,148 110,180 55,148 55,72\"/>\n              <polygon points=\"110,65 148,85 148,135 110,155 72,135 72,85\"/>\n              <polygon points=\"110,90 131,100 131,120 110,130 89,120 89,100\"/>\n            <\/g>\n            <!-- Axes -->\n            <g stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1\">\n              <line x1=\"110\" y1=\"40\" x2=\"110\" y2=\"180\"/>\n              <line x1=\"55\" y1=\"72\" x2=\"165\" y2=\"148\"/>\n              <line x1=\"165\" y1=\"72\" x2=\"55\" y2=\"148\"/>\n            <\/g>\n            <!-- Filled polygon (tasting notes) -->\n            <!-- Winey=90%, Dark Choc=80%, Stone Fruit=70%, Floral=55%, Caramel=65%, Earthy=75% -->\n            <polygon points=\"110,49 157,80 160,137 110,163 63,132 64,79\" fill=\"rgba(200,129,58,0.25)\" stroke=\"var(--accent)\" stroke-width=\"1.5\"/>\n            <!-- Labels -->\n            <text x=\"110\" y=\"35\" text-anchor=\"middle\" fill=\"rgba(255,255,255,0.7)\" font-size=\"9\" font-family=\"monospace\">Winey<\/text>\n            <text x=\"178\" y=\"75\" text-anchor=\"start\" fill=\"rgba(255,255,255,0.7)\" font-size=\"9\" font-family=\"monospace\">Dark Choc<\/text>\n            <text x=\"170\" y=\"155\" text-anchor=\"start\" fill=\"rgba(255,255,255,0.7)\" font-size=\"9\" font-family=\"monospace\">Stone Fruit<\/text>\n            <text x=\"110\" y=\"195\" text-anchor=\"middle\" fill=\"rgba(255,255,255,0.7)\" font-size=\"9\" font-family=\"monospace\">Floral<\/text>\n            <text x=\"18\" y=\"155\" text-anchor=\"start\" fill=\"rgba(255,255,255,0.7)\" font-size=\"9\" font-family=\"monospace\">Caramel<\/text>\n            <text x=\"22\" y=\"75\" text-anchor=\"start\" fill=\"rgba(255,255,255,0.7)\" font-size=\"9\" font-family=\"monospace\">Earthy<\/text>\n          <\/svg>\n          <div class=\"flex flex-wrap gap-2 justify-center\">\n            <span class=\"pill\" style=\"font-size:0.68rem;\">Winey<\/span>\n            <span class=\"pill\" style=\"font-size:0.68rem;\">Dark Chocolate<\/span>\n            <span class=\"pill\" style=\"font-size:0.68rem;\">Stone Fruit<\/span>\n            <span class=\"pill\" style=\"font-size:0.68rem;\">Floral<\/span>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ═══ SECTION 3: Tasting Notes & Flavour Narrative ═══ -->\n<section class=\"px-6 md:px-10 py-14 md:py-20\" style=\"background:var(--bg);\">\n  <div class=\"max-w-7xl mx-auto\">\n    <p class=\"eyebrow mb-8\" style=\"color:var(--accent);font-size:0.65rem;\">ROASTER'S TASTING NOTES<\/p>\n    <div class=\"grid md:grid-cols-2 gap-10 lg:gap-16 items-start\">\n\n      <!-- Left: Pull quote -->\n      <div>\n        <div class=\"relative pl-6 mb-8\" style=\"border-left:3px solid var(--accent);\">\n          <p style=\"font-family:var(--font-display);font-size:clamp(1.5rem,3vw,2.1rem);line-height:1.35;color:var(--text);font-style:italic;font-weight:600;\">\n            \"The frost doesn't harm these beans — it <em>concentrates<\/em> them. Every sip carries the cold mist of a Nilgiri dawn and the warmth of something ancient.\"\n          <\/p>\n          <p style=\"font-family:var(--font-mono);font-size:0.75rem;color:var(--ink-dim);margin-top:16px;\">— Arjun, Head Roaster, Kaapi Collective<\/p>\n        <\/div>\n\n        <!-- Tasting note pills with intensity -->\n        <div class=\"flex flex-col gap-3\">\n          <div class=\"flex items-center gap-3\">\n            <span style=\"font-family:var(--font-mono);font-size:0.75rem;color:var(--ink-muted);width:100px;\">Winey<\/span>\n            <div class=\"flex-1 rounded-full overflow-hidden\" style=\"height:5px;background:var(--line);\">\n              <div class=\"rounded-full h-full\" style=\"width:90%;background:var(--accent);\"><\/div>\n            <\/div>\n            <span style=\"font-family:var(--font-mono);font-size:0.7rem;color:var(--ink-dim);\">90%<\/span>\n          <\/div>\n          <div class=\"flex items-center gap-3\">\n            <span style=\"font-family:var(--font-mono);font-size:0.75rem;color:var(--ink-muted);width:100px;\">Dark Choc<\/span>\n            <div class=\"flex-1 rounded-full overflow-hidden\" style=\"height:5px;background:var(--line);\">\n              <div class=\"rounded-full h-full\" style=\"width:80%;background:var(--accent);\"><\/div>\n            <\/div>\n            <span style=\"font-family:var(--font-mono);font-size:0.7rem;color:var(--ink-dim);\">80%<\/span>\n          <\/div>\n          <div class=\"flex items-center gap-3\">\n            <span style=\"font-family:var(--font-mono);font-size:0.75rem;color:var(--ink-muted);width:100px;\">Stone Fruit<\/span>\n            <div class=\"flex-1 rounded-full overflow-hidden\" style=\"height:5px;background:var(--line);\">\n              <div class=\"rounded-full h-full\" style=\"width:70%;background:var(--accent);\"><\/div>\n            <\/div>\n            <span style=\"font-family:var(--font-mono);font-size:0.7rem;color:var(--ink-dim);\">70%<\/span>\n          <\/div>\n          <div class=\"flex items-center gap-3\">\n            <span style=\"font-family:var(--font-mono);font-size:0.75rem;color:var(--ink-muted);width:100px;\">Floral<\/span>\n            <div class=\"flex-1 rounded-full overflow-hidden\" style=\"height:5px;background:var(--line);\">\n              <div class=\"rounded-full h-full\" style=\"width:55%;background:var(--accent);\"><\/div>\n            <\/div>\n            <span style=\"font-family:var(--font-mono);font-size:0.7rem;color:var(--ink-dim);\">55%<\/span>\n          <\/div>\n        <\/div>\n      <\/div>\n\n      <!-- Right: Narrative + image -->\n      <div class=\"flex flex-col gap-6\">\n        <div class=\"rounded-2xl overflow-hidden\" style=\"height:240px;\">\n          <img src=\"https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=900&h=700&q=80&auto=format&fit=crop\" alt=\"Coffee estate detail\" class=\"w-full h-full object-cover\">\n        <\/div>\n        <div style=\"color:var(--ink-muted);line-height:1.8;font-size:0.95rem;\">\n          <p style=\"margin-bottom:14px;\">\n            At 2,100 metres, the Nilgiri Frost-Bitten Estate occupies one of the highest coffee-growing belts in South India. The laterite soil — rich in iron oxide and slow to drain — forces the S.795 Arabica root system deep, drawing minerals that manifest as that distinctive winey complexity in the cup.\n          <\/p>\n          <p style=\"margin-bottom:14px;\">\n            The <strong style=\"color:var(--text);\">frost events of December and January<\/strong> are the estate's defining phenomenon. Rare cold snaps slow cellular respiration in the cherry, causing sugars to accumulate beyond their usual concentration. Farmers here have learned not to panic — they wait, and the beans reward patience.\n          <\/p>\n          <p>\n            The natural dry process — cherries dried whole on raised African beds for 28–32 days — preserves all that fruit character. The result is a coffee of unusual density: <strong style=\"color:var(--text);\">full-bodied, layered, and deeply aromatic<\/strong>, unlike anything grown at lower elevations.\n          <\/p>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ═══ SECTION 4: Brew Guide Accordion ═══ -->\n<section class=\"px-6 md:px-10 py-14 md:py-20\" style=\"background:var(--bg-elev);\">\n  <div class=\"max-w-7xl mx-auto\">\n    <div class=\"grid md:grid-cols-3 gap-6 mb-10\">\n      <div class=\"md:col-span-2\">\n        <p class=\"eyebrow mb-2\" style=\"color:var(--accent);font-size:0.65rem;\">BREW GUIDANCE<\/p>\n        <h2 style=\"font-family:var(--font-display);font-size:clamp(1.75rem,3.5vw,2.5rem);color:var(--text);font-weight:800;\">How to <em>brew this<\/em> right<\/h2>\n      <\/div>\n      <div class=\"flex items-end\">\n        <p style=\"color:var(--ink-dim);font-size:0.88rem;\">Each method unlocks a different facet of the Frost-Bitten's character. Choose your ritual.<\/p>\n      <\/div>\n    <\/div>\n\n    <div class=\"flex flex-col gap-4\">\n\n      <!-- Traditional Filter -->\n      <details class=\"card rounded-2xl overflow-hidden group\" style=\"background:var(--card);\" open>\n        <summary class=\"flex items-center justify-between px-7 py-5 cursor-pointer list-none\" style=\"outline:none;\">\n          <div class=\"flex items-center gap-4\">\n            <span style=\"font-family:var(--font-mono);font-size:2rem;color:var(--accent);font-weight:700;line-height:1;\">01<\/span>\n            <div>\n              <p style=\"font-family:var(--font-display);font-size:1.2rem;color:var(--text);font-weight:700;\">Traditional South Indian Filter<\/p>\n              <p style=\"font-size:0.8rem;color:var(--ink-dim);\">The original slow drip — brass tumbler optional, patience mandatory.<\/p>\n            <\/div>\n          <\/div>\n          <i data-lucide=\"chevron-down\" style=\"width:20px;height:20px;color:var(--ink-muted);flex-shrink:0;transition:transform 0.3s;\"><\/i>\n        <\/summary>\n        <div class=\"px-7 pb-7\">\n          <div class=\"divider mb-6\"><\/div>\n          <div class=\"grid sm:grid-cols-3 gap-4 mb-6\">\n            <div class=\"rounded-xl p-4\" style=\"background:var(--bg);\">\n              <p class=\"eyebrow mb-1\" style=\"font-size:0.58rem;color:var(--ink-dim);\">RATIO<\/p>\n              <p style=\"font-family:var(--font-mono);font-size:1.1rem;color:var(--text);font-weight:700;\">1:8<\/p>\n              <p style=\"font-size:0.75rem;color:var(--ink-muted);\">Coffee to water<\/p>\n            <\/div>\n            <div class=\"rounded-xl p-4\" style=\"background:var(--bg);\">\n              <p class=\"eyebrow mb-1\" style=\"font-size:0.58rem;color:var(--ink-dim);\">WATER TEMP<\/p>\n              <p style=\"font-family:var(--font-mono);font-size:1.1rem;color:var(--text);font-weig <script>
  function _icons(){ try{ if(window.lucide) lucide.createIcons(); }catch(e){} }
  function loadPage(name){
    var html = (window.__PAGES__ && window.__PAGES__[name]) || '';
    var el = document.getElementById('page-content');
    if(!el) return;
    if(!html){ name = "home"; html = (window.__PAGES__||{})[name] || ''; }
    el.classList.add('exiting');
    setTimeout(function(){
      el.innerHTML = html;
      el.classList.remove('exiting');
      el.style.opacity='0'; el.style.transform='translateY(12px)';
      requestAnimationFrame(function(){
        el.style.transition='opacity .35s ease, transform .35s ease';
        el.style.opacity='1'; el.style.transform='translateY(0)';
      });
      _icons();
      window.scrollTo(0,0);
    }, 180);
    document.querySelectorAll('.nav-item,.bn-item').forEach(function(i){i.classList.remove('active');});
    document.querySelectorAll('[data-page="'+name+'"]').forEach(function(a){a.classList.add('active');});
    try{ history.replaceState(null,'','#'+name); }catch(e){}
  }
  window.addEventListener('message', function(e){ if(e.data && e.data.page) loadPage(e.data.page); });
  window.addEventListener('hashchange', function(){ var h=location.hash.replace('#',''); if(h && window.__PAGES__[h]) loadPage(h); });
  document.addEventListener('DOMContentLoaded', function(){
    _icons();
    var h = location.hash.replace('#','');
    loadPage(h && window.__PAGES__[h] ? h : "home");
  });
</script>
