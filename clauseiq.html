<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClauseIQ</title>
<meta name="description" content="Review contracts before they review you">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script>
tailwind.config = {
  theme: { extend: {
    colors: { brand: '#0A5FFF', accent: '#00D4A8', ink: '#080C14', card: '#0F1624' },
    fontFamily: { display: ['Sora','serif'], body: ['Inter','sans-serif'] }
  } }
};
</script>
<style>
  :root{
    --primary:#0A5FFF; --primary-rgb:10, 95, 255;
    --accent:#00D4A8; --accent-rgb:0, 212, 168;
    --bg:#080C14; --card:#0F1624; --text:#EEF2FF; --muted:#5A6A8A;
    --font-display:'Sora',serif; --font-body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;overflow-x:hidden;max-width:100%;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased;line-height:1.6;}
  h1,h2,h3,h4,.font-display{font-family:var(--font-display);letter-spacing:-0.01em;line-height:1.1;}
  a{color:inherit;text-decoration:none;}
  ::selection{background:rgba(var(--primary-rgb),0.35);}
  img{display:block;max-width:100%;}
  /* layout */
  .app{display:flex;min-height:100vh;}
  .sidebar{width:248px;flex-shrink:0;background:linear-gradient(180deg, color-mix(in srgb,var(--card) 92%, #000) 0%, var(--bg) 100%);
    border-right:1px solid rgba(var(--primary-rgb),0.10);padding:22px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:6px;}
  .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px;}
  .brand .logo{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-weight:800;color:#fff;
    background:linear-gradient(135deg,var(--primary),var(--accent));box-shadow:0 6px 20px rgba(var(--primary-rgb),0.4);font-family:var(--font-display);}
  .brand .bname{font-weight:700;font-size:15px;}
  .brand .btag{font-size:11px;color:var(--muted);}
  .nav-item{display:flex;align-items:center;gap:12px;width:100%;padding:11px 13px;border:none;background:transparent;color:var(--muted);
    border-radius:11px;cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-body);transition:all .18s ease;text-align:left;}
  .nav-item:hover{background:rgba(var(--primary-rgb),0.08);color:var(--text);}
  .nav-item.active{background:rgba(var(--primary-rgb),0.14);color:#fff;box-shadow:inset 0 0 0 1px rgba(var(--primary-rgb),0.25);}
  .nav-item i,.bn-item i{width:18px;height:18px;}
  .nav-foot{margin-top:auto;padding:12px 8px 0;border-top:1px solid rgba(var(--primary-rgb),0.08);font-size:12px;color:var(--muted);}
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 30px;position:sticky;top:0;z-index:20;
    background:color-mix(in srgb,var(--bg) 82%, transparent);backdrop-filter:blur(14px);border-bottom:1px solid rgba(var(--primary-rgb),0.08);}
  .topbar .tt{font-size:13px;color:var(--muted);}
  .topbar .actions{display:flex;align-items:center;gap:12px;}
  #page-content{padding:0 0 80px;animation:fadeUp .5s ease both;overflow-x:auto;max-width:100%;}
  #page-content img{max-width:100%;}
  #page-content > *{max-width:100%;}
  #page-content.exiting{opacity:0;transform:translateY(10px);transition:all .2s ease;}
  /* component vocabulary the LLM is told to use */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:12px;font-weight:600;font-size:14px;cursor:pointer;border:none;transition:all .2s ease;}
  .btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 8px 24px rgba(var(--primary-rgb),0.35);}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(var(--primary-rgb),0.5);}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid rgba(var(--primary-rgb),0.3);}
  .btn-ghost:hover{background:rgba(var(--primary-rgb),0.08);}
  .pill{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:600;letter-spacing:.04em;
    background:rgba(var(--primary-rgb),0.12);color:var(--accent);border:1px solid rgba(var(--primary-rgb),0.22);text-transform:uppercase;}
  .card{background:linear-gradient(160deg, color-mix(in srgb,var(--card) 96%, #fff) 0%, var(--card) 100%);
    border:1px solid rgba(var(--primary-rgb),0.10);border-radius:18px;padding:24px;transition:all .25s ease;}
  .card:hover{transform:translateY(-4px);border-color:rgba(var(--primary-rgb),0.28);box-shadow:0 18px 40px rgba(0,0,0,0.35);}
  .stat{font-family:var(--font-display);font-size:30px;font-weight:700;color:#fff;}
  .muted{color:var(--muted);}
  .accent{color:var(--accent);}
  .glass{background:rgba(255,255,255,0.04);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:18px;}
  .gradient-text{background:linear-gradient(120deg,var(--text),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(var(--primary-rgb),0.4),transparent);}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:12px 14px;border-bottom:1px solid rgba(var(--primary-rgb),0.12);}
  td{padding:14px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:14px;}
  tr:hover td{background:rgba(var(--primary-rgb),0.04);}
  .badge{display:inline-block;padding:3px 11px;border-radius:999px;font-size:12px;font-weight:600;}
  .badge-green{background:rgba(34,197,94,0.15);color:#4ade80;}
  .badge-amber{background:rgba(245,158,11,0.15);color:#fbbf24;}
  .badge-red{background:rgba(239,68,68,0.15);color:#f87171;}
  .stagger>*{opacity:0;animation:fadeUp .6s ease forwards;}
  .stagger>*:nth-child(1){animation-delay:.05s}.stagger>*:nth-child(2){animation-delay:.12s}
  .stagger>*:nth-child(3){animation-delay:.19s}.stagger>*:nth-child(4){animation-delay:.26s}
  .stagger>*:nth-child(5){animation-delay:.33s}.stagger>*:nth-child(6){animation-delay:.40s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .bottom-nav{display:none;}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(var(--primary-rgb),0.3);border-radius:9px}
  /* mobile */
  @media(max-width:860px){
    .sidebar{display:none!important;}
    .topbar{padding:14px 18px;}
    #page-content{padding-bottom:96px;}
    .bottom-nav{display:flex!important;position:fixed;bottom:0;left:0;right:0;z-index:50;justify-content:space-around;
      padding:9px 6px env(safe-area-inset-bottom);background:color-mix(in srgb,var(--card) 96%, #000);border-top:1px solid rgba(var(--primary-rgb),0.18);backdrop-filter:blur(16px);}
    .bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;flex:1;}
    .bn-item.active{color:var(--accent);}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">C</div>
      <div><div class="bname">ClauseIQ</div><div class="btag">AI Legal</div></div>
    </div>
    <button class="nav-item active" data-page="home" onclick="loadPage('home')">
      <i data-lucide="home"></i><span>Home</span>
    </button>
      <button class="nav-item" data-page="features" onclick="loadPage('features')">
      <i data-lucide="sparkles"></i><span>Features</span>
    </button>
      <button class="nav-item" data-page="pricing" onclick="loadPage('pricing')">
      <i data-lucide="tag"></i><span>Pricing</span>
    </button>
      <button class="nav-item" data-page="about" onclick="loadPage('about')">
      <i data-lucide="info"></i><span>About</span>
    </button>
      <button class="nav-item" data-page="contact" onclick="loadPage('contact')">
      <i data-lucide="mail"></i><span>Contact</span>
    </button>
    <div class="nav-foot">Powered by Fatline</div>
  </aside>
  <div class="main">
    <header class="topbar">
      <div class="tt">Review contracts before they review you</div>
      <div class="actions">
        <span class="pill"><i data-lucide="circle-dot" style="width:13px;height:13px"></i> Live</span>
        <button class="btn btn-primary" style="padding:9px 18px" onclick="window.ProdusaAuth&&window.ProdusaAuth.signIn?window.ProdusaAuth.signIn():null">Analyse a Contract</button>
      </div>
    </header>
    <main id="page-content"></main>
  </div>
</div>
<nav class="bottom-nav">
  <button class="bn-item active" data-page="home" onclick="loadPage('home')">
      <i data-lucide="home"></i><span>Home</span>
    </button>
      <button class="bn-item" data-page="features" onclick="loadPage('features')">
      <i data-lucide="sparkles"></i><span>Features</span>
    </button>
      <button class="bn-item" data-page="pricing" onclick="loadPage('pricing')">
      <i data-lucide="tag"></i><span>Pricing</span>
    </button>
      <button class="bn-item" data-page="about" onclick="loadPage('about')">
      <i data-lucide="info"></i><span>About</span>
    </button>
      <button class="bn-item" data-page="contact" onclick="loadPage('contact')">
      <i data-lucide="mail"></i><span>Contact</span>
    </button>
</nav>
<script>window.__PAGES__ = {"home":"<section class=\"relative overflow-hidden px-6 md:px-10 py-14 md:py-20\" style=\"background: linear-gradient(135deg, #0a0f1e 0%, #0d1b3e 50%, #0a1628 100%);\">\n  <div class=\"max-w-7xl mx-auto\">\n    <div class=\"grid grid-cols-1 lg:grid-cols-2 gap-12 items-center\">\n      <div class=\"relative z-10\">\n        <div class=\"inline-flex items-center gap-2 glass rounded-full px-4 py-2 mb-6 border border-blue-500/30\">\n          <span class=\"w-2 h-2 rounded-full bg-green-400 animate-pulse\"><\/span>\n          <span class=\"text-sm font-semibold text-green-400\">94% accuracy<\/span>\n          <span class=\"text-xs text-gray-400\">in risk detection<\/span>\n        <\/div>\n        <h1 class=\"text-4xl md:text-6xl font-bold leading-tight text-white mb-6\">\n          Your startup's <span class=\"gradient-text\">first line of<\/span> legal defence\n        <\/h1>\n        <p class=\"text-lg text-gray-300 mb-8 max-w-lg leading-relaxed\">\n          ClauseIQ reads the fine print so your lawyers don't have to bill you for it.\n        <\/p>\n        <div class=\"flex flex-wrap gap-4\">\n          <button class=\"btn btn-primary flex items-center gap-2 px-6 py-3 text-base font-semibold rounded-xl\">\n            <i data-lucide=\"file-search\"><\/i> Analyse a Contract\n          <\/button>\n          <button class=\"btn btn-ghost flex items-center gap-2 px-6 py-3 text-base font-semibold rounded-xl border border-white/20 text-white\">\n            <i data-lucide=\"play-circle\"><\/i> See How It Works\n          <\/button>\n        <\/div>\n        <div class=\"flex items-center gap-6 mt-8\">\n          <div class=\"flex -space-x-2\">\n            <img src=\"https://ui-avatars.com/api/?name=Aarav%20Mehta&background=0A5FFF&color=fff&size=80&bold=true&format=png\" class=\"w-8 h-8 rounded-full border-2 border-blue-900\" alt=\"founder\">\n            <img src=\"https://ui-avatars.com/api/?name=Diya%20Sharma&background=0A5FFF&color=fff&size=80&bold=true&format=png\" class=\"w-8 h-8 rounded-full border-2 border-blue-900\" alt=\"founder\">\n            <img src=\"https://ui-avatars.com/api/?name=Kabir%20Rao&background=0A5FFF&color=fff&size=80&bold=true&format=png\" class=\"w-8 h-8 rounded-full border-2 border-blue-900\" alt=\"founder\">\n          <\/div>\n          <span class=\"text-sm text-gray-400\">Trusted by <strong class=\"text-white\">1,200+ founders<\/strong> across India<\/span>\n        <\/div>\n      <\/div>\n      <div class=\"relative\">\n        <div class=\"relative rounded-2xl overflow-hidden shadow-2xl border border-white/10\" style=\"min-height:420px;\">\n          <img src=\"https://images.unsplash.com/photo-1497366754035-f200968a6e72?w=1400&h=900&q=80&auto=format&fit=crop\" class=\"w-full h-full object-cover absolute inset-0 opacity-30 rounded-2xl\" alt=\"office\">\n          <div class=\"relative z-10 p-6\" style=\"background: rgba(10,15,30,0.85); border-radius: 1rem;\">\n            <div class=\"flex items-center gap-3 mb-4\">\n              <div class=\"w-3 h-3 rounded-full bg-red-500\"><\/div>\n              <div class=\"w-3 h-3 rounded-full bg-amber-400\"><\/div>\n              <div class=\"w-3 h-3 rounded-full bg-green-500\"><\/div>\n              <span class=\"text-xs text-gray-400 ml-2 font-mono\">vendor_msa_v3.pdf — Scanning…<\/span>\n            <\/div>\n            <div class=\"space-y-3 font-mono text-sm\">\n              <div class=\"flex items-start gap-3 p-3 rounded-lg\" style=\"background: rgba(239,68,68,0.15); border-left: 3px solid #ef4444;\">\n                <i data-lucide=\"alert-triangle\" class=\"text-red-400 mt-0.5 shrink-0\" style=\"width:14px;height:14px;\"><\/i>\n                <div>\n                  <span class=\"text-red-400 font-semibold text-xs\">HIGH RISK<\/span>\n                  <p class=\"text-gray-300 text-xs mt-0.5\">\"…assigns all intellectual property created during the engagement to the Vendor in perpetuity…\"<\/p>\n                <\/div>\n              <\/div>\n              <div class=\"flex items-start gap-3 p-3 rounded-lg\" style=\"background: rgba(245,158,11,0.15); border-left: 3px solid #f59e0b;\">\n                <i data-lucide=\"alert-circle\" class=\"text-amber-400 mt-0.5 shrink-0\" style=\"width:14px;height:14px;\"><\/i>\n                <div>\n                  <span class=\"text-amber-400 font-semibold text-xs\">CAUTION<\/span>\n                  <p class=\"text-gray-300 text-xs mt-0.5\">\"…auto-renewal at 20% increased rate unless written notice 90 days prior…\"<\/p>\n                <\/div>\n              <\/div>\n              <div class=\"flex items-start gap-3 p-3 rounded-lg\" style=\"background: rgba(34,197,94,0.12); border-left: 3px solid #22c55e;\">\n                <i data-lucide=\"check-circle\" class=\"text-green-400 mt-0.5 shrink-0\" style=\"width:14px;height:14px;\"><\/i>\n                <div>\n                  <span class=\"text-green-400 font-semibold text-xs\">CLEAR<\/span>\n                  <p class=\"text-gray-300 text-xs mt-0.5\">\"…liability capped at 3× monthly fees, mutual indemnification applies…\"<\/p>\n                <\/div>\n              <\/div>\n              <div class=\"flex items-start gap-3 p-3 rounded-lg\" style=\"background: rgba(239,68,68,0.12); border-left: 3px solid #ef4444;\">\n                <i data-lucide=\"x-circle\" class=\"text-red-400 mt-0.5 shrink-0\" style=\"width:14px;height:14px;\"><\/i>\n                <div>\n                  <span class=\"text-red-400 font-semibold text-xs\">HIGH RISK<\/span>\n                  <p class=\"text-gray-300 text-xs mt-0.5\">\"…unilateral termination with 7 days notice, no cure period provided…\"<\/p>\n                <\/div>\n              <\/div>\n            <\/div>\n            <div class=\"mt-4 pt-4 border-t border-white/10 flex items-center justify-between\">\n              <div class=\"flex items-center gap-2\">\n                <div class=\"w-2 h-2 rounded-full bg-blue-400 animate-pulse\"><\/div>\n                <span class=\"text-xs text-gray-400\">AI scanning clause 47 of 63…<\/span>\n              <\/div>\n              <span class=\"text-xs font-semibold text-blue-400\">74% complete<\/span>\n            <\/div>\n            <div class=\"mt-2 h-1.5 rounded-full bg-white/10\">\n              <div class=\"h-1.5 rounded-full bg-gradient-to-r from-blue-500 to-blue-400\" style=\"width:74%;\"><\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n        <div class=\"absolute -top-3 -right-3 glass rounded-xl px-3 py-2 border border-white/20 flex items-center gap-2 shadow-xl\">\n          <i data-lucide=\"zap\" class=\"text-yellow-400\" style=\"width:14px;height:14px;\"><\/i>\n          <span class=\"text-xs font-bold text-white\">12 min avg review<\/span>\n        <\/div>\n        <div class=\"absolute -bottom-3 -left-3 glass rounded-xl px-3 py-2 border border-white/20 flex items-center gap-2 shadow-xl\">\n          <i data-lucide=\"shield-check\" class=\"text-green-400\" style=\"width:14px;height:14px;\"><\/i>\n          <span class=\"text-xs font-bold text-white\">2 risks found<\/span>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section class=\"px-6 md:px-10 py-10 border-y border-white/5\" style=\"background: rgba(255,255,255,0.02);\">\n  <div class=\"max-w-7xl mx-auto\">\n    <p class=\"text-center text-xs font-semibold uppercase tracking-widest mb-8\" style=\"color: var(--muted);\">Trusted by founders backed by<\/p>\n    <div class=\"overflow-hidden relative\">\n      <div class=\"flex items-center gap-10 flex-wrap justify-center md:flex-nowrap\">\n        <div class=\"flex items-center gap-2 shrink-0 opacity-60 hover:opacity-100 transition-opacity\">\n          <div class=\"w-8 h-8 rounded-lg flex items-center justify-center\" style=\"background: #FF6600;\">\n            <span class=\"text-white font-black text-xs\">YC<\/span>\n          <\/div>\n          <span class=\"text-sm font-bold\" style=\"color: var(--text s=\"text-white w-6 h-6\"><\/i>\n        <\/div>\n        <h3 class=\"text-xl font-bold mb-3\">Plain-English Summaries<\/h3>\n        <p class=\"text-sm leading-relaxed\" style=\"color:var(--muted)\">Legalese translated to plain English in seconds. ClauseIQ explains what each clause actually means for your business — without the billable-hour ambiguity of a law firm memo.<\/p>\n        <div class=\"mt-4 p-3 rounded-xl text-xs\" style=\"background:var(--card);border:1px solid rgba(124,58,237,0.2);color:var(--muted)\">\"This clause means the vendor can terminate with 7 days notice, even mid-project.\"<\/div>\n      <\/div>\n      <div class=\"card p-8 hover:shadow-xl transition-all duration-300 hover:-translate-y-1 group\">\n        <div class=\"w-12 h-12 rounded-xl flex items-center justify-center mb-5\" style=\"background:linear-gradient(135deg,#0891b2,#06b6d4);\">\n          <i data-lucide=\"message-square\" class=\"text-white w-6 h-6\"><\/i>\n        <\/div>\n        <h3 class=\"text-xl font-bold mb-3\">Negotiation Suggestions<\/h3>\n        <p class=\"text-sm leading-relaxed\" style=\"color:var(--muted)\">ClauseIQ doesn't just flag problems — it proposes founder-friendly counter-language. Walk into every negotiation with a redlined draft ready and leverage you didn't know you had.<\/p>\n        <div class=\"mt-4 flex items-center gap-2 text-xs font-medium\" style=\"color:#0891b2\"><i data-lucide=\"arrow-right\" class=\"w-4 h-4\"><\/i> Suggests 3–7 counter-clauses per contract<\/div>\n      <\/div>\n      <div class=\"card p-8 hover:shadow-xl transition-all duration-300 hover:-translate-y-1 group\">\n        <div class=\"w-12 h-12 rounded-xl flex items-center justify-center mb-5\" style=\"background:linear-gradient(135deg,#dc2626,#f97316);\">\n          <i data-lucide=\"git-compare\" class=\"text-white w-6 h-6\"><\/i>\n        <\/div>\n        <h3 class=\"text-xl font-bold mb-3\">Multi-party Redline Comparison<\/h3>\n        <p class=\"text-sm leading-relaxed\" style=\"color:var(--muted)\">Upload two or more versions of a contract and ClauseIQ maps every change, insertion and deletion with a colour-coded diff. Know exactly what changed between drafts — instantly.<\/p>\n        <div class=\"mt-4 flex items-center gap-2 text-xs font-medium\" style=\"color:#dc2626\"><i data-lucide=\"layers\" class=\"w-4 h-4\"><\/i> Supports up to 5 contract versions simultaneously<\/div>\n      <\/div>\n      <div class=\"card p-8 hover:shadow-xl transition-all duration-300 hover:-translate-y-1 group\">\n        <div class=\"w-12 h-12 rounded-xl flex items-center justify-center mb-5\" style=\"background:linear-gradient(135deg,#059669,#10b981);\">\n          <i data-lucide=\"globe\" class=\"text-white w-6 h-6\"><\/i>\n        <\/div>\n        <h3 class=\"text-xl font-bold mb-3\">Jurisdiction Flagging<\/h3>\n        <p class=\"text-sm leading-relaxed\" style=\"color:var(--muted)\">Detects and applies the right legal lens — India, US or EU — automatically. Flags clauses that conflict with local law, including DPDP Act, GDPR and state-level compliance requirements.<\/p>\n        <div class=\"mt-4 flex gap-2 flex-wrap\">\n          <span class=\"pill text-xs\">🇮🇳 India<\/span>\n          <span class=\"pill text-xs\">🇺🇸 US<\/span>\n          <span class=\"pill text-xs\">🇪🇺 EU<\/span>\n        <\/div>\n      <\/div>\n      <div class=\"card p-8 hover:shadow-xl transition-all duration-300 hover:-translate-y-1 group\">\n        <div class=\"w-12 h-12 rounded-xl flex items-center justify-center mb-5\" style=\"background:linear-gradient(135deg,#d97706,#f59e0b);\">\n          <i data-lucide=\"clock\" class=\"text-white w-6 h-6\"><\/i>\n        <\/div>\n        <h3 class=\"text-xl font-bold mb-3\">Version History Tracking<\/h3>\n        <p class=\"text-sm leading-relaxed\" style=\"color:var(--muted)\">Every upload, edit and review is timestamped and stored. Track negotiation progress across rounds, audit who reviewed what, and never lose a prior draft again with full version lineage.<\/p>\n        <div class=\"mt-4 flex items-center gap-2 text-xs font-medium\" style=\"color:#d97706\"><i data-lucide=\"archive\" class=\"w-4 h-4\"><\/i> Unlimited version history on all plans<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section class=\"px-6 md:px-10 py-14 md:py-20\" style=\"background:linear-gradient(135deg,rgba(10,95,255,0.04) 0%,rgba(124,58,237,0.04) 100%)\">\n  <div class=\"max-w-7xl mx-auto\">\n    <div class=\"text-center mb-10\">\n      <div class=\"pill inline-flex items-center gap-2 mb-4 text-xs font-semibold uppercase tracking-widest\"><i data-lucide=\"monitor\"><\/i> Live Demo Panel<\/div>\n      <h2 class=\"text-3xl md:text-5xl font-bold mb-4\">See ClauseIQ <span class=\"gradient-text\">in action<\/span><\/h2>\n      <p class=\"text-base max-w-xl mx-auto\" style=\"color:var(--muted)\">Select a contract type below and watch the AI surface risk in real time.<\/p>\n    <\/div>\n    <div class=\"card overflow-hidden\">\n      <div class=\"flex border-b\" style=\"border-color:rgba(255,255,255,0.08)\">\n        <button onclick=\"document.querySelectorAll('.demo-tab').forEach(t=>t.classList.remove('active-tab')); document.querySelectorAll('.demo-panel').forEach(p=>p.classList.add('hidden')); this.classList.add('active-tab'); document.getElementById('tab-nda').classList.remove('hidden')\" class=\"demo-tab active-tab px-6 py-4 text-sm font-semibold border-b-2 transition-all\" style=\"border-color:var(--primary);color:var(--primary)\">NDA<\/button>\n        <button onclick=\"document.querySelectorAll('.demo-tab').forEach(t=>t.classList.remove('active-tab')); document.querySelectorAll('.demo-panel').forEach(p=>p.classList.add('hidden')); this.classList.add('active-tab'); document.getElementById('tab-sha').classList.remove('hidden')\" class=\"demo-tab px-6 py-4 text-sm font-semibold border-b-2 border-transparent transition-all\" style=\"color:var(--muted)\">SHA<\/button>\n        <button onclick=\"document.querySelectorAll('.demo-tab').forEach(t=>t.classList.remove('active-tab')); document.querySelectorAll('.demo-panel').forEach(p=>p.classList.add('hidden')); this.classList.add('active-tab'); document.getElementById('tab-msa').classList.remove('hidden')\" class=\"demo-tab px-6 py-4 text-sm font-semibold border-b-2 border-transparent transition-all\" style=\"color:var(--muted)\">MSA<\/button>\n        <div class=\"ml-auto flex items-center px-6\">\n          <div class=\"flex items-center gap-4 text-xs\" style=\"color:var(--muted)\">\n            <span class=\"flex items-center gap-1\"><span class=\"w-3 h-3 rounded-full inline-block bg-red-500\"><\/span> High Risk<\/span>\n            <span class=\"flex items-center gap-1\"><span class=\"w-3 h-3 rounded-full inline-block bg-amber-400\"><\/span> Medium<\/span>\n            <span class=\"flex items-center gap-1\"><span class=\"w-3 h-3 rounded-full inline-block bg-green-500\"><\/span> Safe<\/span>\n          <\/div>\n        <\/div>\n      <\/div>\n      <div class=\"grid md:grid-cols-2 gap-0\">\n        <div class=\"p-8 border-r\" style=\"border-color:rgba(255,255,255,0.08)\">\n          <div id=\"tab-nda\" class=\"demo-panel\">\n            <div class=\"text-xs font-bold uppercase tracking-widest mb-4\" style=\"color:var(--muted)\">Employee NDA — Draft v2.1<\/div>\n            <div class=\"space-y-3 text-sm leading-relaxed\">\n              <div class=\"p-3 rounded-xl border-l-4 border-red-500 bg-red-500/8\">\n                <span class=\"text-xs font-bold text-red-400 uppercase block mb-1\">§4.2 — IP Assignment · Risk: 9/10<\/span>\n                <p style=\"color:var(--text)\">\"All inventions, discoveries and works created by the Employee, whether or not during working hours or using Company resources, shall be the exclusive property of the Company...\"<\/p>\n              <\/div>\n              <div class=\"p-3 rounded-xl border-l-4 border-amber-400 bg-amber-400/8\">\n                <span class=\"text-xs font-bold text-amber-400 uppercase block mb-1\">§6.1 — Non-Compete · Risk: 7/10<\/span>\n                <p style=\"color:var(--text)\">\"Employee shall not engage in any competing activity for a period of 24 months within the territory of India after termination...\"<\/p>\n              <\/div>\n              <div class=\"p-3 rounded-xl border-l-4 border-red-500 bg-red-500/8\">\n                <span class=\"text-xs font-bold text-red-400 uppercase block mb-1\">§8.4 — Moonlighting Restriction · Risk: 8/10<\/span>\n                <p style=\"color:var(--text)\">\"Employee shall not undertake any freelance, consulting or advisory work without prior written consent of the Company at any time during employment...\"<\/p>\n              <\/div>\n              <div class=\"p-3 rounded-xl border-l-4 border-green-500 bg-green-500/8\">\n                <span class=\"text-xs font-bold text-green-400 uppercase block mb-1\">§2.1 — Confidentiality Period · Risk: 2/10<\/span>\n                <p style=\"color:var(--text)\">\"Confidential information obligations shall survive termination for a period of 3 years, limited to information marked as confidential...\"<\/p>\n              <\/div>\n            <\/div>\n          <\/div>\n          <div id=\"tab-sha\" class=\"demo-panel hidden\">\n            <div class=\"text-xs font-bold uppercase tracking-widest mb-4\" style=\"color:var(--muted)\">Series A SHA — Draft v1.4<\/div>\n            <div class=\"space-y-3 text-sm leading-relaxed\">\n              <div class=\"p-3 rounded-xl border-l-4 border-red-500 bg-red-500/8\">\n                <span class=\"text-xs font-bold text-red-400 uppercase block mb-1\">§11.3 — Drag-Along Rights · Risk: 9/10<\/span>\n                <p style=\"color:var(--text)\">\"Investors holding 30% or more may compel all founders to sell their shares at the offered price with 15 days notice, without any floor price protection...\"<\/p>\n              <\/div>\n              <div class=\"p-3 rounded-xl border-l-4 border-red-500 bg-red-500/8\">\n                <span class=\"text-xs font-bold text-red-400 uppercase block mb-1\">§7.2 — Liquidation Preference · Risk: 8/10<\/span>\n                <p style=\"color:var(--text)\">\"Investors shall receive 2x participating liquidation preference before any proceeds are distributed to common shareholders...\"<\/p>\n              <\/div>\n              <div class=\"p-3 rounded-xl border-l-4 border-amber-400 bg-amber-400/8\">\n                <span class=\"text-xs font-bold text-amber-400 uppercase block mb-1\">§9.1 — Board Composition · Risk: 6/10<\/span>\n                <p style=\"color:var(--text)\">\"Investor shall have the right to appoint 2 directors, with veto rights over any expenditure exceeding ₹25 lakhs...\"<\/p>\n              <\/div>\n              <div class=\"p-3 rounded-xl border-l-4 border-green-500 bg-green-500/8\">\n                <span class=\"text-xs font-bold text-green-400 uppercase block mb-1\">§5.1 — ROFR · Risk: 3/10<\/span>\n                <p style=\"color:var(--text)\">\"Founders retain right of first refusal on any secondary share transfer with a 30-day exercise window at the offered price...\"<\/p>\n              <\/div>\n            <\/div>\n          <\/div>\n          <div id=\"tab-msa\" class=\"demo-panel hidden\">\n            <div class=\"text-xs font-bold uppercase tracking-widest mb-4\" style=\"color:var(--muted)\">Vendor MSA — Draft v3.0<\/div>\n            <div class=\"space-y-3 text-sm leading-relaxed\">\n              <div class=\"p-3 rounded-xl border-l-4 border-red-500 bg-red-500/8\">\n                <span class=\"text-xs font-bold text-red-400 uppercase block mb-1\">§13.4 — Termination for Convenience · Risk: 9/10<\/span>\n                <p style=\"color:var(--text)\">\"Vendor may terminate this agreement at any time with 7 days written notice. No compensation shall be owed for work in progress or pre-committed resources...\"<\/p>\n              <\/div>\n              <div class=\"p-3 rounded-xl border-l-4 border-amber-400 bg-amber-400/8\">\n                <span class=\"text-xs font-bold text-amber-400 uppercase block mb-1\">§9.2 — Liability Cap · Risk: 7/10<\/span>\n                <p style=\"color:var(--text)\">\"Vendor's aggregate liability shall not exceed one month's fees, regardless of the nature or extent of damages arising from service failure...\"<\/p>\n              <\/div>\n              <div class=\"p-3 rounded-xl border-l-4 border-amber-400 bg-amber-400/8\">\n                <span class=\"text-xs font-bold text-amber-400 uppercase block mb-1\">§6.1 — Auto-renewal Trap · Risk: 6/10<\/span>\n                <p style=\"color:var(--text)\">\"This agreement auto-renews annually unless cancelled in writing 90 days before expiry. Rate increases of up to 20% apply on renewal...\"<\/p>\n              <\/div>\n              <div class=\"p-3 rounded-xl border-l-4 border-green-500 bg-green-500/8\">\n                <span class=\"text-xs font-bold text-green-400 uppercase block mb-1\">§4.3 — SLA Uptime · Risk: 3/10<\/span>\n                <p style=\"color:var(--text)\">\"Vendor guarantees 99.5% uptime with service credits of 5% per hour of downtime beyond the SLA threshold, capped at 15% monthly...\"<\/p>\n              <\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n        <div class=\"p-8\">\n          <div class=\"text-xs font-bold uppercase tracking-widest mb-4\" style=\"color:var(--muted)\">AI Analysis Summary<\/div>\n          <div class=\"glass rounded-2xl p-6 mb-6\">\n            <div class=\"flex items-center justify-between mb-4\">\n              <span class=\"text-sm font-semibold\">Overall Risk Score<\/span>\n              <span class=\"text-3xl font-bold text-red-400\">7.6<span class=\"text-base text-red-300\">/10<\/span><\/span>\n            <\/div>\n            <div class=\"w-full rounded-full h-2 mb-4\" style=\"background:rgba(255,255,255,0.1)\">\n              <div class=\"h-2 rounded-full bg-gradient-to-r from-red-500 to-amber-400\" style=\"width:76%\"><\/div>\n            <\/div>\n            <p class=\"text-xs\" style=\"color:var(--muted)\">This contract carries significant risk. 3 high-severity clauses require immediate renegotiation before signing.<\/p>\n          <\/div>\n          <div class=\"space-y-3 mb-6\">\n            <div class=\"flex justify-between items-center text-sm\">\n              <span style=\"color:var(--muted)\">Clauses reviewed<\/span>\n              <span class=\"font-bold\">24<\/span>\n            <\/div>\n            <div class=\"flex justify-between items-center text-sm\">\n              <span style=\"color:var(--muted)\">High risk clauses<\/span>\n              <span class=\"font-bold text-red-400\">3<\/span>\n            <\/div>\n            <div class=\"flex justify-between items-center text-sm\">\n              <span style=\"color:var(--muted)\">Medium risk clauses<\/span>\n              <span class=\"font-bold text-amber-400\">2<\/span>\n            <\/div>\n            <div class=\"flex justify-between items-center text-sm\">\n              <span style=\"color:var(--muted)\">Safe clauses<\/span>\n              <span class=\"font-bold text-green-400\">19<\/span>\n            <\/div>\n            <div class=\"flex justify-between items-center text-sm\">\n              <span style=\"color:var(--muted)\">Negotiation suggestions<\/span>\n              <span class=\"font-bold\" style=\"color:var(--primary)\">5 ready<\/span>\n            <\/div>\n          <\/div>\n          <div class=\"p-4 rounded-xl text-sm\" style=\"background:rgba(10,95,255,0.08);border:1px solid rgba(10,95,255,0.2)\">\n            <div class=\"flex items-start gap-3\">\n              <i data-lucide=\"lightbulb\" class=\"w-4 h-4 mt-0.5 flex-shrink-0\" style=\"color:var(--primary)\"><\/i>\n              <p style=\"color:var(--muted)\"><strong style=\"color:var(--text)\">Top recommendation:<\/strong> Strike §4.2 entirely or limit IP assignment to work created using company res <script>
  function _icons(){ try{ if(window.lucide) lucide.createIcons(); }catch(e){} }
  function loadPage(name){
    var html = (window.__PAGES__ && window.__PAGES__[name]) || '';
    var el = document.getElementById('page-content');
    if(!el) return;
    if(!html){ name = "home"; html = (window.__PAGES__||{})[name] || ''; }
    el.classList.add('exiting');
    setTimeout(function(){
      el.innerHTML = html;
      el.classList.remove('exiting');
      el.style.opacity='0'; el.style.transform='translateY(12px)';
      requestAnimationFrame(function(){
        el.style.transition='opacity .35s ease, transform .35s ease';
        el.style.opacity='1'; el.style.transform='translateY(0)';
      });
      _icons();
      window.scrollTo(0,0);
    }, 180);
    document.querySelectorAll('.nav-item,.bn-item').forEach(function(i){i.classList.remove('active');});
    document.querySelectorAll('[data-page="'+name+'"]').forEach(function(a){a.classList.add('active');});
    try{ history.replaceState(null,'','#'+name); }catch(e){}
  }
  window.addEventListener('message', function(e){ if(e.data && e.data.page) loadPage(e.data.page); });
  window.addEventListener('hashchange', function(){ var h=location.hash.replace('#',''); if(h && window.__PAGES__[h]) loadPage(h); });
  document.addEventListener('DOMContentLoaded', function(){
    _icons();
    var h = location.hash.replace('#','');
    loadPage(h && window.__PAGES__[h] ? h : "home");
  });
</script>
