<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DispatchPro</title>
<meta name="description" content="Every job. Every tech. On time.">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space%20Grotesk:wght@400;500;600;700&family=IBM%20Plex%20Sans:wght@400;500;600&family=IBM%20Plex%20Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script>
tailwind.config = {
  theme: { extend: {
    colors: { brand: '#F97316', accent: '#FB923C', ink: '#0C0E12', card: '#1A1E2A',
      'bg-elev': '#131620', line: '#252A38', 'ink-muted': '#8A91A8', 'ink-dim': '#4E5568',
      ok: '#22C55E', warn: '#FACC15', risk: '#EF4444' },
    fontFamily: { display: ['Space Grotesk','serif'], body: ['IBM Plex Sans','sans-serif'], mono: ['IBM Plex Mono','monospace'] }
  } }
};
</script>
<style>
  :root{
    --primary:#F97316; --primary-rgb:249, 115, 22;
    --accent:#FB923C; --accent-rgb:251, 146, 60;
    --bg:#0C0E12; --bg-elev:#131620; --card:#1A1E2A; --line:#252A38;
    --text:#F0F2F7; --contrast:#FFFFFF;
    --muted:#8A91A8; --ink-muted:#8A91A8; --ink-dim:#4E5568;
    --ok:#22C55E; --warn:#FACC15; --risk:#EF4444;
    --font-display:'Space Grotesk',serif; --font-body:'IBM Plex Sans',sans-serif; --font-mono:'IBM Plex Mono',ui-monospace,monospace;
    --display-size:clamp(32px,5vw,60px);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;overflow-x:hidden;max-width:100%;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased;line-height:1.6;}
  .app{position:relative;z-index:1;}body::after{content:"";position:fixed;top:-15%;left:50%;transform:translateX(-50%);width:90vw;height:70vh;pointer-events:none;z-index:0;background:radial-gradient(ellipse at center,rgba(var(--primary-rgb),0.13),rgba(var(--accent-rgb),0.05) 35%,transparent 65%);}
  h1,h2,h3,h4,.font-display{font-family:var(--font-display);letter-spacing:-0.022em;line-height:1.06;}
  h1 em,h2 em,h3 em,.font-display em{font-style:italic;color:var(--accent);font-weight:inherit;}
  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);display:inline-flex;align-items:center;gap:10px;}
  .eyebrow::before{content:"";width:22px;height:1px;background:currentColor;opacity:.7;}
  a{color:inherit;text-decoration:none;}
  ::selection{background:rgba(var(--primary-rgb),0.35);}
  img{display:block;max-width:100%;}
  /* layout */
  .app{display:flex;min-height:100vh;}
  .sidebar{width:248px;flex-shrink:0;background:linear-gradient(180deg, color-mix(in srgb,var(--card) 92%, #000) 0%, var(--bg) 100%);
    border-right:1px solid rgba(var(--primary-rgb),0.10);padding:22px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:6px;}
  .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px;}
  .brand .logo{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-weight:800;color:#fff;
    background:linear-gradient(135deg,var(--primary),var(--accent));box-shadow:0 6px 20px rgba(var(--primary-rgb),0.4);font-family:var(--font-display);}
  .brand .bname{font-weight:700;font-size:15px;}
  .brand .btag{font-size:11px;color:var(--muted);}
  .nav-item{display:flex;align-items:center;gap:12px;width:100%;padding:11px 13px;border:none;background:transparent;color:var(--muted);
    border-radius:11px;cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-body);transition:all .18s ease;text-align:left;}
  .nav-item:hover{background:rgba(var(--primary-rgb),0.08);color:var(--text);}
  .nav-item.active{background:rgba(var(--primary-rgb),0.14);color:#fff;box-shadow:inset 0 0 0 1px rgba(var(--primary-rgb),0.25);}
  .nav-item i,.bn-item i{width:18px;height:18px;}
  .nav-foot{margin-top:auto;padding:12px 8px 0;border-top:1px solid rgba(var(--primary-rgb),0.08);font-size:12px;color:var(--muted);}
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 30px;position:sticky;top:0;z-index:20;
    background:color-mix(in srgb,var(--bg) 82%, transparent);backdrop-filter:blur(14px);border-bottom:1px solid rgba(var(--primary-rgb),0.08);}
  .topbar .tt{font-size:13px;color:var(--muted);}
  .topbar .actions{display:flex;align-items:center;gap:12px;}
  #page-content{padding:0 0 80px;animation:fadeUp .5s ease both;overflow-x:auto;max-width:100%;}
  #page-content img{max-width:100%;}
  #page-content > *{max-width:100%;}
  #page-content.exiting{opacity:0;transform:translateY(10px);transition:all .2s ease;}
  /* component vocabulary the LLM is told to use */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:12px;font-weight:600;font-size:14px;cursor:pointer;border:none;transition:all .2s ease;}
  .btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 8px 24px rgba(var(--primary-rgb),0.35);}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(var(--primary-rgb),0.5);}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid rgba(var(--primary-rgb),0.3);}
  .btn-ghost:hover{background:rgba(var(--primary-rgb),0.08);}
  .pill{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:600;letter-spacing:.04em;
    background:rgba(var(--primary-rgb),0.12);color:var(--accent);border:1px solid rgba(var(--primary-rgb),0.22);text-transform:uppercase;}
  .card{background:linear-gradient(160deg, color-mix(in srgb,var(--card) 96%, #fff) 0%, var(--card) 100%);
    border:1px solid rgba(var(--primary-rgb),0.10);border-radius:18px;padding:24px;transition:all .25s ease;}
  .card:hover{transform:translateY(-4px);border-color:rgba(var(--primary-rgb),0.28);box-shadow:0 18px 40px rgba(0,0,0,0.35);}
  .stat{font-family:var(--font-display);font-size:30px;font-weight:700;color:#fff;}
  .muted{color:var(--muted);}
  .accent{color:var(--accent);}
  .glass{background:rgba(255,255,255,0.04);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:18px;}
  .gradient-text{background:linear-gradient(120deg,var(--text),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(var(--primary-rgb),0.4),transparent);}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:12px 14px;border-bottom:1px solid rgba(var(--primary-rgb),0.12);}
  td{padding:14px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:14px;}
  tr:hover td{background:rgba(var(--primary-rgb),0.04);}
  .badge{display:inline-block;padding:3px 11px;border-radius:999px;font-size:12px;font-weight:600;}
  .badge-green{background:rgba(34,197,94,0.15);color:#4ade80;}
  .badge-amber{background:rgba(245,158,11,0.15);color:#fbbf24;}
  .badge-red{background:rgba(239,68,68,0.15);color:#f87171;}
  .stagger>*{opacity:0;animation:fadeUp .6s ease forwards;}
  .stagger>*:nth-child(1){animation-delay:.05s}.stagger>*:nth-child(2){animation-delay:.12s}
  .stagger>*:nth-child(3){animation-delay:.19s}.stagger>*:nth-child(4){animation-delay:.26s}
  .stagger>*:nth-child(5){animation-delay:.33s}.stagger>*:nth-child(6){animation-delay:.40s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .bottom-nav{display:none;}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(var(--primary-rgb),0.3);border-radius:9px}
  /* mobile */
  @media(max-width:860px){
    .sidebar{display:none!important;}
    .topbar{padding:14px 18px;}
    #page-content{padding-bottom:96px;}
    .bottom-nav{display:flex!important;position:fixed;bottom:0;left:0;right:0;z-index:50;justify-content:space-around;
      padding:9px 6px env(safe-area-inset-bottom);background:color-mix(in srgb,var(--card) 96%, #000);border-top:1px solid rgba(var(--primary-rgb),0.18);backdrop-filter:blur(16px);}
    .bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;flex:1;}
    .bn-item.active{color:var(--accent);}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">D</div>
      <div><div class="bname">DispatchPro</div><div class="btag">Field Service SaaS</div></div>
    </div>
    <button class="nav-item active" data-page="home" onclick="loadPage('home')">
      <i data-lucide="home"></i><span>Home</span>
    </button>
      <button class="nav-item" data-page="dashboard" onclick="loadPage('dashboard')">
      <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
    </button>
      <button class="nav-item" data-page="features" onclick="loadPage('features')">
      <i data-lucide="sparkles"></i><span>Features</span>

      <button class="nav-item" data-page="pricing" onclick="loadPage('pricing')">

      <button class="nav-item" data-page="account" onclick="loadPage('account')">

      <div class="tt">Every job. Every tech. On time.</div>

        <span class="pill"><i data-lucide="circle-dot" style="width:13px;height:13px"></i> Live</span>
        <button class="btn btn-primary" style="padding:9px 18px" onclick="window.ProdusaAuth&&window.ProdusaAuth.signIn?window.ProdusaAuth.signIn():null">Start Free Trial</button>

    <main id="page-content"></main>

</div>
<nav class="bottom-nav">
  <button class="bn-item active" data-page="home" onclick="loadPage('home')">
      <i data-lucide="home"></i><span>Home</span>
    </button>
      <button class="bn-item" data-page="dashboard" onclick="loadPage('dashboard')">
      <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
    </button>
      <button class="bn-item" data-page="features" onclick="loadPage('features')">
      <i data-lucide="sparkles"></i><span>Features</span>
    </button>
      <button class="bn-item" data-page="pricing" onclick="loadPage('pricing')">
      <i data-lucide="tag"></i><span>Pricing</span>
    </button>
      <button class="bn-item" data-page="account" onclick="loadPage('account')">
      <i data-lucide="user"></i><span>Account</span>
    </button>
</nav>
<script>window.__PAGES__ = {"home":"<section class=\"px-6 md:px-10 py-14 md:py-20 overflow-hidden\" style=\"background:var(--bg)\">\n  <div class=\"max-w-7xl mx-auto\">\n    <div class=\"grid grid-cols-1 lg:grid-cols-2 gap-12 items-center\">\n      <!-- Left column -->\n      <div class=\"flex flex-col gap-6\">\n        <div class=\"flex items-center gap-2\">\n          <span class=\"pill eyebrow\" style=\"background:rgba(249,115,22,0.12);color:#F97316;border:1px solid rgba(249,115,22,0.3);font-size:0.7rem;letter-spacing:0.12em;\">\n            <i data-lucide=\"zap\" style=\"width:12px;height:12px;display:inline;margin-right:4px;\"><\/i>LIVE DISPATCH PLATFORM\n          <\/span>\n        <\/div>\n        <h1 class=\"font-display\" style=\"font-size:clamp(2.2rem,5vw,3.75rem);line-height:1.1;font-weight:800;color:var(--text);\">\n          Dispatch Every <em>HVAC Job<\/em><br>Without the Chaos\n        <\/h1>\n        <p style=\"font-size:1.125rem;line-height:1.7;color:var(--ink-muted);max-width:480px;\">\n          Assign technicians, track jobs live, and close more calls — all from one dashboard. Built for Indian HVAC operations teams who can't afford delays.\n        <\/p>\n        <div class=\"flex flex-wrap gap-3 mt-2\">\n          <button class=\"btn btn-primary\" style=\"padding:0.75rem 1.75rem;font-size:1rem;font-weight:700;background:#F97316;border-color:#F97316;\">\n            <i data-lucide=\"arrow-right\" style=\"width:16px;height:16px;margin-right:6px;display:inline-block;vertical-align:middle;\"><\/i>Start Free Trial\n          <\/button>\n          <button class=\"btn btn-ghost\" style=\"padding:0.75rem 1.75rem;font-size:1rem;font-weight:600;border:1px solid var(--line);\">\n            <i data-lucide=\"play-circle\" style=\"width:16px;height:16px;margin-right:6px;display:inline-block;vertical-align:middle;\"><\/i>Watch Demo\n          <\/button>\n        <\/div>\n        <div class=\"flex items-center gap-4 mt-2\" style=\"color:var(--ink-dim);font-size:0.8rem;font-family:var(--font-mono);\">\n          <span class=\"flex items-center gap-1\"><i data-lucide=\"check\" style=\"width:13px;height:13px;color:#F97316;\"><\/i> No credit card<\/span>\n          <span class=\"flex items-center gap-1\"><i data-lucide=\"check\" style=\"width:13px;height:13px;color:#F97316;\"><\/i> 14-day free trial<\/span>\n          <span class=\"flex items-center gap-1\"><i data-lucide=\"check\" style=\"width:13px;height:13px;color:#F97316;\"><\/i> GST-compliant invoices<\/span>\n        <\/div>\n      <\/div>\n\n      <!-- Right column — app screenshot with glow -->\n      <div class=\"relative flex items-center justify-center\">\n        <div class=\"absolute inset-0 flex items-center justify-center pointer-events-none\" style=\"z-index:0;\">\n          <div style=\"width:520px;height:520px;background:radial-gradient(circle,rgba(249,115,22,0.22) 0%,transparent 70%);border-radius:50%;\"><\/div>\n        <\/div>\n        <div class=\"relative rounded-2xl overflow-hidden shadow-2xl w-full\" style=\"z-index:1;border:1px solid rgba(249,115,22,0.2);max-width:600px;\">\n          <div style=\"background:#111418;padding:10px 14px;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(255,255,255,0.07);\">\n            <span style=\"width:10px;height:10px;border-radius:50%;background:#ef4444;display:inline-block;\"><\/span>\n            <span style=\"width:10px;height:10px;border-radius:50%;background:#f59e0b;display:inline-block;\"><\/span>\n            <span style=\"width:10px;height:10px;border-radius:50%;background:#22c55e;display:inline-block;\"><\/span>\n            <span style=\"font-family:var(--font-mono);font-size:0.7rem;color:var(--ink-dim);margin-left:8px;\">DispatchPro — Live Board<\/span>\n          <\/div>\n          <img src=\"https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=1600&h=700&q=80&auto=format&fit=crop\" alt=\"DispatchPro Live Dispatch Dashboard\" class=\"w-full object-cover\" style=\"height:320px;display:block;opacity:0.85;\" />\n          <div style=\"background:#111418;padding:12px 14px;display:flex;gap:10px;border-top:1px solid rgba(255,255,255,0.07);\">\n            <span style=\"background:rgba(249,115,22,0.15);color:#F97316;border:1px solid rgba(249,115,22,0.3);border-radius:999px;padding:3px 10px;font-size:0.68rem;font-family:var(--font-mono);\">● 3 On-Site<\/span>\n            <span style=\"background:rgba(34,197,94,0.1);color:#22c55e;border:1px solid rgba(34,197,94,0.25);border-radius:999px;padding:3px 10px;font-size:0.68rem;font-family:var(--font-mono);\">● 7 En Route<\/span>\n            <span style=\"background:rgba(255,255,255,0.05);color:var(--ink-muted);border:1px solid rgba(255,255,255,0.1);border-radius:999px;padding:3px 10px;font-size:0.68rem;font-family:var(--font-mono);\">2 Unassigned<\/span>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ── STATS BAND ── -->\n<section style=\"background:var(--bg-elev);border-top:1px solid var(--line);border-bottom:1px solid var(--line);\">\n  <div class=\"max-w-7xl mx-auto px-6 md:px-10 py-10 md:py-12\">\n    <div class=\"grid grid-cols-2 md:grid-cols-4 gap-8\">\n      <div class=\"flex flex-col items-center md:items-start gap-1 text-center md:text-left\">\n        <span style=\"font-family:var(--font-mono);font-size:clamp(1.8rem,4vw,2.6rem);font-weight:700;color:#F97316;letter-spacing:-0.02em;\">₹18.4Cr<\/span>\n        <span style=\"font-family:var(--font-mono);font-size:0.72rem;color:var(--ink-muted);letter-spacing:0.08em;text-transform:uppercase;\">Service revenue managed<\/span>\n      <\/div>\n      <div class=\"flex flex-col items-center md:items-start gap-1 text-center md:text-left\" style=\"border-left:1px solid var(--line);padding-left:2rem;\">\n        <span style=\"font-family:var(--font-mono);font-size:clamp(1.8rem,4vw,2.6rem);font-weight:700;color:#F97316;letter-spacing:-0.02em;\">3,200+<\/span>\n        <span style=\"font-family:var(--f <script>
  function _icons(){ try{ if(window.lucide) lucide.createIcons(); }catch(e){} }
  function loadPage(name){
    var html = (window.__PAGES__ && window.__PAGES__[name]) || '';
    var el = document.getElementById('page-content');
    if(!el) return;
    if(!html){ name = "home"; html = (window.__PAGES__||{})[name] || ''; }
    el.classList.add('exiting');
    setTimeout(function(){
      el.innerHTML = html;
      el.classList.remove('exiting');
      el.style.opacity='0'; el.style.transform='translateY(12px)';
      requestAnimationFrame(function(){
        el.style.transition='opacity .35s ease, transform .35s ease';
        el.style.opacity='1'; el.style.transform='translateY(0)';
      });
      _icons();
      window.scrollTo(0,0);
    }, 180);
    document.querySelectorAll('.nav-item,.bn-item').forEach(function(i){i.classList.remove('active');});
    document.querySelectorAll('[data-page="'+name+'"]').forEach(function(a){a.classList.add('active');});
    try{ history.replaceState(null,'','#'+name); }catch(e){}
  }
  window.addEventListener('message', function(e){ if(e.data && e.data.page) loadPage(e.data.page); });
  window.addEventListener('hashchange', function(){ var h=location.hash.replace('#',''); if(h && window.__PAGES__[h]) loadPage(h); });
  document.addEventListener('DOMContentLoaded', function(){
    _icons();
    var h = location.hash.replace('#','');
    loadPage(h && window.__PAGES__[h] ? h : "home");
  });
