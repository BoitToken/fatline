<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revly</title>
<meta name="description" content="One dashboard. Every rupee accounted.">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script>
tailwind.config = {
  theme: { extend: {
    colors: { brand: '#00E5A0', accent: '#FF6B35', ink: '#0A0D12', card: '#131820' },
    fontFamily: { display: ['Sora','serif'], body: ['Inter','sans-serif'] }
  } }
};
</script>
<style>
  :root{
    --primary:#00E5A0; --primary-rgb:0, 229, 160;
    --accent:#FF6B35; --accent-rgb:255, 107, 53;
    --bg:#0A0D12; --card:#131820; --text:#F0F4F8; --muted:#5A6478;
    --font-display:'Sora',serif; --font-body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;overflow-x:hidden;max-width:100%;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased;line-height:1.6;}
  h1,h2,h3,h4,.font-display{font-family:var(--font-display);letter-spacing:-0.01em;line-height:1.1;}
  a{color:inherit;text-decoration:none;}
  ::selection{background:rgba(var(--primary-rgb),0.35);}
  img{display:block;max-width:100%;}
  /* layout */
  .app{display:flex;min-height:100vh;}
  .sidebar{width:248px;flex-shrink:0;background:linear-gradient(180deg, color-mix(in srgb,var(--card) 92%, #000) 0%, var(--bg) 100%);
    border-right:1px solid rgba(var(--primary-rgb),0.10);padding:22px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:6px;}
  .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px;}
  .brand .logo{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-weight:800;color:#fff;
    background:linear-gradient(135deg,var(--primary),var(--accent));box-shadow:0 6px 20px rgba(var(--primary-rgb),0.4);font-family:var(--font-display);}
  .brand .bname{font-weight:700;font-size:15px;}
  .brand .btag{font-size:11px;color:var(--muted);}
  .nav-item{display:flex;align-items:center;gap:12px;width:100%;padding:11px 13px;border:none;background:transparent;color:var(--muted);
    border-radius:11px;cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-body);transition:all .18s ease;text-align:left;}
  .nav-item:hover{background:rgba(var(--primary-rgb),0.08);color:var(--text);}
  .nav-item.active{background:rgba(var(--primary-rgb),0.14);color:#fff;box-shadow:inset 0 0 0 1px rgba(var(--primary-rgb),0.25);}
  .nav-item i,.bn-item i{width:18px;height:18px;}
  .nav-foot{margin-top:auto;padding:12px 8px 0;border-top:1px solid rgba(var(--primary-rgb),0.08);font-size:12px;color:var(--muted);}
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 30px;position:sticky;top:0;z-index:20;
    background:color-mix(in srgb,var(--bg) 82%, transparent);backdrop-filter:blur(14px);border-bottom:1px solid rgba(var(--primary-rgb),0.08);}
  .topbar .tt{font-size:13px;color:var(--muted);}
  .topbar .actions{display:flex;align-items:center;gap:12px;}
  #page-content{padding:0 0 80px;animation:fadeUp .5s ease both;overflow-x:auto;max-width:100%;}
  #page-content img{max-width:100%;}
  #page-content > *{max-width:100%;}
  #page-content.exiting{opacity:0;transform:translateY(10px);transition:all .2s ease;}
  /* component vocabulary the LLM is told to use */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:12px;font-weight:600;font-size:14px;cursor:pointer;border:none;transition:all .2s ease;}
  .btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 8px 24px rgba(var(--primary-rgb),0.35);}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(var(--primary-rgb),0.5);}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid rgba(var(--primary-rgb),0.3);}
  .btn-ghost:hover{background:rgba(var(--primary-rgb),0.08);}
  .pill{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:600;letter-spacing:.04em;
    background:rgba(var(--primary-rgb),0.12);color:var(--accent);border:1px solid rgba(var(--primary-rgb),0.22);text-transform:uppercase;}
  .card{background:linear-gradient(160deg, color-mix(in srgb,var(--card) 96%, #fff) 0%, var(--card) 100%);
    border:1px solid rgba(var(--primary-rgb),0.10);border-radius:18px;padding:24px;transition:all .25s ease;}
  .card:hover{transform:translateY(-4px);border-color:rgba(var(--primary-rgb),0.28);box-shadow:0 18px 40px rgba(0,0,0,0.35);}
  .stat{font-family:var(--font-display);font-size:30px;font-weight:700;color:#fff;}
  .muted{color:var(--muted);}
  .accent{color:var(--accent);}
  .glass{background:rgba(255,255,255,0.04);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:18px;}
  .gradient-text{background:linear-gradient(120deg,var(--text),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(var(--primary-rgb),0.4),transparent);}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:12px 14px;border-bottom:1px solid rgba(var(--primary-rgb),0.12);}
  td{padding:14px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:14px;}
  tr:hover td{background:rgba(var(--primary-rgb),0.04);}
  .badge{display:inline-block;padding:3px 11px;border-radius:999px;font-size:12px;font-weight:600;}
  .badge-green{background:rgba(34,197,94,0.15);color:#4ade80;}
  .badge-amber{background:rgba(245,158,11,0.15);color:#fbbf24;}
  .badge-red{background:rgba(239,68,68,0.15);color:#f87171;}
  .stagger>*{opacity:0;animation:fadeUp .6s ease forwards;}
  .stagger>*:nth-child(1){animation-delay:.05s}.stagger>*:nth-child(2){animation-delay:.12s}
  .stagger>*:nth-child(3){animation-delay:.19s}.stagger>*:nth-child(4){animation-delay:.26s}
  .stagger>*:nth-child(5){animation-delay:.33s}.stagger>*:nth-child(6){animation-delay:.40s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .bottom-nav{display:none;}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(var(--primary-rgb),0.3);border-radius:9px}
  /* mobile */
  @media(max-width:860px){
    .sidebar{display:none!important;}
    .topbar{padding:14px 18px;}
    #page-content{padding-bottom:96px;}
    .bottom-nav{display:flex!important;position:fixed;bottom:0;left:0;right:0;z-index:50;justify-content:space-around;
      padding:9px 6px env(safe-area-inset-bottom);background:color-mix(in srgb,var(--card) 96%, #000);border-top:1px solid rgba(var(--primary-rgb),0.18);backdrop-filter:blur(16px);}
    .bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;flex:1;}
    .bn-item.active{color:var(--accent);}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">R</div>
      <div><div class="bname">Revly</div><div class="btag">D2C Analytics</div></div>
    </div>
    <button class="nav-item active" data-page="home" onclick="loadPage('home')">
      <i data-lucide="home"></i><span>Home</span>
    </button>
      <button class="nav-item" data-page="dashboard" onclick="loadPage('dashboard')">
      <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
    </button>
      <button class="nav-item" data-page="features" onclick="loadPage('features')">
      <i data-lucide="sparkles"></i><span>Features</span>
    </button>
      <button class="nav-item" data-page="billing" onclick="loadPage('billing')">
      <i data-lucide="credit-card"></i><span>Billing</span>
    </button>
      <button class="nav-item" data-page="docs" onclick="loadPage('docs')">
      <i data-lucide="book"></i><span>Docs</span>
    </button>
    <div class="nav-foot">Powered by Produsa</div>
  </aside>
  <div class="main">
    <header class="topbar">
      <div class="tt">One dashboard. Every rupee accounted.</div>
      <div class="actions">
        <span class="pill"><i data-lucide="circle-dot" style="width:13px;height:13px"></i> Live</span>
        <button class="btn btn-primary" style="padding:9px 18px" onclick="window.ProdusaAuth&&window.ProdusaAuth.signIn?window.ProdusaAuth.signIn():null">Start Free Trial</button>
      </div>
    </header>
    <main id="page-content"></main>
  </div>
</div>
<nav class="bottom-nav">
  <button class="bn-item active" data-page="home" onclick="loadPage('home')">
      <i data-lucide="home"></i><span>Home</span>
    </button>
      <button class="bn-item" data-page="dashboard" onclick="loadPage('dashboard')">
      <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
    </button>
      <button class="bn-item" data-page="features" onclick="loadPage('features')">
      <i data-lucide="sparkles"></i><span>Features</span>
    </button>
      <button class="bn-item" data-page="billing" onclick="loadPage('billing')">
      <i data-lucide="credit-card"></i><span>Billing</span>
    </button>
      <button class="bn-item" data-page="docs" onclick="loadPage('docs')">
      <i data-lucide="book"></i><span>Docs</span>
    </button>
</nav>
<script>window.__PAGES__ = {"home":"<section class=\"relative min-h-screen flex items-center overflow-hidden px-6 md:px-10 py-14 md:py-20\" style=\"background: linear-gradient(135deg, #0a0f1e 0%, #0d1a2e 60%, #091520 100%);\">\n  <div class=\"max-w-7xl mx-auto w-full\">\n    <div class=\"grid grid-cols-1 lg:grid-cols-2 gap-12 items-center\">\n      <div class=\"flex flex-col gap-6 z-10\">\n        <div class=\"flex items-center gap-2\">\n          <span class=\"pill\" style=\"background: rgba(0,229,160,0.12); color: #00E5A0; border: 1px solid rgba(0,229,160,0.3); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; padding: 4px 12px; border-radius: 999px;\">NOW IN BETA — 400+ D2C BRANDS LIVE<\/span>\n        <\/div>\n        <h1 class=\"text-4xl md:text-6xl font-bold leading-tight\" style=\"color: #fff; font-family: 'Inter', sans-serif;\">\n          Stop guessing which ads are\n          <span class=\"gradient-text\"> killing your margins<\/span>\n        <\/h1>\n        <p class=\"text-lg md:text-xl\" style=\"color: rgba(255,255,255,0.65); max-width: 520px; line-height: 1.7;\">\n          Revly unifies revenue, retention, and ad spend into one ruthlessly clear dashboard. Built for Indian D2C — Shopify, Flipkart, Meesho, and more.\n        <\/p>\n        <div class=\"flex flex-col sm:flex-row gap-3 mt-2\">\n          <button class=\"btn btn-primary flex items-center gap-2 text-base px-6 py-3 rounded-xl font-semibold\" style=\"background: #00E5A0; color: #0a0f1e; border: none;\">\n            <i data-lucide=\"zap\"><\/i> Start Free Trial\n          <\/button>\n          <button class=\"btn btn-ghost flex items-center gap-2 text-base px-6 py-3 rounded-xl font-semibold\" style=\"border: 1px solid rgba(255,255,255,0.2); color: #fff;\">\n            <i data-lucide=\"play-circle\"><\/i> See Live Demo\n          <\/button>\n        <\/div>\n        <div class=\"mt-4\">\n          <p class=\"text-xs mb-3\" style=\"color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.1em;\">Trusted by 400+ brands<\/p>\n          <div class=\"flex flex-wrap gap-3 items-center\">\n            <span class=\"px-3 py-1 rounded-lg text-xs font-bold\" style=\"background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.6);\">Skinkraft<\/span>\n            <span class=\"px-3 py-1 rounded-lg text-xs font-bold\" style=\"background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.6);\">Wakefit<\/span>\n            <span class=\"px-3 py-1 rounded-lg text-xs font-bold\" style=\"background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.6);\">The Whole Truth<\/span>\n            <span class=\"px-3 py-1 rounded-lg text-xs font-bold\" style=\"background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.6);\">Mamaearth<\/span>\n            <span class=\"px-3 py-1 rounded-lg text-xs font-bold\" style=\"background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.6);\">boAt<\/span>\n            <span class=\"px-3 py-1 rounded-lg text-xs font-bold\" style=\"background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.6);\">Nykaa D2C<\/span>\n            <span class=\"px-3 py-1 rounded-lg text-xs font-bold\" style=\"background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.6);\">Sugar Cosmetics<\/span>\n          <\/div>\n        <\/div>\n      <\/div>\n      <div class=\"relative flex justify-center lg:justify-end\">\n        <div class=\"relative w-full max-w-xl\" style=\"border-radius: 20px; overflow: hidden; box-shadow: 0 40px 100px rgba(0,229,160,0.15), 0 0 0 1px rgba(0,229,160,0.2);\">\n          <img src=\"https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=1600&h=700&q=80&auto=format&fit=crop\" alt=\"Revly Dashboard\" class=\"w-full object-cover\" style=\"height: 420px; display: block;\" />\n          <div style=\"position: absolute; inset: 0; background: linear-gradient(180deg, rgba(10,15,30,0.1) 0%, rgba(10,15,30,0.5) 100%); border-radius: 20px;\"><\/div>\n          <div style=\"position: absolute; top: 16px; left: 16px; right: 16px; background: rgba(10,15,30,0.85); backdrop-filter: blur(12px); border-radius: 12px; padding: 14px 16px; border: 1px solid rgba(0,229,160,0.2);\">\n            <div class=\"flex items-center justify-between mb-2\">\n              <span style=\"color: rgba(255,255,255,0.5); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;\">Live Revenue — Today<\/span>\n              <span class=\"badge badge-green\" style=\"font-size: 0.65rem;\">● LIVE<\/span>\n            <\/div>\n            <div class=\"flex items-end gap-3\">\n              <span style=\"color: #fff; font-size: 1.6rem; font-weight: 800;\">₹14,82,340<\/span>\n              <span style=\"color: #00E5A0; font-size: 0.8rem; font-weight: 600; margin-bottom: 4px;\">↑ 23.4% vs yesterday<\/span>\n            <\/div>\n          <\/div>\n          <div style=\"position: absolute; bottom: 16px; left: 16px; background: rgba(10,15,30,0.88); backdrop-filter: blur(12px); border-radius: 10px; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.1);\">\n            <div style=\"color: rgba(255,255,255,0.45); font-size: 0.65rem; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.08em;\">Meta ROAS<\/div>\n            <div style=\"color: #fff; font-size: 1.1rem; font-weight: 700;\">3.8× <span style=\"color: #00E5A0; font-size: 0.75rem;\">↑ 0.4<\/span><\/div>\n          <\/div>\n          <div style=\"position: absolute; bottom: 16px; right: 16px; background: rgba(10,15,30,0.88); backdrop-filter: blur(12px); border-radius: 10px; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.1);\">\n            <div style=\"color: rgba(255,255,255,0.45); font-size: 0.65rem; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.08em;\">CAC (30d)<\/div>\n            <div style=\"color: #fff; font-size: 1.1rem; font-weight: 700;\">₹312 <span style=\"color: #ff6b6b; font-size: 0.75rem;\">↑ 8%<\/span><\/div>\n          <\/div>\n        <\/div>\n        <div style=\"positi <script>
  function _icons(){ try{ if(window.lucide) lucide.createIcons(); }catch(e){} }
  function loadPage(name){
    var html = (window.__PAGES__ && window.__PAGES__[name]) || '';
    var el = document.getElementById('page-content');
    if(!el) return;
    if(!html){ name = "home"; html = (window.__PAGES__||{})[name] || ''; }
    el.classList.add('exiting');
    setTimeout(function(){
      el.innerHTML = html;
      el.classList.remove('exiting');
      el.style.opacity='0'; el.style.transform='translateY(12px)';
      requestAnimationFrame(function(){
        el.style.transition='opacity .35s ease, transform .35s ease';
        el.style.opacity='1'; el.style.transform='translateY(0)';
      });
      _icons();
      window.scrollTo(0,0);
    }, 180);
    document.querySelectorAll('.nav-item,.bn-item').forEach(function(i){i.classList.remove('active');});
    document.querySelectorAll('[data-page="'+name+'"]').forEach(function(a){a.classList.add('active');});
    try{ history.replaceState(null,'','#'+name); }catch(e){}
  }
  window.addEventListener('message', function(e){ if(e.data && e.data.page) loadPage(e.data.page); });
  window.addEventListener('hashchange', function(){ var h=location.hash.replace('#',''); if(h && window.__PAGES__[h]) loadPage(h); });
  document.addEventListener('DOMContentLoaded', function(){
    _icons();
    var h = location.hash.replace('#','');
    loadPage(h && window.__PAGES__[h] ? h : "home");
  });
</script>
