<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ember & Ore</title>
<meta name="description" content="Roasted with intention. Brewed with care.">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM%20Serif%20Display:wght@400&family=DM%20Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script>
tailwind.config = {
  theme: { extend: {
    colors: { brand: '#C8763A', accent: '#E8A96A', ink: '#141210', card: '#1E1A16' },
    fontFamily: { display: ['DM Serif Display','serif'], body: ['DM Sans','sans-serif'] }
  } }
};
</script>
<style>
  :root{
    --primary:#C8763A; --primary-rgb:200, 118, 58;
    --accent:#E8A96A; --accent-rgb:232, 169, 106;
    --bg:#141210; --card:#1E1A16; --text:#F5EFE6; --muted:#7A6D61;
    --font-display:'DM Serif Display',serif; --font-body:'DM Sans',sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;overflow-x:hidden;max-width:100%;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased;line-height:1.6;}
  h1,h2,h3,h4,.font-display{font-family:var(--font-display);letter-spacing:-0.01em;line-height:1.1;}
  a{color:inherit;text-decoration:none;}
  ::selection{background:rgba(var(--primary-rgb),0.35);}
  img{display:block;max-width:100%;}
  /* layout */
  .app{display:flex;min-height:100vh;}
  .sidebar{width:248px;flex-shrink:0;background:linear-gradient(180deg, color-mix(in srgb,var(--card) 92%, #000) 0%, var(--bg) 100%);
    border-right:1px solid rgba(var(--primary-rgb),0.10);padding:22px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:6px;}
  .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px;}
  .brand .logo{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-weight:800;color:#fff;
    background:linear-gradient(135deg,var(--primary),var(--accent));box-shadow:0 6px 20px rgba(var(--primary-rgb),0.4);font-family:var(--font-display);}
  .brand .bname{font-weight:700;font-size:15px;}
  .brand .btag{font-size:11px;color:var(--muted);}
  .nav-item{display:flex;align-items:center;gap:12px;width:100%;padding:11px 13px;border:none;background:transparent;color:var(--muted);
    border-radius:11px;cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-body);transition:all .18s ease;text-align:left;}
  .nav-item:hover{background:rgba(var(--primary-rgb),0.08);color:var(--text);}
  .nav-item.active{background:rgba(var(--primary-rgb),0.14);color:#fff;box-shadow:inset 0 0 0 1px rgba(var(--primary-rgb),0.25);}
  .nav-item i,.bn-item i{width:18px;height:18px;}
  .nav-foot{margin-top:auto;padding:12px 8px 0;border-top:1px solid rgba(var(--primary-rgb),0.08);font-size:12px;color:var(--muted);}
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 30px;position:sticky;top:0;z-index:20;
    background:color-mix(in srgb,var(--bg) 82%, transparent);backdrop-filter:blur(14px);border-bottom:1px solid rgba(var(--primary-rgb),0.08);}
  .topbar .tt{font-size:13px;color:var(--muted);}
  .topbar .actions{display:flex;align-items:center;gap:12px;}
  #page-content{padding:0 0 80px;animation:fadeUp .5s ease both;overflow-x:auto;max-width:100%;}
  #page-content img{max-width:100%;}
  #page-content > *{max-width:100%;}
  #page-content.exiting{opacity:0;transform:translateY(10px);transition:all .2s ease;}
  /* component vocabulary the LLM is told to use */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:12px;font-weight:600;font-size:14px;cursor:pointer;border:none;transition:all .2s ease;}
  .btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 8px 24px rgba(var(--primary-rgb),0.35);}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(var(--primary-rgb),0.5);}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid rgba(var(--primary-rgb),0.3);}
  .btn-ghost:hover{background:rgba(var(--primary-rgb),0.08);}
  .pill{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:600;letter-spacing:.04em;
    background:rgba(var(--primary-rgb),0.12);color:var(--accent);border:1px solid rgba(var(--primary-rgb),0.22);text-transform:uppercase;}
  .card{background:linear-gradient(160deg, color-mix(in srgb,var(--card) 96%, #fff) 0%, var(--card) 100%);
    border:1px solid rgba(var(--primary-rgb),0.10);border-radius:18px;padding:24px;transition:all .25s ease;}
  .card:hover{transform:translateY(-4px);border-color:rgba(var(--primary-rgb),0.28);box-shadow:0 18px 40px rgba(0,0,0,0.35);}
  .stat{font-family:var(--font-display);font-size:30px;font-weight:700;color:#fff;}
  .muted{color:var(--muted);}
  .accent{color:var(--accent);}
  .glass{background:rgba(255,255,255,0.04);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:18px;}
  .gradient-text{background:linear-gradient(120deg,var(--text),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(var(--primary-rgb),0.4),transparent);}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:12px 14px;border-bottom:1px solid rgba(var(--primary-rgb),0.12);}
  td{padding:14px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:14px;}
  tr:hover td{background:rgba(var(--primary-rgb),0.04);}
  .badge{display:inline-block;padding:3px 11px;border-radius:999px;font-size:12px;font-weight:600;}
  .badge-green{background:rgba(34,197,94,0.15);color:#4ade80;}
  .badge-amber{background:rgba(245,158,11,0.15);color:#fbbf24;}
  .badge-red{background:rgba(239,68,68,0.15);color:#f87171;}
  .stagger>*{opacity:0;animation:fadeUp .6s ease forwards;}
  .stagger>*:nth-child(1){animation-delay:.05s}.stagger>*:nth-child(2){animation-delay:.12s}
  .stagger>*:nth-child(3){animation-delay:.19s}.stagger>*:nth-child(4){animation-delay:.26s}
  .stagger>*:nth-child(5){animation-delay:.33s}.stagger>*:nth-child(6){animation-delay:.40s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .bottom-nav{display:none;}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(var(--primary-rgb),0.3);border-radius:9px}
  /* mobile */
  @media(max-width:860px){
    .sidebar{display:none!important;}
    .topbar{padding:14px 18px;}
    #page-content{padding-bottom:96px;}
    .bottom-nav{display:flex!important;position:fixed;bottom:0;left:0;right:0;z-index:50;justify-content:space-around;
      padding:9px 6px env(safe-area-inset-bottom);background:color-mix(in srgb,var(--card) 96%, #000);border-top:1px solid rgba(var(--primary-rgb),0.18);backdrop-filter:blur(16px);}
    .bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;flex:1;}
    .bn-item.active{color:var(--accent);}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">E&</div>
      <div><div class="bname">Ember & Ore</div><div class="btag">Specialty Coffee</div></div>
    </div>
    <button class="nav-item active" data-page="home" onclick="loadPage('home')">
      <i data-lucide="home"></i><span>Home</span>
    </button>
      <button class="nav-item" data-page="shop" onclick="loadPage('shop')">
      <i data-lucide="shopping-bag"></i><span>Shop</span>
    </button>
      <button class="nav-item" data-page="product" onclick="loadPage('product')">
      <i data-lucide="package"></i><span>Product</span>
    </button>
      <button class="nav-item" data-page="cart" onclick="loadPage('cart')">
      <i data-lucide="shopping-cart"></i><span>Cart</span>
    </button>
      <button class="nav-item" data-page="account" onclick="loadPage('account')">
      <i data-lucide="user"></i><span>Account</span>
    </button>
    <div class="nav-foot">Powered by Fatline</div>
  </aside>
  <div class="main">
    <header class="topbar">
      <div class="tt">Roasted with intention. Brewed with care.</div>
      <div class="actions">
        <span class="pill"><i data-lucide="circle-dot" style="width:13px;height:13px"></i> Live</span>
        <button class="btn btn-primary" style="padding:9px 18px" onclick="window.ProdusaAuth&&window.ProdusaAuth.signIn?window.ProdusaAuth.signIn():null">Start Subscribing</button>
      </div>
    </header>
    <main id="page-content"></main>
  </div>
</div>
<nav class="bottom-nav">
  <button class="bn-item active" data-page="home" onclick="loadPage('home')">
      <i data-lucide="home"></i><span>Home</span>
    </button>
      <button class="bn-item" data-page="shop" onclick="loadPage('shop')">
      <i data-lucide="shopping-bag"></i><span>Shop</span>
    </button>
      <button class="bn-item" data-page="product" onclick="loadPage('product')">
      <i data-lucide="package"></i><span>Product</span>
    </button>
      <button class="bn-item" data-page="cart" onclick="loadPage('cart')">
      <i data-lucide="shopping-cart"></i><span>Cart</span>
    </button>
      <button class="bn-item" data-page="account" onclick="loadPage('account')">
      <i data-lucide="user"></i><span>Account</span>
    </button>
</nav>
<script>window.__PAGES__ = {"home":"<section class=\"relative w-full min-h-screen flex items-center justify-center overflow-hidden\" style=\"min-height:100svh\">\n  <img src=\"https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1400&h=900&q=80&auto=format&fit=crop\" alt=\"Roastery interior\" class=\"absolute inset-0 w-full h-full object-cover\" style=\"z-index:0\">\n  <div class=\"absolute inset-0\" style=\"background:linear-gradient(135deg,rgba(20,10,5,0.82) 0%,rgba(40,18,6,0.65) 60%,rgba(10,5,2,0.78) 100%);z-index:1\"><\/div>\n  <div class=\"relative z-10 w-full max-w-7xl mx-auto px-6 md:px-10 py-20 md:py-32 flex flex-col items-start gap-6\">\n    <span class=\"pill\" style=\"background:rgba(200,118,58,0.18);border:1px solid rgba(200,118,58,0.45);color:#f0a96a;font-family:monospace;font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase\">&#9670; Roasted with intention. Brewed with care.<\/span>\n    <h1 class=\"font-display text-4xl md:text-6xl lg:text-7xl font-bold text-white leading-tight max-w-3xl\" style=\"font-family:'Georgia',serif;line-height:1.1\">Single-origin roasts that redefine your mornings<\/h1>\n    <p class=\"text-lg md:text-xl max-w-xl\" style=\"color:rgba(255,255,255,0.72);font-weight:300;line-height:1.6\">Traceable beans, roasted in small batches, delivered to your door every month.<\/p>\n    <div class=\"flex flex-col sm:flex-row gap-3 mt-2\">\n      <button class=\"btn btn-primary px-7 py-3 text-base font-semibold rounded-xl\" style=\"background:var(--primary,#C8763A);color:#fff;border:none\">Start Subscribing<\/button>\n      <button class=\"btn btn-ghost px-7 py-3 text-base font-semibold rounded-xl\" style=\"border:1px solid rgba(255,255,255,0.35);color:#fff\">Explore Roasts<\/button>\n    <\/div>\n  <\/div>\n  <div class=\"absolute bottom-8 left-1/2 -translate-x-1/2 z-10 flex flex-col items-center gap-1\" style=\"color:rgba(255,255,255,0.5)\">\n    <span style=\"font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;font-family:monospace\">Scroll<\/span>\n    <i data-lucide=\"chevron-down\" style=\"width:20px;height:20px;animation:bounce 2s infinite\"><\/i>\n  <\/div>\n  <style>@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}<\/style>\n<\/section>\n\n<section style=\"background:#1a0d05;overflow:hidden;padding:0\">\n  <div style=\"border-top:1px solid rgba(200,118,58,0.2);border-bottom:1px solid rgba(200,118,58,0.2);padding:14px 0;white-space:nowrap;overflow:hidden\">\n    <div style=\"display:inline-block;animation:marquee 28s linear infinite\">\n      <span style=\"font-family:monospace;font-size:0.8rem;letter-spacing:0.1em;color:#f0a96a;margin:0 32px\">ARAKU VALLEY · 900–1100m · Natural Process<\/span>\n      <span style=\"font-family:monospace;font-size:0.8rem;letter-spacing:0.1em;color:rgba(240,169,106,0.55);margin:0 32px\">✦<\/span>\n      <span style=\"font-family:monospace;font-size:0.8rem;letter-spacing:0.1em;color:#f0a96a;margin:0 32px\">COORG ESTATE · 1000–1200m · Washed Process<\/span>\n      <span style=\"font-family:monospace;font-size:0.8rem;letter-spacing:0.1em;color:rgba(240,169,106,0.55);margin:0 32px\">✦<\/span>\n      <span style=\"font-family:monospace;font-size:0.8rem;letter-spacing:0.1em;color:#f0a96a;margin:0 32px\">CHIKMAGALUR · 1100m · Honey Process<\/span>\n      <span style=\"font-family:monospace;font-size:0.8rem;letter-spacing:0.1em;color:rgba(240,169,106,0.55);margin:0 32px\">✦<\/span>\n      <span style=\"font-family:monospace;font-size:0.8rem;letter-spacing:0.1em;color:#f0a96a;margin:0 32px\">NILGIRI · 1400m · Monsoon Malabar<\/span>\n      <span style=\"font-family:monospace;font-size:0.8rem;letter-spacing:0.1em;color:rgba(240,169,106,0.55);margin:0 32px\">✦<\/span>\n      <span style=\"font-family:monospace;font-size:0.8rem;letter-spacing:0.1em;color:#f0a96a;margin:0 32px\">YIRGACHEFFE · 1800m · Washed Single Origin<\/span>\n      <span style=\"font-family:monospace;font-size:0.8rem;letter-spacing:0.1em;color:rgba(240,169,106,0.55);margin:0 32px\">✦<\/span>\n      <span style=\"font-family:monospace;font-size:0.8rem;letter-spacing:0.1em;color:#f0a96a;margin:0 32px\">BABABUDANGIRI · 1500m · Natural Dry<\/span>\n      <span style=\"font-family:monospace;font-size:0.8rem;letter-spacing:0.1em;color:rgba(240,169,106,0.55);margin:0 32px\">✦<\/span>\n      <span style=\"font-family:monospace;font-size:0.8rem;letter-spacing:0.1em;color:#f0a96a;margin:0 32px\">ARAKU VALLEY · 900–1100m · Natural Process<\/span>\n      <span style=\"font-family:monospace;font-size:0.8rem;letter-spacing:0.1em;color:rgba(240,169,106,0.55);margin:0 32px\">✦<\/span>\n      <span style=\"font-family:monospace;font-size:0.8rem;letter-spacing:0.1em;color:#f0a96a;margin:0 32px\">COORG ESTATE · 1000–1200m · Washed Process<\/span>\n      <span style=\"font-family:monospace;font-size:0.8rem;letter-spacing:0.1em;color:rgba(240,169,106,0.55);margin:0 32px\">✦<\/span>\n      <span style=\"font-family:monospace;font-size:0.8rem;letter-spacing:0.1em;color:#f0a96a;margin:0 32px\">CHIKMAGALUR · 1100m · Honey Process<\/span>\n      <span style=\"font-family:monospace;font-size:0.8rem;letter-spacing:0.1em;color:rgba(240,169,106,0.55);margin:0 32px\">✦<\/span>\n      <span style=\"font-family:monospace;font-size:0.8rem;letter-spacing:0.1em;color:#f0a96a;margin:0 32px\">NILGIRI · 1400m · Monsoon Malabar<\/span>\n      <span style=\"font-family:monospace;font-size:0.8rem;letter-spacing:0.1em;color:rgba(240,169,106,0.55);margin:0 32px\">✦<\/span>\n    <\/div>\n  <\/div>\n  <style>@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}<\/style>\n<\/section>\n\n<section class=\"px-6 md:px-10 py-14 md:py-20\" style=\"background:#100804\">\n  <div class=\"max-w-7xl mx-auto\">\n    <div class=\"grid grid-cols-2 md:grid-cols-4 gap-0 rounded-2xl overflow-hidden\" style=\"border:1px solid rgba(200,118,58,0.2)\">\n      <div class=\"flex flex-col items-center justify-center py-10 px-4 text-center\" styl <script>
  function _icons(){ try{ if(window.lucide) lucide.createIcons(); }catch(e){} }
  function loadPage(name){
    var html = (window.__PAGES__ && window.__PAGES__[name]) || '';
    var el = document.getElementById('page-content');
    if(!el) return;
    if(!html){ name = "home"; html = (window.__PAGES__||{})[name] || ''; }
    el.classList.add('exiting');
    setTimeout(function(){
      el.innerHTML = html;
      el.classList.remove('exiting');
      el.style.opacity='0'; el.style.transform='translateY(12px)';
      requestAnimationFrame(function(){
        el.style.transition='opacity .35s ease, transform .35s ease';
        el.style.opacity='1'; el.style.transform='translateY(0)';
      });
      _icons();
      window.scrollTo(0,0);
    }, 180);
    document.querySelectorAll('.nav-item,.bn-item').forEach(function(i){i.classList.remove('active');});
    document.querySelectorAll('[data-page="'+name+'"]').forEach(function(a){a.classList.add('active');});
    try{ history.replaceState(null,'','#'+name); }catch(e){}
  }
  window.addEventListener('message', function(e){ if(e.data && e.data.page) loadPage(e.data.page); });
  window.addEventListener('hashchange', function(){ var h=location.hash.replace('#',''); if(h && window.__PAGES__[h]) loadPage(h); });
  document.addEventListener('DOMContentLoaded', function(){
    _icons();
    var h = location.hash.replace('#','');
    loadPage(h && window.__PAGES__[h] ? h : "home");
  });
</script>
