<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spazio CRM</title>
<meta name="description" content="Every client, every room, every rupee">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM%20Serif%20Display:wght@400&family=DM%20Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script>
tailwind.config = {
  theme: { extend: {
    colors: { brand: '#C9A96E', accent: '#E8C99A', ink: '#0F0D0B', card: '#1A1714' },
    fontFamily: { display: ['DM Serif Display','serif'], body: ['DM Sans','sans-serif'] }
  } }
};
</script>
<style>
  :root{
    --primary:#C9A96E; --primary-rgb:201, 169, 110;
    --accent:#E8C99A; --accent-rgb:232, 201, 154;
    --bg:#0F0D0B; --card:#1A1714; --text:#F5F0E8; --muted:#7A7068;
    --font-display:'DM Serif Display',serif; --font-body:'DM Sans',sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;overflow-x:hidden;max-width:100%;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased;line-height:1.6;}
  h1,h2,h3,h4,.font-display{font-family:var(--font-display);letter-spacing:-0.01em;line-height:1.1;}
  a{color:inherit;text-decoration:none;}
  ::selection{background:rgba(var(--primary-rgb),0.35);}
  img{display:block;max-width:100%;}
  /* layout */
  .app{display:flex;min-height:100vh;}
  .sidebar{width:248px;flex-shrink:0;background:linear-gradient(180deg, color-mix(in srgb,var(--card) 92%, #000) 0%, var(--bg) 100%);
    border-right:1px solid rgba(var(--primary-rgb),0.10);padding:22px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:6px;}
  .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px;}
  .brand .logo{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-weight:800;color:#fff;
    background:linear-gradient(135deg,var(--primary),var(--accent));box-shadow:0 6px 20px rgba(var(--primary-rgb),0.4);font-family:var(--font-display);}
  .brand .bname{font-weight:700;font-size:15px;}
  .brand .btag{font-size:11px;color:var(--muted);}
  .nav-item{display:flex;align-items:center;gap:12px;width:100%;padding:11px 13px;border:none;background:transparent;color:var(--muted);
    border-radius:11px;cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-body);transition:all .18s ease;text-align:left;}
  .nav-item:hover{background:rgba(var(--primary-rgb),0.08);color:var(--text);}
  .nav-item.active{background:rgba(var(--primary-rgb),0.14);color:#fff;box-shadow:inset 0 0 0 1px rgba(var(--primary-rgb),0.25);}
  .nav-item i,.bn-item i{width:18px;height:18px;}
  .nav-foot{margin-top:auto;padding:12px 8px 0;border-top:1px solid rgba(var(--primary-rgb),0.08);font-size:12px;color:var(--muted);}
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 30px;position:sticky;top:0;z-index:20;
    background:color-mix(in srgb,var(--bg) 82%, transparent);backdrop-filter:blur(14px);border-bottom:1px solid rgba(var(--primary-rgb),0.08);}
  .topbar .tt{font-size:13px;color:var(--muted);}
  .topbar .actions{display:flex;align-items:center;gap:12px;}
  #page-content{padding:0 0 80px;animation:fadeUp .5s ease both;overflow-x:auto;max-width:100%;}
  #page-content img{max-width:100%;}
  #page-content > *{max-width:100%;}
  #page-content.exiting{opacity:0;transform:translateY(10px);transition:all .2s ease;}
  /* component vocabulary the LLM is told to use */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:12px;font-weight:600;font-size:14px;cursor:pointer;border:none;transition:all .2s ease;}
  .btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 8px 24px rgba(var(--primary-rgb),0.35);}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(var(--primary-rgb),0.5);}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid rgba(var(--primary-rgb),0.3);}
  .btn-ghost:hover{background:rgba(var(--primary-rgb),0.08);}
  .pill{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:600;letter-spacing:.04em;
    background:rgba(var(--primary-rgb),0.12);color:var(--accent);border:1px solid rgba(var(--primary-rgb),0.22);text-transform:uppercase;}
  .card{background:linear-gradient(160deg, color-mix(in srgb,var(--card) 96%, #fff) 0%, var(--card) 100%);
    border:1px solid rgba(var(--primary-rgb),0.10);border-radius:18px;padding:24px;transition:all .25s ease;}
  .card:hover{transform:translateY(-4px);border-color:rgba(var(--primary-rgb),0.28);box-shadow:0 18px 40px rgba(0,0,0,0.35);}
  .stat{font-family:var(--font-display);font-size:30px;font-weight:700;color:#fff;}
  .muted{color:var(--muted);}
  .accent{color:var(--accent);}
  .glass{background:rgba(255,255,255,0.04);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:18px;}
  .gradient-text{background:linear-gradient(120deg,var(--text),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(var(--primary-rgb),0.4),transparent);}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:12px 14px;border-bottom:1px solid rgba(var(--primary-rgb),0.12);}
  td{padding:14px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:14px;}
  tr:hover td{background:rgba(var(--primary-rgb),0.04);}
  .badge{display:inline-block;padding:3px 11px;border-radius:999px;font-size:12px;font-weight:600;}
  .badge-green{background:rgba(34,197,94,0.15);color:#4ade80;}
  .badge-amber{background:rgba(245,158,11,0.15);color:#fbbf24;}
  .badge-red{background:rgba(239,68,68,0.15);color:#f87171;}
  .stagger>*{opacity:0;animation:fadeUp .6s ease forwards;}
  .stagger>*:nth-child(1){animation-delay:.05s}.stagger>*:nth-child(2){animation-delay:.12s}
  .stagger>*:nth-child(3){animation-delay:.19s}.stagger>*:nth-child(4){animation-delay:.26s}
  .stagger>*:nth-child(5){animation-delay:.33s}.stagger>*:nth-child(6){animation-delay:.40s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .bottom-nav{display:none;}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(var(--primary-rgb),0.3);border-radius:9px}
  /* mobile */
  @media(max-width:860px){
    .sidebar{display:none!important;}
    .topbar{padding:14px 18px;}
    #page-content{padding-bottom:96px;}
    .bottom-nav{display:flex!important;position:fixed;bottom:0;left:0;right:0;z-index:50;justify-content:space-around;
      padding:9px 6px env(safe-area-inset-bottom);background:color-mix(in srgb,var(--card) 96%, #000);border-top:1px solid rgba(var(--primary-rgb),0.18);backdrop-filter:blur(16px);}
    .bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;flex:1;}
    .bn-item.active{color:var(--accent);}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">SC</div>
      <div><div class="bname">Spazio CRM</div><div class="btag">Interior CRM</div></div>
    </div>
    <button class="nav-item active" data-page="dashboard" onclick="loadPage('dashboard')">
      <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
    </button>
      <button class="nav-item" data-page="pipeline" onclick="loadPage('pipeline')">
      <i data-lucide="kanban"></i><span>Pipeline</span>
    </button>
      <button class="nav-item" data-page="contacts" onclick="loadPage('contacts')">
      <i data-lucide="users"></i><span>Contacts</span>
    </button>
      <button class="nav-item" data-page="deals" onclick="loadPage('deals')">
      <i data-lucide="handshake"></i><span>Deals</span>
    </button>
      <button class="nav-item" data-page="reports" onclick="loadPage('reports')">
      <i data-lucide="bar-chart"></i><span>Reports</span>
    </button>
    <div class="nav-foot">Powered by Fatline</div>
  </aside>
  <div class="main">
    <header class="topbar">
      <div class="tt">Every client, every room, every rupee</div>
      <div class="actions">
        <span class="pill"><i data-lucide="circle-dot" style="width:13px;height:13px"></i> Live</span>
        <button class="btn btn-primary" style="padding:9px 18px" onclick="window.ProdusaAuth&&window.ProdusaAuth.signIn?window.ProdusaAuth.signIn():null">Start Free Trial</button>
      </div>
    </header>
    <main id="page-content"></main>
  </div>
</div>
<nav class="bottom-nav">
  <button class="bn-item active" data-page="dashboard" onclick="loadPage('dashboard')">
      <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
    </button>
      <button class="bn-item" data-page="pipeline" onclick="loadPage('pipeline')">
      <i data-lucide="kanban"></i><span>Pipeline</span>
    </button>
      <button class="bn-item" data-page="contacts" onclick="loadPage('contacts')">
      <i data-lucide="users"></i><span>Contacts</span>
    </button>
      <button class="bn-item" data-page="deals" onclick="loadPage('deals')">
      <i data-lucide="handshake"></i><span>Deals</span>
    </button>
      <button class="bn-item" data-page="reports" onclick="loadPage('reports')">
      <i data-lucide="bar-chart"></i><span>Reports</span>
    </button>
</nav>
<script>window.__PAGES__ = {"dashboard":"<section class=\"px-6 md:px-10 py-10 md:py-14\" style=\"background: linear-gradient(135deg, rgba(201,169,110,0.07) 0%, transparent 60%);\">\n  <div class=\"max-w-7xl mx-auto\">\n\n    <!-- Welcome Header -->\n    <div class=\"flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-10\">\n      <div>\n        <p class=\"text-sm font-medium mb-1\" style=\"color:var(--primary)\">Good morning, Priya ✦<\/p>\n        <h1 class=\"text-3xl md:text-4xl font-bold\" style=\"color:var(--text)\">Your design practice,<br><span class=\"gradient-text\">beautifully organized at last<\/span><\/h1>\n        <p class=\"mt-2 text-base\" style=\"color:var(--muted)\">Track every client, project milestone, and invoice from one elegant workspace.<\/p>\n      <\/div>\n      <div class=\"flex items-center gap-3 flex-shrink-0\">\n        <button class=\"btn btn-ghost flex items-center gap-2 text-sm\"><i data-lucide=\"bell\" class=\"w-4 h-4\"><\/i> <span class=\"badge badge-amber\">3<\/span><\/button>\n        <button class=\"btn btn-primary flex items-center gap-2 text-sm\"><i data-lucide=\"plus\" class=\"w-4 h-4\"><\/i> New Project<\/button>\n        <img src=\"https://ui-avatars.com/api/?name=Priya%20Malhotra&background=C9A96E&color=fff&size=80&bold=true&format=png\" alt=\"Priya\" class=\"w-10 h-10 rounded-full border-2\" style=\"border-color:var(--primary)\">\n      <\/div>\n    <\/div>\n\n    <!-- ─────────────────────────────────────────────\n         SECTION 1 · KPI Band\n    ───────────────────────────────────────────── -->\n    <div class=\"grid grid-cols-2 lg:grid-cols-4 gap-4 mb-12 stagger\">\n\n      <div class=\"card p-6 relative overflow-hidden group hover:scale-[1.02] transition-transform\">\n        <div class=\"absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity\" style=\"background:linear-gradient(135deg,rgba(201,169,110,0.08),transparent)\"><\/div>\n        <div class=\"flex items-start justify-between mb-3\">\n          <div class=\"w-10 h-10 rounded-xl flex items-center justify-center\" style=\"background:rgba(201,169,110,0.15)\">\n            <i data-lucide=\"indian-rupee\" class=\"w-5 h-5\" style=\"color:var(--primary)\"><\/i>\n          <\/div>\n          <span class=\"pill text-xs flex items-center gap-1\" style=\"background:rgba(34,197,94,0.12);color:#16a34a\">\n            <i data-lucide=\"trending-up\" class=\"w-3 h-3\"><\/i> +12%\n          <\/span>\n        <\/div>\n        <p class=\"text-2xl md:text-3xl font-bold mb-1\" style=\"color:var(--text)\">₹1,84,000<\/p>\n        <p class=\"text-sm\" style=\"color:var(--muted)\">Monthly Revenue<\/p>\n        <p class=\"text-xs mt-2\" style=\"color:var(--muted)\">vs ₹1,64,200 last month<\/p>\n      <\/div>\n\n      <div class=\"card p-6 relative overflow-hidden group hover:scale-[1.02] transition-transform\">\n        <div class=\"absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity\" style=\"background:linear-gradient(135deg,rgba(201,169,110,0.08),transparent)\"><\/div>\n        <div class=\"flex items-start justify-between mb-3\">\n          <div class=\"w-10 h-10 rounded-xl flex items-center justify-center\" style=\"background:rgba(99,102,241,0.12)\">\n            <i data-lucide=\"layout-dashboard\" class=\"w-5 h-5\" style=\"color:#6366f1\"><\/i>\n          <\/div>\n          <span class=\"pill text-xs flex items-center gap-1\" style=\"background:rgba(34,197,94,0.12);color:#16a34a\">\n            <i data-lucide=\"trending-up\" class=\"w-3 h-3\"><\/i> +3\n          <\/span>\n        <\/div>\n        <p class=\"text-2xl md:text-3xl font-bold mb-1\" style=\"color:var(--text)\">14<\/p>\n        <p class=\"text-sm\" style=\"color:var(--muted)\">Active Projects<\/p>\n        <p class=\"text-xs mt-2\" style=\"color:var(--muted)\">vs 11 last month<\/p>\n      <\/div>\n\n      <div class=\"card p-6 relative overflow-hidden group hover:scale-[1.02] transition-transform\">\n        <div class=\"absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity\" style=\"background:linear-gradient(135deg,rgba(201,169,110,0.08),transparent)\"><\/div>\n        <div class=\"flex items-start justify-between mb-3\">\n          <div class=\"w-10 h-10 rounded-xl flex items-center justify-center\" style=\"background:rgba(245,158,11,0.12)\">\n            <i data-lucide=\"file-text\" class=\"w-5 h-5\" style=\"color:#d97706\"><\/i>\n          <\/div>\n          <span class=\"pill text-xs flex items-center gap-1\" style=\"background:rgba(239,68,68,0.12);color:#dc2626\">\n            <i data-lucide=\"trending-up\" class=\"w-3 h-3\"><\/i> +₹8k\n          <\/span>\n        <\/div>\n        <p class=\"text-2xl md:text-3xl font-bold mb-1\" style=\"color:var(--text)\">₹67,500<\/p>\n        <p class=\"text-sm\" style=\"color:var(--muted)\">Pending Invoices<\/p>\n        <p class=\"text-xs mt-2\" style=\"color:var(--muted)\">4 invoices awaiting payment<\/p>\n      <\/div>\n\n      <div class=\"card p-6 relative overflow-hidden group hover:scale-[1.02] transition-transform\">\n        <div class=\"absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity\" style=\"background:linear-gradient(135deg,rgba(201,169,110,0.08),transparent)\"><\/div>\n        <div class=\"flex items-start justify-between mb-3\">\n          <div class=\"w-10 h-10 rounded-xl flex items-center justify-center\" style=\"background:rgba(239,68,68,0.1)\">\n            <i data-lucide=\"check-circle-2\" class=\"w-5 h-5\" style=\"color:#ef4444\"><\/i>\n          <\/div>\n          <span class=\"pill text-xs flex items-center gap-1\" style=\"background:rgba(239,68,68,0.12);color:#dc2626\">\n            <i data-lucide=\"alert-circle\" class=\"w-3 h-3\"><\/i> Urgent\n          <\/span>\n        <\/div>\n        <p class=\"text-2xl md:text-3xl font-bold mb-1\" style=\"color:var(--text)\">6<\/p>\n        <p class=\"text-sm\" style=\"color:var(--muted)\">Tasks Due Today<\/p>\n        <p class=\"text-xs mt-2\" s
